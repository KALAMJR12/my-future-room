<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Future Room • Design Your Future</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0b0b1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      overflow: hidden;
    }
    .game-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: 900px;
      max-height: 600px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(0, 180, 255, 0.3), 0 0 140px rgba(255, 180, 0, 0.25);
    }
    canvas {
      display: block;
    }
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 15px 20px;
    }
    .needs-panel {
      background: rgba(10, 15, 30, 0.85);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 10px 16px;
      color: white;
      font-size: 12px;
      font-weight: bold;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }
    .need-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 5px 0;
    }
    .need-bar-bg {
      width: 70px;
      height: 6px;
      background: #2a2a4a;
      border-radius: 10px;
      overflow: hidden;
    }
    .need-fill {
      height: 100%;
      background: linear-gradient(90deg, #4caf50, #8bc34a);
      border-radius: 10px;
      transition: width 0.3s ease;
    }
    .skills-panel {
      background: rgba(10, 15, 30, 0.85);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 215, 0, 0.5);
      border-radius: 24px;
      padding: 10px 16px;
      color: white;
      font-size: 12px;
      font-weight: bold;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      text-align: right;
    }
    .skill-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      margin: 4px 0;
    }
    .skill-bar-bg {
      width: 60px;
      height: 5px;
      background: #2a2a4a;
      border-radius: 10px;
      overflow: hidden;
    }
    .skill-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      border-radius: 10px;
      transition: width 0.3s ease;
    }
    .money-display {
      margin-top: 6px;
      color: #ffd700;
      font-size: 13px;
    }
    .bottom-bar {
      position: absolute;
      bottom: 15px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      pointer-events: auto;
    }
    .story-tag {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(15px);
      color: #ddd;
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 13px;
      max-width: 280px;
      border-left: 3px solid #ffb74d;
      font-weight: 500;
    }
    button {
      pointer-events: auto;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      border: none;
      color: #0a0a1a;
      font-weight: bold;
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 13px;
      box-shadow: 0 5px 18px rgba(255, 180, 0, 0.5);
      transition: 0.2s;
      letter-spacing: 0.5px;
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(255, 200, 0, 0.8);
    }
    .action-hint {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 5px 14px;
      border-radius: 20px;
      color: white;
      font-size: 11px;
      margin-right: 10px;
    }
  </style>
</head>
<body>
<div class="game-wrapper" id="game-container"></div>
<div id="ui-layer">
  <div class="top-bar">
    <div class="needs-panel">
      <div style="margin-bottom: 4px; color: #aaa;">⚡ NEEDS</div>
      <div class="need-item"><span>🍔 Hunger</span><div class="need-bar-bg"><div class="need-fill" id="hunger-fill" style="width: 100%;"></div></div></div>
      <div class="need-item"><span>⚡ Energy</span><div class="need-bar-bg"><div class="need-fill" id="energy-fill" style="width: 100%;"></div></div></div>
      <div class="need-item"><span>🎉 Fun</span><div class="need-bar-bg"><div class="need-fill" id="fun-fill" style="width: 100%;"></div></div></div>
    </div>
    <div class="skills-panel">
      <div style="margin-bottom: 4px; color: #ffd700;">🌟 FUTURE SKILLS</div>
      <div class="skill-row"><span>📚 Education</span><div class="skill-bar-bg"><div class="skill-fill" id="edu-fill" style="width: 10%;"></div></div><span id="edu-lvl">1</span></div>
      <div class="skill-row"><span>💻 Tech</span><div class="skill-bar-bg"><div class="skill-fill" id="tech-fill" style="width: 10%;"></div></div><span id="tech-lvl">1</span></div>
      <div class="skill-row"><span>🎨 Creativity</span><div class="skill-bar-bg"><div class="skill-fill" id="crea-fill" style="width: 10%;"></div></div><span id="crea-lvl">1</span></div>
      <div class="skill-row"><span>❤️ Wellness</span><div class="skill-bar-bg"><div class="skill-fill" id="well-fill" style="width: 10%;"></div></div><span id="well-lvl">1</span></div>
      <div class="money-display">💰 $<span id="money-display">50</span> | Day <span id="day-display">1</span></div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="story-tag" id="story-tag">🏠 Click to move, interact with objects to build your future.</div>
    <div style="display: flex; align-items: center; gap: 10px;">
      <span class="action-hint" id="interact-hint">🖱️ Click object to use</span>
      <button id="restart-btn">🔄 New Life</button>
    </div>
  </div>
</div>

<script>
  // ----- MY FUTURE ROOM : Design Your Future Life -----
  const { Engine, World, Bodies, Body, Events } = Matter;

  // --- Game State ---
  let engine, world;
  let player;
  let furniture = [];        // objects in room
  let targetX = null;       // movement target
  let playerAction = null;  // current interaction {object, type, timer}
  const INTERACT_TIME = 120; // frames to complete action (~2 sec at 60fps)
  
  // Needs (0-100)
  let hunger = 100;
  let energy = 100;
  let fun = 80;
  const NEED_DECAY = 0.03;  // per frame
  
  // Skills (1-10)
  let skills = { education: 1, tech: 1, creativity: 1, wellness: 1 };
  let money = 50;
  let day = 1;
  
  // Room upgrades (affects furniture appearance & skill gain)
  let roomLevel = 1;  // 1-4 based on total skills
  const upgradeCosts = [0, 80, 200, 400]; // cost to upgrade to next level
  
  // Animation
  let walkFrame = 0;
  let interactionProgress = 0; // 0-1 for progress bar
  
  // --- p5.js Setup ---
  function setup() {
    const canvas = createCanvas(900, 600);
    canvas.parent('game-container');
    
    // Matter.js
    engine = Engine.create();
    world = engine.world;
    engine.gravity.y = 0;
    
    // Create player (small circle)
    player = Bodies.circle(200, 300, 16, {
      label: 'player',
      friction: 0.1,
      restitution: 0,
      mass: 2
    });
    World.add(world, player);
    Body.setInertia(player, Infinity);
    
    // Create room objects (static sensors)
    createFurniture();
    
    // Collision events
    Events.on(engine, 'collisionStart', handleCollisionStart);
    
    updateUI();
  }
  
  function createFurniture() {
    // Remove old furniture bodies from world
    for (let f of furniture) World.remove(world, f.body);
    furniture = [];
    
    // Define objects based on room level
    const baseY = 400;
    const objects = [
      { x: 120, y: baseY, w: 40, h: 60, label: 'bed', icon: '🛏️', action: 'sleep', skill: null, needRestore: {energy: 60}, color: [100, 80, 140] },
      { x: 280, y: baseY-10, w: 35, h: 50, label: 'bookshelf', icon: '📚', action: 'study', skill: 'education', needCost: {energy: 8, fun: 5}, color: [139, 90, 43] },
      { x: 440, y: baseY-10, w: 35, h: 40, label: 'computer', icon: '💻', action: 'work', skill: 'tech', needCost: {energy: 10, fun: 7}, color: [70, 70, 90], alsoEarn: true },
      { x: 580, y: baseY-10, w: 30, h: 45, label: 'easel', icon: '🎨', action: 'paint', skill: 'creativity', needCost: {energy: 6, fun: -10}, color: [200, 120, 80] },
      { x: 720, y: baseY-5, w: 30, h: 20, label: 'fridge', icon: '🍎', action: 'eat', skill: null, needRestore: {hunger: 45}, color: [200, 200, 210] },
      { x: 800, y: baseY-15, w: 30, h: 25, label: 'radio', icon: '📻', action: 'dance', skill: 'wellness', needCost: {energy: 5, fun: -15}, color: [180, 150, 120] }
    ];
    
    // Upgrade visuals: later levels add yoga mat or change sizes
    if (roomLevel >= 2) {
      objects.push({ x: 660, y: baseY+5, w: 35, h: 10, label: 'yoga', icon: '🧘', action: 'exercise', skill: 'wellness', needCost: {energy: 8, fun: 4}, color: [150, 100, 200] });
    }
    
    for (let obj of objects) {
      let body = Bodies.rectangle(obj.x, obj.y, obj.w, obj.h, {
        isStatic: true,
        isSensor: true,
        label: obj.label,
        furnitureData: obj
      });
      World.add(world, body);
      furniture.push({ body, ...obj });
    }
  }
  
  function handleCollisionStart(event) {
    const pairs = event.pairs;
    for (let pair of pairs) {
      const bodyA = pair.bodyA;
      const bodyB = pair.bodyB;
      if (bodyA.label === 'player' && bodyB.isSensor) {
        // Player touched furniture – if not already doing an action, auto-start?
        // We'll handle interaction via click, not auto.
      }
    }
  }
  
  // --- Game Loop ---
  function draw() {
    background(25, 30, 50);
    
    // Update physics
    Engine.update(engine, 1000 / 60);
    
    // Player movement towards target
    if (targetX !== null && !playerAction) {
      const dx = targetX - player.position.x;
      if (abs(dx) > 2) {
        Body.setVelocity(player, { x: dx * 0.1, y: 0 });
        walkFrame += 0.2;
      } else {
        Body.setVelocity(player, { x: 0, y: 0 });
        targetX = null;
        walkFrame = 0;
      }
    } else if (!playerAction) {
      Body.setVelocity(player, { x: 0, y: 0 });
      walkFrame = 0;
    }
    
    // Needs decay
    if (!playerAction || playerAction.action !== 'sleep') {
      hunger = max(0, hunger - NEED_DECAY * 0.7);
      energy = max(0, energy - NEED_DECAY * 0.5);
      fun = max(0, fun - NEED_DECAY * 0.4);
    }
    
    // Action progress
    if (playerAction) {
      playerAction.timer--;
      interactionProgress = 1 - (playerAction.timer / INTERACT_TIME);
      if (playerAction.timer <= 0) {
        completeAction(playerAction);
        playerAction = null;
        interactionProgress = 0;
      }
    }
    
    // Draw room
    drawRoom();
    
    // Draw furniture
    for (let f of furniture) {
      drawFurniture(f);
    }
    
    // Draw player
    drawPlayer();
    
    // Draw interaction progress bar if active
    if (playerAction) {
      drawProgressBar();
    }
    
    // Update UI every frame (could throttle)
    updateUI();
    
    // Day cycle: if energy < 10 and player sleeps, day advances (handled in completeAction)
  }
  
  function drawRoom() {
    // Floor
    fill(60, 55, 70);
    rect(0, 430, width, 170);
    // Wall
    fill(45, 40, 55);
    rect(0, 0, width, 430);
    // Baseboard
    fill(80, 70, 90);
    rect(0, 420, width, 15);
    
    // Window
    fill(120, 180, 220, 80);
    rect(50, 120, 100, 130, 10);
    fill(180, 220, 255, 60);
    rect(55, 125, 90, 120);
    
    // Room level decorations
    if (roomLevel >= 2) {
      fill(100, 140, 100, 60);
      rect(750, 180, 70, 100, 8); // plant
    }
    if (roomLevel >= 3) {
      fill(200, 160, 60, 70);
      ellipse(820, 250, 40, 50); // painting
    }
    if (roomLevel >= 4) {
      fill(220, 200, 140, 50);
      rect(680, 150, 50, 50, 5); // certificate
    }
  }
  
  function drawFurniture(f) {
    push();
    translate(f.body.position.x, f.body.position.y);
    fill(f.color);
    rectMode(CENTER);
    if (f.label === 'bed') {
      rect(0, 0, f.w, f.h, 10);
      fill(220, 200, 240, 150);
      rect(0, -15, f.w-10, f.h-30, 6);
    } else if (f.label === 'bookshelf') {
      rect(0, 0, f.w, f.h, 4);
      fill(160, 120, 70);
      for (let i=-15; i<=15; i+=10) rect(0, i, f.w-6, 3);
    } else if (f.label === 'computer') {
      rect(0, 0, f.w, f.h, 6);
      fill(30, 30, 40);
      rect(0, -10, 28, 20, 4);
      fill(100, 200, 255, 80);
      rect(0, -10, 22, 14);
    } else if (f.label === 'easel') {
      rect(0, 0, f.w, f.h, 3);
      fill(220, 180, 140);
      triangle(-12, 15, 0, -20, 12, 15);
    } else if (f.label === 'fridge') {
      rect(0, 0, f.w, f.h, 5);
      fill(180, 180, 190);
      rect(0, -5, f.w-6, f.h-12, 3);
    } else if (f.label === 'radio') {
      rect(0, 0, f.w, f.h, 5);
      fill(60);
      ellipse(0, -5, 10, 10);
    } else if (f.label === 'yoga') {
      fill(150, 100, 200);
      rect(0, 0, f.w, f.h, 5);
    }
    // Icon
    fill(255);
    textSize(16);
    textAlign(CENTER, CENTER);
    text(f.icon, 0, -f.h/2-10);
    pop();
  }
  
  function drawPlayer() {
    push();
    translate(player.position.x, player.position.y);
    
    // Shadow
    fill(0, 0, 0, 30);
    ellipse(0, 20, 24, 8);
    
    // Walking animation
    let legSwing = sin(walkFrame) * 8;
    
    // Body
    fill(255, 200, 150);
    ellipse(0, -10, 18, 22);
    
    // Head
    fill(255, 210, 170);
    ellipse(0, -28, 18, 20);
    // Hair
    fill(60, 40, 20);
    arc(0, -34, 20, 10, PI, TWO_PI);
    // Eyes
    fill(30);
    ellipse(-4, -29, 3, 4);
    ellipse(4, -29, 3, 4);
    
    // Arms
    stroke(255, 200, 150);
    strokeWeight(3);
    line(-10, -12, -20, 0);
    line(10, -12, 20, 0);
    noStroke();
    
    // Legs
    stroke(80, 60, 120);
    strokeWeight(4);
    line(-6, 8, -8 + legSwing*0.5, 22);
    line(6, 8, 8 - legSwing*0.5, 22);
    noStroke();
    
    // Shoes
    fill(40);
    ellipse(-8 + legSwing*0.5, 24, 8, 5);
    ellipse(8 - legSwing*0.5, 24, 8, 5);
    
    pop();
  }
  
  function drawProgressBar() {
    if (!playerAction) return;
    let obj = playerAction.object;
    push();
    translate(obj.body.position.x, obj.body.position.y - 40);
    fill(0, 0, 0, 150);
    rectMode(CENTER);
    rect(0, 0, 40, 8, 4);
    fill(255, 200, 0);
    rect(0, 0, 38 * interactionProgress, 6, 3);
    pop();
  }
  
  function completeAction(action) {
    const obj = action.object;
    const data = obj.furnitureData;
    
    // Apply need changes
    if (data.needRestore) {
      if (data.needRestore.hunger) hunger = min(100, hunger + data.needRestore.hunger);
      if (data.needRestore.energy) energy = min(100, energy + data.needRestore.energy);
      if (data.needRestore.fun) fun = min(100, fun + data.needRestore.fun);
    }
    if (data.needCost) {
      if (data.needCost.hunger) hunger = max(0, hunger - data.needCost.hunger);
      if (data.needCost.energy) energy = max(0, energy - data.needCost.energy);
      if (data.needCost.fun) fun = max(0, fun - data.needCost.fun);
    }
    
    // Skill gain
    if (data.skill) {
      skills[data.skill] = min(10, skills[data.skill] + 1);
    }
    
    // Earn money if work
    if (data.alsoEarn) {
      money += 20 + skills.tech * 5;
    }
    
    // Check if sleep ends day
    if (data.action === 'sleep') {
      day++;
      energy = 100;
      document.getElementById('story-tag').innerText = `🌅 Day ${day} begins! Your future grows brighter.`;
    } else {
      document.getElementById('story-tag').innerText = `✨ ${data.icon} Used! Keep designing your future.`;
    }
    
    // Check room upgrade
    let totalSkills = skills.education + skills.tech + skills.creativity + skills.wellness;
    let newLevel = 1 + floor(totalSkills / 8);
    if (newLevel > roomLevel && money >= upgradeCosts[newLevel]) {
      money -= upgradeCosts[newLevel];
      roomLevel = newLevel;
      createFurniture(); // refresh objects
      document.getElementById('story-tag').innerText = `🏠 Room upgraded! Level ${roomLevel}`;
    }
    
    updateUI();
  }
  
  function updateUI() {
    document.getElementById('hunger-fill').style.width = hunger + '%';
    document.getElementById('energy-fill').style.width = energy + '%';
    document.getElementById('fun-fill').style.width = fun + '%';
    
    document.getElementById('edu-fill').style.width = (skills.education * 10) + '%';
    document.getElementById('tech-fill').style.width = (skills.tech * 10) + '%';
    document.getElementById('crea-fill').style.width = (skills.creativity * 10) + '%';
    document.getElementById('well-fill').style.width = (skills.wellness * 10) + '%';
    document.getElementById('edu-lvl').innerText = skills.education;
    document.getElementById('tech-lvl').innerText = skills.tech;
    document.getElementById('crea-lvl').innerText = skills.creativity;
    document.getElementById('well-lvl').innerText = skills.wellness;
    document.getElementById('money-display').innerText = money;
    document.getElementById('day-display').innerText = day;
  }
  
  // --- Interaction ---
  function mousePressed() {
    if (playerAction) return; // busy
    
    // Check if click is on furniture
    for (let f of furniture) {
      let d = dist(mouseX, mouseY, f.body.position.x, f.body.position.y);
      if (d < 35) {
        // Move player to object
        targetX = f.body.position.x;
        // Start interaction after reaching
        playerAction = { object: f, action: f.action, timer: INTERACT_TIME };
        document.getElementById('interact-hint').innerText = `⏳ Using ${f.icon}...`;
        return;
      }
    }
    
    // Otherwise move player
    targetX = mouseX;
    playerAction = null;
    interactionProgress = 0;
  }
  
  function restartGame() {
    // Reset all state
    hunger = 100; energy = 100; fun = 80;
    skills = { education: 1, tech: 1, creativity: 1, wellness: 1 };
    money = 50; day = 1; roomLevel = 1;
    targetX = null; playerAction = null; interactionProgress = 0;
    Body.setPosition(player, { x: 200, y: 300 });
    Body.setVelocity(player, { x: 0, y: 0 });
    createFurniture();
    updateUI();
    document.getElementById('story-tag').innerText = '🏠 New life! Click to move and interact.';
  }
  
  document.getElementById('restart-btn').addEventListener('click', restartGame);
  
  // Prevent default for arrow keys etc (not needed but good)
  window.addEventListener('keydown', (e) => {
    if ([32, 37, 38, 39, 40].includes(e.keyCode)) e.preventDefault();
  });
</script>
</body>
</html>
