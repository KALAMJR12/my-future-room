<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Future Room • Design Your Future</title>
  

  <!-- CSS STYLES                                    -->

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      overflow: hidden;
    }
    
    .game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: 1000px;
      max-height: 650px;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 3px rgba(255,215,0,0.3);
    }
    
    canvas {
      display: block;
    }
    
    /* Overlay UI elements drawn via p5.js canvas */
    /* No additional HTML UI needed - all drawn on canvas */
  </style>
</head>
<body>
  <div class="game-container" id="game-container"></div>
  
  <!-- External Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  
 
  <!-- JAVASCRIPT GAME LOGIC                         -->

  <script>

    // SECTION 1: AUDIO SYSTEM

    const AudioSystem = {
      ctx: null,
      enabled: true,
      
      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      },
      
      play(frequency, type = 'sine', duration = 0.15, volume = 0.3, delay = 0) {
        if (!this.enabled || !this.ctx) return;
        try {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.frequency.value = frequency;
          osc.type = type;
          const startTime = this.ctx.currentTime + delay;
          gain.gain.setValueAtTime(volume, startTime);
          gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
          osc.start(startTime);
          osc.stop(startTime + duration);
        } catch (e) {
          // Silently fail
        }
      },
      
      click() { this.play(800, 'sine', 0.1, 0.2); },
      footstep() { this.play(60 + Math.random() * 40, 'sine', 0.05, 0.08); },
      actionStart() { this.play(440, 'triangle', 0.2, 0.3); this.play(660, 'triangle', 0.2, 0.3); },
      actionComplete() { this.play(523, 'sine', 0.15, 0.3); this.play(659, 'sine', 0.15, 0.3, 0.1); this.play(784, 'sine', 0.2, 0.4, 0.2); },
      upgrade() { this.play(330, 'sawtooth', 0.3, 0.2); this.play(440, 'sawtooth', 0.3, 0.2, 0.15); this.play(660, 'sawtooth', 0.4, 0.3, 0.3); },
      sleep() { this.play(200, 'sine', 0.8, 0.15); },
      achievement() { this.play(523, 'sine', 0.1, 0.3); this.play(659, 'sine', 0.1, 0.3, 0.1); this.play(784, 'sine', 0.1, 0.3, 0.2); this.play(1047, 'sine', 0.2, 0.4, 0.3); },
      eventGood() { this.play(440, 'sine', 0.1, 0.3); this.play(554, 'sine', 0.1, 0.3, 0.1); this.play(659, 'sine', 0.15, 0.3, 0.2); },
      eventBad() { this.play(200, 'sawtooth', 0.3, 0.15); this.play(150, 'sawtooth', 0.3, 0.15, 0.15); },
      toggle() { this.enabled = !this.enabled; return this.enabled; }
    };


    // SECTION 2: PARTICLE SYSTEM

    const ParticleSystem = {
      particles: [],
      
      emit(x, y, count, color, speed = 2, life = 30) {
        for (let i = 0; i < count; i++) {
          this.particles.push({
            x, y,
            vx: (Math.random() - 0.5) * speed * 2,
            vy: (Math.random() - 1) * speed * 2,
            life: life + Math.random() * 20,
            maxLife: life + 20,
            color,
            size: 2 + Math.random() * 3
          });
        }
      },
      
      emitSparkles(x, y, count = 8) {
        this.emit(x, y, count, [255, 215, 0], 1.5, 25);
      },
      
      emitConfetti(x, y, count = 20) {
        const colors = [[255, 100, 100], [100, 255, 100], [100, 100, 255], [255, 255, 100], [255, 100, 255]];
        for (let i = 0; i < count; i++) {
          const col = colors[Math.floor(Math.random() * colors.length)];
          this.emit(x, y - 50, 1, col, 3, 40);
        }
      },
      
      update() {
        for (let i = this.particles.length - 1; i >= 0; i--) {
          const p = this.particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.05; // gravity
          p.life--;
          if (p.life <= 0) this.particles.splice(i, 1);
        }
      },
      
      draw() {
        noStroke();
        for (const p of this.particles) {
          const alpha = map(p.life, 0, p.maxLife, 0, 255);
          fill(p.color[0], p.color[1], p.color[2], alpha);
          ellipse(p.x, p.y, p.size);
        }
      }
    };


    // SECTION 3: FLOATING TEXT SYSTEM

    const FloatingTextSystem = {
      texts: [],
      
      add(x, y, text, color = [255, 255, 200], size = 14) {
        this.texts.push({
          x, y,
          text,
          color,
          size,
          life: 80,
          maxLife: 80,
          vy: -1.5
        });
      },
      
      addSkillGain(x, y, skill, amount) {
        const skillColors = {
          education: [100, 180, 255],
          tech: [100, 200, 200],
          creativity: [255, 150, 200],
          wellness: [100, 220, 150]
        };
        const col = skillColors[skill] || [255, 215, 0];
        this.add(x, y - 30, `+${amount} ${skill.charAt(0).toUpperCase() + skill.slice(1)}`, col, 13);
      },
      
      addMoneyGain(x, y, amount) {
        this.add(x, y - 20, `+$${amount}`, [255, 215, 0], 12);
      },
      
      update() {
        for (let i = this.texts.length - 1; i >= 0; i--) {
          const t = this.texts[i];
          t.y += t.vy;
          t.life--;
          if (t.life <= 0) this.texts.splice(i, 1);
        }
      },
      
      draw() {
        for (const t of this.texts) {
          const alpha = map(t.life, 0, t.maxLife, 0, 255);
          fill(t.color[0], t.color[1], t.color[2], alpha);
          textSize(t.size);
          textAlign(CENTER);
          text(t.text, t.x, t.y);
        }
      }
    };

    
    // SECTION 4: ACHIEVEMENT SYSTEM

    const AchievementSystem = {
      achievements: [
        { id: 'bookworm', name: '📚 Bookworm', desc: 'Education level 10', check: (s) => s.education >= 10, unlocked: false },
        { id: 'techie', name: '💻 Techie', desc: 'Earn $200 total', check: (s, m) => m >= 200, unlocked: false, trackMoney: true },
        { id: 'artist', name: '🎨 Artist', desc: 'Creativity level 10', check: (s) => s.creativity >= 10, unlocked: false },
        { id: 'yogi', name: '🧘 Yogi', desc: 'Wellness level 10', check: (s) => s.wellness >= 10, unlocked: false },
        { id: 'balanced', name: '⚖️ Balanced Life', desc: 'All skills above 5', check: (s) => s.education >= 5 && s.tech >= 5 && s.creativity >= 5 && s.wellness >= 5, unlocked: false },
        { id: 'rich', name: '💰 Wealth Builder', desc: 'Save $500', check: (s, m) => m >= 500, unlocked: false, trackMoney: true },
        { id: 'survivor', name: '🏆 Survivor', desc: 'Reach Day 20', check: (s, m, d) => d >= 20, unlocked: false, trackDay: true },
        { id: 'designer', name: '✨ Future Designer', desc: 'Room Level 4', check: (s, m, d, r) => r >= 4, unlocked: false, trackRoom: true },
      ],
      recentlyUnlocked: null,
      recentTimer: 0,
      totalMoneyEarned: 0,
      
      check(skills, money, day, roomLevel) {
        for (const ach of this.achievements) {
          if (!ach.unlocked) {
            let result = false;
            if (ach.trackMoney) result = ach.check(skills, this.totalMoneyEarned);
            else if (ach.trackDay) result = ach.check(skills, money, day);
            else if (ach.trackRoom) result = ach.check(skills, money, day, roomLevel);
            else result = ach.check(skills);
            
            if (result) {
              ach.unlocked = true;
              this.recentlyUnlocked = ach;
              this.recentTimer = 200;
              AudioSystem.achievement();
              ParticleSystem.emitConfetti(500, 300);
              return ach;
            }
          }
        }
        return null;
      },
      
      addMoney(amount) {
        this.totalMoneyEarned += amount;
      },
      
      getUnlockedCount() {
        return this.achievements.filter(a => a.unlocked).length;
      },
      
      getTotalCount() {
        return this.achievements.length;
      }
    };


    // SECTION 5: RANDOM EVENTS SYSTEM
    
    const EventSystem = {
      events: [
        { type: 'good', text: '🌟 A mentor visited! +8 Education', effect: { education: 8 }, weight: 3 },
        { type: 'good', text: '💡 Brilliant idea! +6 Tech', effect: { tech: 6 }, weight: 3 },
        { type: 'good', text: '🎨 Creative surge! +8 Creativity', effect: { creativity: 8 }, weight: 3 },
        { type: 'good', text: '🧘 Peaceful morning! +8 Wellness', effect: { wellness: 8 }, weight: 3 },
        { type: 'good', text: '💰 Found money on the street! +$30', effect: { money: 30 }, weight: 4 },
        { type: 'good', text: '🍕 Friend brought pizza! +25 Hunger', effect: { hunger: 25 }, weight: 3 },
        { type: 'good', text: '🎉 Surprise party! +20 Fun', effect: { fun: 20 }, weight: 3 },
        { type: 'bad', text: '😴 Exhaustion hits! -15 Energy', effect: { energy: -15 }, weight: 3 },
        { type: 'bad', text: '🔧 Computer crashed! -5 Tech', effect: { tech: -5 }, weight: 2 },
        { type: 'bad', text: '💸 Unexpected bill! -$20', effect: { money: -20 }, weight: 3 },
        { type: 'bad', text: '🤧 Got a cold! -10 Wellness', effect: { wellness: -10 }, weight: 2 },
        { type: 'neutral', text: '📖 A quiet day for reflection...', effect: {}, weight: 5 },
        { type: 'neutral', text: '🌤️ The weather is beautiful today.', effect: {}, weight: 5 },
      ],
      cooldown: 0,
      currentEvent: null,
      eventTimer: 0,
      
      tryTrigger() {
        if (this.cooldown > 0) {
          this.cooldown--;
          return null;
        }
        
        // Random chance to trigger (roughly every 15-25 seconds)
        if (Math.random() < 0.003) {
          const totalWeight = this.events.reduce((sum, e) => sum + e.weight, 0);
          let roll = Math.random() * totalWeight;
          for (const event of this.events) {
            roll -= event.weight;
            if (roll <= 0) {
              this.currentEvent = event;
              this.eventTimer = 180;
              this.cooldown = 300;
              if (event.type === 'good') AudioSystem.eventGood();
              else if (event.type === 'bad') AudioSystem.eventBad();
              return event;
            }
          }
        }
        return null;
      },
      
      applyEffect(skills, needs, money) {
        if (!this.currentEvent) return;
        const eff = this.currentEvent.effect;
        if (eff.education) skills.education = constrain(skills.education + eff.education, 0, 100);
        if (eff.tech) skills.tech = constrain(skills.tech + eff.tech, 0, 100);
        if (eff.creativity) skills.creativity = constrain(skills.creativity + eff.creativity, 0, 100);
        if (eff.wellness) skills.wellness = constrain(skills.wellness + eff.wellness, 0, 100);
        if (eff.hunger) needs.hunger = constrain(needs.hunger + eff.hunger, 0, 100);
        if (eff.energy) needs.energy = constrain(needs.energy + eff.energy, 0, 100);
        if (eff.fun) needs.fun = constrain(needs.fun + eff.fun, 0, 100);
        if (eff.money) money += eff.money;
      }
    };


    // SECTION 6: GOALS SYSTEM (NPC Quests)

    const GoalSystem = {
      goals: [
        { text: '📚 Study 3 times', type: 'action', target: 'Study', count: 3, reward: 30, progress: 0 },
        { text: '💻 Work 2 times', type: 'action', target: 'Work / Code', count: 2, reward: 25, progress: 0 },
        { text: '🎨 Paint 2 times', type: 'action', target: 'Paint', count: 2, reward: 25, progress: 0 },
        { text: '🧘 Exercise 2 times', type: 'action', target: 'Exercise', count: 2, reward: 25, progress: 0 },
        { text: '💰 Earn $50', type: 'money', target: 50, count: 1, reward: 20, progress: 0 },
        { text: '📈 Reach Education 5', type: 'skill', skill: 'education', target: 5, count: 1, reward: 40, progress: 0 },
        { text: '📈 Reach Tech 5', type: 'skill', skill: 'tech', target: 5, count: 1, reward: 40, progress: 0 },
      ],
      activeGoal: null,
      completed: false,
      
      pickNewGoal() {
        const available = this.goals.filter(g => {
          if (g.type === 'skill') return true; // Always available
          return true;
        });
        this.activeGoal = { ...available[Math.floor(Math.random() * available.length)], progress: 0 };
        this.completed = false;
      },
      
      checkProgress(actionName, skills, moneyEarned) {
        if (!this.activeGoal || this.completed) return false;
        
        if (this.activeGoal.type === 'action' && actionName === this.activeGoal.target) {
          this.activeGoal.progress++;
        } else if (this.activeGoal.type === 'money') {
          this.activeGoal.progress += moneyEarned;
        } else if (this.activeGoal.type === 'skill' && this.activeGoal.skill) {
          this.activeGoal.progress = skills[this.activeGoal.skill];
        }
        
        if (this.activeGoal.progress >= this.activeGoal.count) {
          this.completed = true;
          return true;
        }
        return false;
      },
      
      getReward() {
        return this.activeGoal ? this.activeGoal.reward : 0;
      }
    };


    // SECTION 7: JOURNAL SYSTEM

    const JournalSystem = {
      entries: [],
      showJournal: false,
      
      addEntry(text) {
        this.entries.unshift({
          day,
          text,
          timestamp: frameCount
        });
        // Keep only last 20 entries
        if (this.entries.length > 20) this.entries.pop();
      },
      
      generateDailySummary() {
        const skillNames = ['education', 'tech', 'creativity', 'wellness'];
        const highest = skillNames.reduce((a, b) => skills[a] > skills[b] ? a : b);
        const summaries = {
          education: 'I spent time learning today. Knowledge is power!',
          tech: 'Technology filled my day. The future is digital!',
          creativity: 'Art and creativity flowed through me today.',
          wellness: 'I took care of my body and mind today.',
        };
        return summaries[highest] || 'Another day of growth and progress.';
      },
      
      toggle() {
        this.showJournal = !this.showJournal;
        AudioSystem.click();
      }
    };


    // SECTION 8: GAME STATE

    let room = {
      bgColor: [220, 230, 240],
      wallColor: [245, 240, 230],
      floorColor: [180, 160, 140],
      upgradeLevel: 0,
    };

    let character = {
      x: 400, y: 380,
      targetX: 400, targetY: 380,
      moving: false,
      action: null,
      actionObj: null,
      actionTimer: 0,
      actionDuration: 120,
      facingRight: true,
      walkCycle: 0,
      idleTimer: 0,
      blinkTimer: 0,
      isBlinking: false,
      sleeping: false,
    };

    let skills = {
      education: 0,
      tech: 0,
      creativity: 0,
      wellness: 0,
    };
    let money = 50;
    let day = 1;
    let dayTimer = 0;
    const DAY_LENGTH = 600;

    let needs = {
      hunger: 100,
      energy: 100,
      fun: 100,
    };
    const NEED_DECAY = 0.03;

    let objects = [];
    let message = "Click an object to start designing your future!";
    let messageTimer = 0;
    let actionProgress = 0;
    let showProgress = false;
    const upgradeThresholds = [20, 50, 100, 160];

    // Time of day
    let timeOfDay = 0; // 0-1, 0=dawn, 0.25=noon, 0.5=dusk, 0.75=night
    let isNighttime = false;

    // Cutscene
    let cutscene = null;
    let cutsceneTimer = 0;


    // SECTION 9: P5.JS SETUP

    function setup() {
      let canvas = createCanvas(1000, 600);
      canvas.parent('game-container');
      
      initObjects();
      updateRoomAppearance();
      GoalSystem.pickNewGoal();
      JournalSystem.addEntry('🏠 Day 1: A new beginning. I moved into my future room.');
    }

    function initObjects() {
      objects = [
        {
          name: 'Bookshelf',
          x: 150, y: 310, w: 60, h: 90,
          action: 'Study',
          skill: 'education',
          skillGain: 2,
          needEffect: { fun: -5, energy: -8 },
          moneyGain: 0,
          description: '📚 Study to gain Education',
          color: [139, 90, 43],
          icon: '📚',
        },
        {
          name: 'Computer Desk',
          x: 380, y: 340, w: 70, h: 50,
          action: 'Work / Code',
          skill: 'tech',
          skillGain: 2,
          needEffect: { fun: -3, energy: -10 },
          moneyGain: 15,
          description: '💻 Work to earn money & Tech',
          color: [80, 80, 100],
          icon: '💻',
        },
        {
          name: 'Easel',
          x: 620, y: 320, w: 50, h: 80,
          action: 'Paint',
          skill: 'creativity',
          skillGain: 2,
          needEffect: { fun: 10, energy: -5 },
          moneyGain: 0,
          description: '🎨 Paint to boost Creativity',
          color: [200, 150, 100],
          icon: '🎨',
        },
        {
          name: 'Yoga Mat',
          x: 800, y: 390, w: 70, h: 20,
          action: 'Exercise',
          skill: 'wellness',
          skillGain: 2,
          needEffect: { energy: -12, fun: 2 },
          moneyGain: 0,
          description: '🧘 Exercise for Wellness',
          color: [100, 180, 120],
          icon: '🧘',
        },
        {
          name: 'Fridge',
          x: 80, y: 360, w: 50, h: 60,
          action: 'Eat',
          skill: null,
          skillGain: 0,
          needEffect: { hunger: 35, energy: 5 },
          moneyGain: 0,
          description: '🍎 Eat to restore Hunger',
          color: [220, 220, 220],
          icon: '🍎',
        },
        {
          name: 'Bed',
          x: 520, y: 350, w: 100, h: 40,
          action: 'Sleep',
          skill: null,
          skillGain: 0,
          needEffect: { energy: 40, hunger: -5 },
          moneyGain: 0,
          description: '🛏️ Sleep to restore Energy & advance day',
          color: [180, 140, 200],
          icon: '🛏️',
        },
        {
          name: 'Radio',
          x: 280, y: 400, w: 40, h: 30,
          action: 'Listen Music',
          skill: null,
          skillGain: 0,
          needEffect: { fun: 25, energy: -3 },
          moneyGain: 0,
          description: '🎵 Relax to gain Fun',
          color: [200, 100, 100],
          icon: '🎵',
        },
      ];
    }

   
    // SECTION 10: MOUSE INTERACTION
 
    function mousePressed() {
      AudioSystem.init();
      
      // Check for journal toggle (top-right corner)
      if (mouseX > width - 60 && mouseY < 60) {
        JournalSystem.toggle();
        return;
      }
      
      // Check for sound toggle
      if (mouseX > width - 110 && mouseY < 60 && mouseX < width - 65) {
        const enabled = AudioSystem.toggle();
        message = enabled ? '🔊 Sound ON' : '🔇 Sound OFF';
        messageTimer = 120;
        return;
      }
      
      if (JournalSystem.showJournal) {
        JournalSystem.showJournal = false;
        return;
      }
      
      if (character.moving || character.action) return;
      if (cutscene) return;
      
      // Check if clicked on any object
      for (let obj of objects) {
        if (mouseX > obj.x && mouseX < obj.x + obj.w &&
            mouseY > obj.y && mouseY < obj.y + obj.h) {
          AudioSystem.click();
          let targetX = obj.x + obj.w/2;
          let targetY = obj.y - 30;
          startCharacterAction(obj, targetX, targetY);
          return;
        }
      }
    }

    function startCharacterAction(obj, tx, ty) {
      if (character.moving || character.action) return;
      
      character.targetX = tx;
      character.targetY = ty;
      character.moving = true;
      character.actionObj = obj;
    }

    function performAction() {
      let obj = character.actionObj;
      if (!obj) return;
      
      // Apply skill gain
      if (obj.skill && skills[obj.skill] !== undefined) {
        const oldSkill = skills[obj.skill];
        skills[obj.skill] = min(skills[obj.skill] + obj.skillGain, 100);
        if (skills[obj.skill] > oldSkill) {
          FloatingTextSystem.addSkillGain(character.x, character.y, obj.skill, obj.skillGain);
          ParticleSystem.emitSparkles(character.x, character.y - 30);
        }
      }
      
      // Apply need effects
      for (let need in obj.needEffect) {
        needs[need] = constrain(needs[need] + obj.needEffect[need], 0, 100);
      }
      
      // Money
      if (obj.moneyGain > 0) {
        money += obj.moneyGain;
        AchievementSystem.addMoney(obj.moneyGain);
        FloatingTextSystem.addMoneyGain(character.x, character.y, obj.moneyGain);
      }
      if (money < 0) money = 0;
      
      // Check goals
      const goalCompleted = GoalSystem.checkProgress(obj.action, skills, obj.moneyGain);
      if (goalCompleted) {
        const reward = GoalSystem.getReward();
        money += reward;
        message = `✅ Goal complete! +$${reward} reward!`;
        messageTimer = 240;
        ParticleSystem.emitConfetti(500, 300);
        AudioSystem.achievement();
        GoalSystem.pickNewGoal();
      }
      
      // Check achievements
      const ach = AchievementSystem.check(skills, money, day, room.upgradeLevel);
      if (ach) {
        message = `🏆 Achievement: ${ach.name}!`;
        messageTimer = 300;
      }
      
      // Message
      message = obj.description;
      messageTimer = 180;
      
      // Check upgrades
      checkRoomUpgrade();
      
      // Handle sleep
      if (obj.action === 'Sleep') {
        character.sleeping = true;
        AudioSystem.sleep();
        cutscene = 'sleeping';
        cutsceneTimer = 180;
        JournalSystem.addEntry(`😴 Day ${day}: ${JournalSystem.generateDailySummary()}`);
      }
      
      // Advance day timer
      dayTimer += 30;
      if (dayTimer >= DAY_LENGTH) {
        dayTimer = 0;
        day++;
        message = `☀️ Day ${day} - Your future grows brighter!`;
        messageTimer = 240;
        timeOfDay = 0;
        JournalSystem.addEntry(`☀️ Day ${day}: ${JournalSystem.generateDailySummary()}`);
      }
      
      // Update time of day
      timeOfDay = (timeOfDay + 0.08) % 1;
      isNighttime = timeOfDay > 0.6;
      
      AudioSystem.actionComplete();
    }

    function checkRoomUpgrade() {
      let total = skills.education + skills.tech + skills.creativity + skills.wellness;
      let newLevel = 0;
      for (let i = upgradeThresholds.length - 1; i >= 0; i--) {
        if (total >= upgradeThresholds[i]) {
          newLevel = i + 1;
          break;
        }
      }
      if (newLevel > room.upgradeLevel) {
        room.upgradeLevel = newLevel;
        updateRoomAppearance();
        message = `✨ Room upgraded to Level ${newLevel}!`;
        messageTimer = 300;
        ParticleSystem.emitConfetti(500, 200);
        AudioSystem.upgrade();
        cutscene = 'upgrade';
        cutsceneTimer = 120;
        JournalSystem.addEntry(`✨ Room upgraded to Level ${newLevel}!`);
      }
    }

    function updateRoomAppearance() {
      let lvl = room.upgradeLevel;
      room.wallColor = [
        lerp(245, 255, lvl/4),
        lerp(240, 248, lvl/4),
        lerp(230, 240, lvl/4)
      ];
      room.floorColor = [
        lerp(180, 210, lvl/4),
        lerp(160, 190, lvl/4),
        lerp(140, 170, lvl/4)
      ];
      room.bgColor = [
        lerp(220, 190, lvl/4),
        lerp(230, 210, lvl/4),
        lerp(240, 230, lvl/4)
      ];
    }


    // SECTION 11: GAME LOOP

    function draw() {
      // Handle night overlay
      if (isNighttime) {
        background(
          lerp(room.bgColor[0], 30, 0.5),
          lerp(room.bgColor[1], 40, 0.5),
          lerp(room.bgColor[2], 60, 0.5)
        );
      } else {
        background(room.bgColor);
      }
      
      // Handle cutscenes
      if (cutscene) {
        handleCutscene();
        drawUI();
        return;
      }
      
      // Update systems
      updateNeeds();
      updateCharacter();
      ParticleSystem.update();
      FloatingTextSystem.update();
      
      // Random events
      const event = EventSystem.tryTrigger();
      if (event) {
        EventSystem.applyEffect(skills, needs, money);
        message = event.text;
        messageTimer = 240;
      }
      
      // Draw everything
      drawRoom();
      
      for (let obj of objects) {
        drawObject(obj);
        drawObjectTooltip(obj);
      }
      
      drawCharacter();
      ParticleSystem.draw();
      FloatingTextSystem.draw();
      
      if (showProgress && character.action) {
        drawProgressBar();
      }
      
      // Character accessories based on skills
      drawCharacterAccessories();
      
      drawUI();
      
      // Message timer
      if (messageTimer > 0) {
        messageTimer--;
        if (messageTimer <= 0) message = "";
      }
      
      // Event timer
      if (EventSystem.eventTimer > 0) {
        EventSystem.eventTimer--;
        if (EventSystem.eventTimer <= 0) EventSystem.currentEvent = null;
      }
    }

    function handleCutscene() {
      cutsceneTimer--;
      
      if (cutscene === 'sleeping') {
        // Dark overlay
        fill(0, 0, 30, 200);
        rect(0, 0, width, height);
        fill(255);
        textSize(24);
        textAlign(CENTER);
        text('😴 Sleeping...', width/2, height/2);
        textSize(14);
        text('Z'.repeat(Math.floor((180 - cutsceneTimer) / 20)), width/2, height/2 + 40);
        
        if (cutsceneTimer <= 0) {
          cutscene = null;
          character.sleeping = false;
          day++;
          dayTimer = 0;
          timeOfDay = 0.15;
          isNighttime = false;
          needs.energy = 100;
          message = `☀️ Day ${day} - A new day begins!`;
          messageTimer = 240;
        }
      } else if (cutscene === 'upgrade') {
        fill(0, 0, 0, 150);
        rect(0, 0, width, height);
        fill(255, 215, 0);
        textSize(28);
        textAlign(CENTER);
        text('✨ Room Upgraded! ✨', width/2, height/2);
        textSize(16);
        text(`Level ${room.upgradeLevel}`, width/2, height/2 + 40);
        
        if (cutsceneTimer <= 0) {
          cutscene = null;
        }
      }
    }

    function updateNeeds() {
      if (character.sleeping) return;
      
      needs.hunger = max(0, needs.hunger - NEED_DECAY);
      needs.energy = max(0, needs.energy - NEED_DECAY * 1.2);
      needs.fun = max(0, needs.fun - NEED_DECAY * 0.8);
      
      // Low needs warnings
      if (needs.hunger < 15 && frameCount % 120 === 0) {
        message = '⚠️ You\'re very hungry! Eat something.';
        messageTimer = 120;
      }
      if (needs.energy < 15 && frameCount % 120 === 0) {
        message = '⚠️ You\'re exhausted! Get some sleep.';
        messageTimer = 120;
      }
    }

    function updateCharacter() {
      // Movement
      if (character.moving) {
        let dx = character.targetX - character.x;
        let dy = character.targetY - character.y;
        let dist = sqrt(dx*dx + dy*dy);
        
        if (dist < 3) {
          character.x = character.targetX;
          character.y = character.targetY;
          character.moving = false;
          character.action = character.actionObj;
          character.actionTimer = character.actionDuration;
          showProgress = true;
          actionProgress = 0;
          
          if (character.actionObj.x > character.x) character.facingRight = true;
          else character.facingRight = false;
          
          AudioSystem.actionStart();
        } else {
          let speed = 3;
          character.x += (dx / dist) * speed;
          character.y += (dy / dist) * speed;
          character.facingRight = dx > 0;
          character.walkCycle += 0.3;
          
          if (Math.floor(character.walkCycle) % 8 === 0) {
            AudioSystem.footstep();
          }
        }
      }
      
      // Action timer
      if (character.action) {
        character.actionTimer--;
        actionProgress = 1 - (character.actionTimer / character.actionDuration);
        
        if (character.actionTimer <= 0) {
          performAction();
          character.action = null;
          character.actionObj = null;
          showProgress = false;
          actionProgress = 0;
          character.walkCycle = 0;
        }
      }
      
      // Idle animations
      if (!character.moving && !character.action) {
        character.idleTimer++;
        if (character.idleTimer > 120) {
          character.idleTimer = 0;
        }
        
        // Blinking
        character.blinkTimer++;
        if (character.blinkTimer > 40) {
          character.isBlinking = true;
          if (character.blinkTimer > 45) {
            character.isBlinking = false;
            character.blinkTimer = 0;
          }
        }
      }
    }

    function drawWindow(x, y) {
      // Frame
      fill(180, 210, 240);
      rect(x, y, 120, 150, 10);

        fill(20, 30, 60);
      } else {
        fill(150, 200, 240);
      }
      rect(x + 5, y + 5, 110, 140);
      
      // Stars at night
      if (isNighttime) {
        fill(255, 255, 200);
        for (let i = 0; i < 8; i++) {
          ellipse(x + 20 + i*12, y + 20 + (i%3)*30, 2, 2);
        }
        fill(255, 255, 200, 150);
        ellipse(x + 70, y + 40, 25, 25); // moon
      } else {
        // Sun or clouds
        fill(255, 240, 150);
        ellipse(x + 80, y + 40, 30, 30);
        fill(255, 255, 255, 180);
        ellipse(x + 30, y + 60, 40, 15);
        ellipse(x + 70, y + 80, 50, 18);
      }
      
      // Curtains
      fill(200, 150, 120);
      rect(x - 10, y - 10, 20, 160, 5);

      // Curtain rod
      fill(150, 100, 70);
      rect(x - 15, y - 5, 150, 6, 3);
    }

    function drawClock(x, y) {
      fill(255);
      ellipse(x, y, 45, 45);
      fill(240);
      ellipse(x, y, 38, 38);
      
      // Clock hands
      stroke(50);
      strokeWeight(2);
      let hourAngle = map(timeOfDay * 24 % 12, 0, 12, 0, TWO_PI) - HALF_PI;
      let minAngle = map((timeOfDay * 24 * 60) % 60, 0, 60, 0, TWO_PI) - HALF_PI;
      line(x, y, x + cos(hourAngle) * 10, y + sin(hourAngle) * 10);
      strokeWeight(1);
      line(x, y, x + cos(minAngle) * 15, y + sin(minAngle) * 15);
      noStroke();
      
      fill(0);
      ellipse(x, y, 3, 3);
    }

    function drawCalendar(x, y) {
      fill(255);
      rect(x, y, 50, 45, 3);
      fill(200, 50, 50);
      rect(x, y, 50, 12, 3);
      fill(255);
      textSize(8);
      textAlign(CENTER);
      text('DAY', x + 25, y + 9);
      fill(0);
      textSize(18);
      text(day, x + 25, y + 35);

        fill(255, 255, 200, 60);
        rect(-2, -2, obj.w + 4, obj.h + 4, 7);

        rect(-5, -5, obj.w + 10, obj.h + 10, 10);

    function drawCharacter() {
      push();
      translate(character.x, character.y);
      
      // Shadow
      fill(0, 30);
      ellipse(0, 40, 35, 10);
      
      if (character.sleeping) {
        drawSleepingCharacter();
        pop();
        return;
      }
      
      // Body color based on action
      let bodyColor = color(100, 150, 220);
      if (character.action && character.actionObj) {
        if (character.actionObj.skill === 'education') bodyColor = color(120, 140, 200);
        else if (character.actionObj.skill === 'tech') bodyColor = color(100, 180, 200);
        else if (character.actionObj.skill === 'creativity') bodyColor = color(220, 130, 160);
        else if (character.actionObj.skill === 'wellness') bodyColor = color(100, 200, 150);
      }
      
      // Walking bounce
      let bounceY = 0;
      if (character.moving) {
        bounceY = sin(character.walkCycle * 1.5) * 3;
        translate(0, bounceY);
      } else if (!character.action) {
        // Idle sway
        bounceY = sin(character.idleTimer * 0.05) * 1;
        translate(0, bounceY);
      }
      
      // Legs
      stroke(180, 150, 120);
      strokeWeight(5);
      if (character.moving) {
        let legSwing = sin(character.walkCycle * 1.5) * 12;
        line(-8, 30, -12 + legSwing, 10);
        line(8, 30, 12 - legSwing, 10);
      } else if (character.action) {
        // Standing with slight bend
        line(-8, 30, -9, 10);
        line(8, 30, 9, 10);
      } else {
        line(-8, 30, -10, 10);
        line(8, 30, 10, 10);
      }
      
      // Body
      noStroke();
      fill(bodyColor);
      ellipse(0, 0, 24, 30);
      
      // Arms
      stroke(180, 150, 120);
      strokeWeight(4);
      if (character.moving) {
        let armSwing = sin(character.walkCycle * 1.5) * 8;
        line(-10, -5, -18 + armSwing, 10);
        line(10, -5, 18 - armSwing, 10);
      } else if (character.action) {
        // Reach towards object
        line(-10, -5, -22, -12);
        line(10, -5, 22, -12);
      } else {
        line(-10, -5, -18, 10);
        line(10, -5, 18, 10);
      }
      noStroke();
      
      // Head
      fill(255, 210, 170);
      ellipse(0, -28, 24, 26);
      
      // Hair
      fill(60, 40, 20);
      arc(0, -35, 26, 14, PI, TWO_PI);
      
      // Eyes (with blinking)
      if (character.isBlinking) {
        stroke(30);
        strokeWeight(1.5);
        line(-9, -30, -3, -30);
        line(3, -30, 9, -30);
        noStroke();
      } else {
        fill(30);
        ellipse(-6, -30, 4, 5);
        ellipse(6, -30, 4, 5);
        fill(255);
        ellipse(-5, -31, 2, 2);
        ellipse(7, -31, 2, 2);
      }
      
      // Mouth
      noFill();
      stroke(180, 100, 80);
      strokeWeight(1.5);
      arc(0, -22, 8, 4, 0, PI);
      noStroke();
      
      pop();
    }

      textSize(11);
      text(`🏠 Room Lv.${room.upgradeLevel}`, 20, 260);
      
      // Achievement count
      fill(255, 215, 0);
      text(`🏆 ${AchievementSystem.getUnlockedCount()}/${AchievementSystem.getTotalCount()}`, 130, 260);
      
      // Goal display
      if (GoalSystem.activeGoal && !GoalSystem.completed) {
        fill(0, 0, 0, 180);
        rect(width - 250, 5, 240, 40, 10);
        fill(255);
        textSize(11);
        textAlign(RIGHT);
        text(`🎯 Goal: ${GoalSystem.activeGoal.text}`, width - 20, 25);
        text(`Progress: ${GoalSystem.activeGoal.progress}/${GoalSystem.activeGoal.count}`, width - 20, 40);
      }
      
      // Message at bottom center
      if (messageTimer > 0) {
        fill(0, 0, 0, 180);
        rect(width/2 - 220, height - 60, 440, 40, 20);
        fill(255, 255, 200);
        textSize(14);
        textAlign(CENTER);
        text(message, width/2, height - 35);
      }
      
      // Achievement popup
      if (AchievementSystem.recentTimer > 0) {
        const ach = AchievementSystem.recentlyUnlocked;
        AchievementSystem.recentTimer--;
        const alpha = AchievementSystem.recentTimer > 150 ? 255 : map(AchievementSystem.recentTimer, 150, 0, 255, 0);
        fill(0, 0, 0, alpha);
        rect(width/2 - 150, height/2 - 50, 300, 60, 15);
        fill(255, 215, 0, alpha);
        textSize(16);
        textAlign(CENTER);
        text('🏆 Achievement Unlocked!', width/2, height/2 - 25);
        textSize(13);
        fill(255, alpha);
        text(ach.name + ' - ' + ach.desc, width/2, height/2 + 5);
      }
      
      // Event notification
      if (EventSystem.currentEvent && EventSystem.eventTimer > 0) {
        const alpha = map(EventSystem.eventTimer, 180, 0, 255, 0);
        const evt = EventSystem.currentEvent;
        const evtColor = evt.type === 'good' ? [100, 255, 100] : evt.type === 'bad' ? [255, 100, 100] : [200, 200, 200];
        fill(0, 0, 0, alpha * 0.8);
        rect(width/2 - 180, 60, 360, 45, 12);
        fill(evtColor[0], evtColor[1], evtColor[2], alpha);
        textSize(13);
        textAlign(CENTER);
        text(evt.text, width/2, 88);
      }
      
      // Title
      fill(255, 255, 200, 200);
      textSize(18);
      textAlign(RIGHT);
      text("✨ My Future Room", width - 20, height - 85);
      textSize(11);
      text("Design Your Future", width - 20, height - 68);
    }

    function drawNeedBar(label, value, x, y, colorGood, colorBad) {
      fill(200);
      textSize(11);
      textAlign(LEFT);
      text(label, x, y);
      
      // Background
      fill(100);
      rect(x + 50, y - 8, 80, 10, 4);
      
      // Pulsing when low
      let col = value > 50 ? colorGood : colorBad;
      if (value < 20) {
        const pulse = sin(frameCount * 0.1) * 0.3 + 0.7;
        fill(col[0] * pulse, col[1] * pulse, col[2] * pulse);
      } else {
        fill(col[0], col[1], col[2]);
      }
      rect(x + 50, y - 8, 80 * (value/100), 10, 4);
      
      // Glow on very low
      if (value < 15) {
        fill(255, 100, 100, 50 + sin(frameCount * 0.2) * 30);
        rect(x + 50, y - 8, 80, 10, 4);
      }
    }

    function drawSkillBar(label, value, x, y) {
      fill(200);
      textSize(11);
      textAlign(LEFT);
      text(label, x, y);
      fill(100);
      rect(x + 70, y - 8, 80, 10, 4);
      
      // Skill color based on type
      let col;
      if (label === 'Education') col = [100, 180, 255];
      else if (label === 'Tech') col = [100, 200, 200];
      else if (label === 'Creativity') col = [255, 150, 200];
      else col = [100, 220, 150];
      
      fill(col[0], col[1], col[2]);
      rect(x + 70, y - 8, 80 * (value/100), 10, 4);
    }

    // Prevent default right-click
    document.addEventListener('contextmenu', event => event.preventDefault());
  </script>
</body>
</html>
