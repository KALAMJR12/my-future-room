<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Future Room • Design Your Future</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js">
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a1a2e;
      overflow: hidden;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    canvas {
      display: block;
      position: fixed;
      inset: 0;
    }
    .ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .panel {
      background: rgba(10, 15, 30, 0.75);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      color: white;
      padding: 10px 18px;
      font-weight: 500;
      font-size: 13px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 14px 18px;
      gap: 10px;
      flex-wrap: wrap;
    }
    .needs-box {
      min-width: 180px;
    }
    .needs-box .title {
      color: #aaa;
      font-size: 11px;
      margin-bottom: 5px;
    }
    .need-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 3px 0;
      font-size: 11px;
    }
    .need-bar-bg {
      width: 70px;
      height: 5px;
      background: #2a2a4a;
      border-radius: 8px;
      overflow: hidden;
    }
    .need-fill {
      height: 100%;
      border-radius: 8px;
      transition: width 0.3s;
    }
    .skills-box {
      min-width: 200px;
      text-align: right;
    }
    .skills-box .title {
      color: #ffd700;
      font-size: 11px;
      margin-bottom: 5px;
    }
    .skill-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
      margin: 2px 0;
      font-size: 11px;
    }
    .skill-bar-bg {
      width: 55px;
      height: 4px;
      background: #2a2a4a;
      border-radius: 8px;
      overflow: hidden;
    }
    .skill-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      border-radius: 8px;
      transition: width 0.3s;
    }
    .bottombar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      flex-wrap: wrap;
    }
    .story-msg {
      max-width: 320px;
      text-align: center;
      font-size: 12px;
    }
    .btn {
      pointer-events: auto;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: white;
      padding: 9px 17px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.25s;
      backdrop-filter: blur(10px);
      letter-spacing: 0.3px;
    }
    .btn:hover {
      background: rgba(255, 255, 255, 0.22);
      transform: translateY(-2px);
    }
    .btn.primary {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      border: none;
      color: #0a0a1a;
      font-weight: bold;
    }
    .btn.sound-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .hint-text {
      position: absolute;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 11px;
      white-space: nowrap;
    }
    .progress-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }
    .progress-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid rgba(255, 215, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      transition: opacity 0.3s;
    }
    @media (max-width: 768px) {
      .topbar {
        flex-direction: column;
      }
      .skills-box {
        text-align: left;
      }
      .skill-row {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
<div class="ui">
  <div class="topbar">
    <div class="panel needs-box">
      <div class="title">⚡ NEEDS</div>
      <div class="need-row">🍔 Hunger <div class="need-bar-bg"><div class="need-fill" id="hunger-fill" style="width:100%;background:#4caf50;"></div></div></div>
      <div class="need-row">⚡ Energy <div class="need-bar-bg"><div class="need-fill" id="energy-fill" style="width:100%;background:#ff9800;"></div></div></div>
      <div class="need-row">🎉 Fun <div class="need-bar-bg"><div class="need-fill" id="fun-fill" style="width:100%;background:#2196f3;"></div></div></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn sound-btn" id="soundBtn" title="Toggle Sound">🔊</button>
    </div>
    <div class="panel skills-box">
      <div class="title">🌟 FUTURE SKILLS</div>
      <div class="skill-row">📚 Education <div class="skill-bar-bg"><div class="skill-fill" id="edu-fill" style="width:0%;"></div></div> <span id="edu-val">0</span></div>
      <div class="skill-row">💻 Tech <div class="skill-bar-bg"><div class="skill-fill" id="tech-fill" style="width:0%;"></div></div> <span id="tech-val">0</span></div>
      <div class="skill-row">🎨 Creativity <div class="skill-bar-bg"><div class="skill-fill" id="crea-fill" style="width:0%;"></div></div> <span id="crea-val">0</span></div>
      <div class="skill-row">❤️ Wellness <div class="skill-bar-bg"><div class="skill-fill" id="well-fill" style="width:0%;"></div></div> <span id="well-val">0</span></div>
      <div style="margin-top:4px;font-size:11px;">💰 $<span id="money-val">50</span> | Day <span id="day-val">1</span></div>
    </div>
  </div>
  <div class="progress-indicator" id="progressIndicator" style="opacity:0;">
    <div class="progress-circle" id="progressCircle">⏳</div>
  </div>
  <div class="hint-text panel" id="hint">🖱️ Click furniture to interact • Drag to rotate room</div>
  <div class="bottombar">
    <div class="panel story-msg" id="story">🏠 Click on furniture to start designing your future!</div>
    <button class="btn primary" id="resetBtn">🔄 New Life</button>
  </div>
</div>

<script>
  // ===== MY FUTURE ROOM – 3D Mini Sims with Character & Sound =====
  
  const statusEl = document.getElementById('story');
  const hintEl = document.getElementById('hint');
  const progressIndicator = document.getElementById('progressIndicator');
  const progressCircle = document.getElementById('progressCircle');
  const soundBtn = document.getElementById('soundBtn');

  // --- Audio Context for Sound Effects ---
  let audioCtx = null;
  let soundEnabled = true;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playSound(frequency, type = 'sine', duration = 0.15, volume = 0.3) {
    if (!soundEnabled || !audioCtx) return;
    try {
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.frequency.value = frequency;
      oscillator.type = type;
      gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      oscillator.start(audioCtx.currentTime);
      oscillator.stop(audioCtx.currentTime + duration);
    } catch (e) {
      // Silently fail if audio context isn't ready
    }
  }

  function playClickSound() { playSound(800, 'sine', 0.1, 0.2); }
  function playActionSound() { playSound(440, 'triangle', 0.2, 0.3); playSound(660, 'triangle', 0.2, 0.3); }
  function playCompleteSound() { playSound(523, 'sine', 0.15, 0.3); setTimeout(() => playSound(659, 'sine', 0.15, 0.3), 100); setTimeout(() => playSound(784, 'sine', 0.2, 0.4), 200); }
  function playUpgradeSound() { playSound(330, 'sawtooth', 0.3, 0.2); setTimeout(() => playSound(440, 'sawtooth', 0.3, 0.2), 150); setTimeout(() => playSound(660, 'sawtooth', 0.4, 0.3), 300); }
  function playFootstepSound() { playSound(100 + Math.random() * 50, 'sine', 0.05, 0.1); }
  function playSleepSound() { playSound(200, 'sine', 0.5, 0.2); }

  soundBtn.addEventListener('click', () => {
    initAudio();
    soundEnabled = !soundEnabled;
    soundBtn.textContent = soundEnabled ? '🔊' : '🔇';
    if (soundEnabled) playClickSound();
  });

  // Initialize audio on first user interaction
  document.addEventListener('click', initAudio, { once: true });
  document.addEventListener('pointerdown', initAudio, { once: true });

  // --- Game State ---
  let skills = { education: 0, tech: 0, creativity: 0, wellness: 0 };
  let needs = { hunger: 100, energy: 100, fun: 100 };
  let money = 50;
  let day = 1;
  let dayTimer = 0;
  const DAY_LENGTH = 600;
  const NEED_DECAY = 0.025;
  let actionTimer = 0;
  let currentAction = null;
  const ACTION_DURATION = 100;
  let roomLevel = 0;
  const upgradeThresholds = [20, 50, 100, 160];

  // --- Three.js Setup ---
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0xdfe8f2, 20, 45);
  const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 100);
  camera.position.set(8, 10, 8);
  camera.lookAt(4, 0.5, 4);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.domElement.style.position = 'fixed';
  renderer.domElement.style.inset = '0';
  document.body.prepend(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const sun = new THREE.DirectionalLight(0xfff2dd, 0.5);
  sun.position.set(5, 10, 3);
  scene.add(sun);
  const ceilingLight = new THREE.PointLight(0xfff0cf, 1.5, 18, 1.6);
  ceilingLight.position.set(4, 7.2, 4);
  scene.add(ceilingLight);

  const room = new THREE.Group();
  scene.add(room);
  let roomYaw = 0;
  let targetYaw = 0;
  let dragging = false;
  let dragStartX = 0;

  const raycaster = new THREE.Raycaster();
  const pointer = new THREE.Vector2();
  const interactive = [];
  const furnitureItems = {};
  const furnitureDataMap = {};

  // --- Character ---
  let character;
  let characterTarget = null;
  let characterMoving = false;
  const MOVE_SPEED = 0.08;
  let walkCycle = 0;

  function createCharacter() {
    const group = new THREE.Group();
    
    // Body
    const bodyGeo = new THREE.CylinderGeometry(0.2, 0.25, 0.7, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4499dd, roughness: 0.6 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.45;
    group.add(body);
    
    // Shirt detail
    const shirtGeo = new THREE.CylinderGeometry(0.22, 0.22, 0.3, 8);
    const shirtMat = new THREE.MeshStandardMaterial({ color: 0x5599ee, roughness: 0.5 });
    const shirt = new THREE.Mesh(shirtGeo, shirtMat);
    shirt.position.y = 0.55;
    group.add(shirt);
    
    // Head
    const headGeo = new THREE.SphereGeometry(0.18, 16, 16);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xffd4a3, roughness: 0.7 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 0.95;
    group.add(head);
    
    // Hair
    const hairGeo = new THREE.SphereGeometry(0.19, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
    const hairMat = new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.8 });
    const hair = new THREE.Mesh(hairGeo, hairMat);
    hair.position.y = 0.98;
    group.add(hair);
    
    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.03, 8, 8);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.06, 0.98, 0.16);
    group.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.06, 0.98, 0.16);
    group.add(rightEye);
    
    // Mouth
    const mouthGeo = new THREE.TorusGeometry(0.04, 0.01, 8, 8, Math.PI);
    const mouthMat = new THREE.MeshStandardMaterial({ color: 0xcc6644 });
    const mouth = new THREE.Mesh(mouthGeo, mouthMat);
    mouth.position.set(0, 0.91, 0.17);
    mouth.rotation.z = Math.PI;
    group.add(mouth);
    
    // Arms
    const armGeo = new THREE.CylinderGeometry(0.06, 0.07, 0.5, 8);
    const armMat = new THREE.MeshStandardMaterial({ color: 0x4499dd, roughness: 0.6 });
    
    const leftArm = new THREE.Mesh(armGeo, armMat);
    leftArm.position.set(-0.25, 0.6, 0);
    leftArm.rotation.z = 0.3;
    group.add(leftArm);
    leftArm.userData = { name: 'leftArm' };
    
    const rightArm = new THREE.Mesh(armGeo, armMat);
    rightArm.position.set(0.25, 0.6, 0);
    rightArm.rotation.z = -0.3;
    group.add(rightArm);
    rightArm.userData = { name: 'rightArm' };
    
    // Hands
    const handGeo = new THREE.SphereGeometry(0.06, 8, 8);
    const handMat = new THREE.MeshStandardMaterial({ color: 0xffd4a3, roughness: 0.7 });
    const leftHand = new THREE.Mesh(handGeo, handMat);
    leftHand.position.set(-0.35, 0.35, 0);
    group.add(leftHand);
    const rightHand = new THREE.Mesh(handGeo, handMat);
    rightHand.position.set(0.35, 0.35, 0);
    group.add(rightHand);
    
    // Legs
    const legGeo = new THREE.CylinderGeometry(0.08, 0.09, 0.4, 8);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x335577, roughness: 0.7 });
    
    const leftLeg = new THREE.Mesh(legGeo, legMat);
    leftLeg.position.set(-0.1, 0.15, 0);
    group.add(leftLeg);
    leftLeg.userData = { name: 'leftLeg' };
    
    const rightLeg = new THREE.Mesh(legGeo, legMat);
    rightLeg.position.set(0.1, 0.15, 0);
    group.add(rightLeg);
    rightLeg.userData = { name: 'rightLeg' };
    
    // Shoes
    const shoeGeo = new THREE.BoxGeometry(0.1, 0.06, 0.15);
    const shoeMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
    const leftShoe = new THREE.Mesh(shoeGeo, shoeMat);
    leftShoe.position.set(-0.1, 0.0, 0.03);
    group.add(leftShoe);
    const rightShoe = new THREE.Mesh(shoeGeo, shoeMat);
    rightShoe.position.set(0.1, 0.0, 0.03);
    group.add(rightShoe);
    
    // Shadow
    const shadowGeo = new THREE.PlaneGeometry(0.5, 0.3);
    const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
    const shadow = new THREE.Mesh(shadowGeo, shadowMat);
    shadow.rotation.x = -Math.PI / 2;
    shadow.position.y = 0.01;
    group.add(shadow);
    
    group.position.set(4, 0, 4);
    return group;
  }

  character = createCharacter();
  room.add(character);

  // --- Materials ---
  function makeTexture(drawFn, w = 256, h = 256) {
    const c = document.createElement('canvas');
    c.width = w;
    c.height = h;
    const ctx = c.getContext('2d');
    drawFn(ctx, w, h);
    const t = new THREE.CanvasTexture(c);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    return t;
  }

  const wallTex = makeTexture((ctx, w, h) => {
    ctx.fillStyle = '#eadcc4';
    ctx.fillRect(0, 0, w, h);
    for (let y = 0; y < h; y += 14) {
      ctx.fillStyle = 'rgba(255,255,255,.06)';
      ctx.fillRect(0, y, w, 1);
    }
  });
  const floorTex = makeTexture((ctx, w, h) => {
    ctx.fillStyle = '#a26f43';
    ctx.fillRect(0, 0, w, h);
    for (let x = 0; x < w; x += 64) {
      ctx.fillStyle = 'rgba(55,31,14,.35)';
      ctx.fillRect(x + 2, 0, 12, h);
    }
  });
  floorTex.repeat.set(2, 2);

  // --- Build Room ---
  function plane(w, h, tex, color, rotX = -Math.PI / 2, y = 0) {
    const m = new THREE.MeshStandardMaterial({ map: tex, color, roughness: 1 });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), m);
    mesh.rotation.x = rotX;
    mesh.position.y = y;
    mesh.receiveShadow = true;
    return mesh;
  }

  room.add(plane(8, 8, floorTex, 0xffffff));
  const ceiling = plane(8, 8, wallTex, 0xffffff, Math.PI / 2, 3.2);
  ceiling.rotation.z = Math.PI;
  room.add(ceiling);

  const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, color: 0xffffff, roughness: 1 });
  [
    [4, 1.6, 0, 0],
    [4, 1.6, 8, Math.PI],
    [0, 1.6, 4, Math.PI / 2],
    [8, 1.6, 4, -Math.PI / 2]
  ].forEach(([x, y, z, ry]) => {
    const w = new THREE.Mesh(new THREE.PlaneGeometry(8, 3.2), wallMat);
    w.position.set(x, y, z);
    w.rotation.y = ry;
    room.add(w);
  });

  // Window
  const winFrame = new THREE.Mesh(new THREE.BoxGeometry(2.1, 1.6, 0.08), new THREE.MeshStandardMaterial({ color: 0xf5efe8 }));
  winFrame.position.set(0.06, 1.8, 4.2);
  winFrame.rotation.y = Math.PI / 2;
  room.add(winFrame);
  const winGlass = new THREE.Mesh(new THREE.PlaneGeometry(1.7, 1.2), new THREE.MeshStandardMaterial({ color: 0x9dd6ff, transparent: true, opacity: 0.8, emissive: 0x88bbff, emissiveIntensity: 0.3 }));
  winGlass.position.set(0.08, 1.8, 4.2);
  winGlass.rotation.y = Math.PI / 2;
  room.add(winGlass);

  function addBaseboard(x, z, ry) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(8, 0.12, 0.08), new THREE.MeshStandardMaterial({ color: 0xb68d63, roughness: 0.9 }));
    m.position.set(x, 0.06, z);
    m.rotation.y = ry;
    room.add(m);
  }
  addBaseboard(4, 0.04, 0);
  addBaseboard(4, 7.96, 0);
  addBaseboard(0.04, 4, Math.PI / 2);
  addBaseboard(7.96, 4, Math.PI / 2);

  // --- Furniture Definitions ---
  const furnitureDefs = [
    { key: 'bookshelf', name: 'Bookshelf', icon: '📚', action: 'Study', skill: 'education', skillGain: 2, needEffect: { fun: -5, energy: -8 }, moneyGain: 0, pos: [2, 1, 3.8], rot: 0.1, standPos: [2, 0, 3.2] },
    { key: 'desk', name: 'Computer Desk', icon: '💻', action: 'Work', skill: 'tech', skillGain: 2, needEffect: { fun: -3, energy: -10 }, moneyGain: 15, pos: [5, 0, 3.8], rot: -0.12, standPos: [5, 0, 3.2] },
    { key: 'easel', name: 'Easel', icon: '🎨', action: 'Paint', skill: 'creativity', skillGain: 2, needEffect: { fun: 10, energy: -5 }, moneyGain: 0, pos: [6, 0, 5.2], rot: -0.55, standPos: [6, 0, 5.8] },
    { key: 'mat', name: 'Yoga Mat', icon: '🧘', action: 'Exercise', skill: 'wellness', skillGain: 2, needEffect: { energy: -12, fun: 2 }, moneyGain: 0, pos: [2, 0.03, 5.5], rot: 0.25, standPos: [2, 0, 5.8] },
    { key: 'fridge', name: 'Fridge', icon: '🍎', action: 'Eat', skill: null, skillGain: 0, needEffect: { hunger: 35, energy: 5 }, moneyGain: 0, pos: [1, 0.9, 1.8], rot: 0.04, standPos: [1, 0, 2.3] },
    { key: 'bed', name: 'Bed', icon: '🛏️', action: 'Sleep', skill: null, skillGain: 0, needEffect: { energy: 40, hunger: -5 }, moneyGain: 0, pos: [4, 0, 5.5], rot: 0, standPos: [4, 0, 6.1] },
    { key: 'radio', name: 'Radio', icon: '📻', action: 'Listen Music', skill: null, skillGain: 0, needEffect: { fun: 25, energy: -3 }, moneyGain: 0, pos: [7, 0.22, 1.8], rot: -0.1, standPos: [7, 0, 2.3] },
  ];

  // --- Furniture 3D Models ---
  function createBookshelf() {
    const g = new THREE.Group();
    const wood = new THREE.MeshStandardMaterial({ color: 0x8a5b33, roughness: 0.9 });
    g.add(new THREE.Mesh(new THREE.BoxGeometry(1.3, 2.0, 0.35), wood));
    for (let i = 0; i < 3; i++) {
      const s = new THREE.Mesh(new THREE.BoxGeometry(1.18, 0.05, 0.28), wood);
      s.position.y = -0.65 + i * 0.62;
      g.add(s);
      for (let b = 0; b < 6; b++) {
        const book = new THREE.Mesh(new THREE.BoxGeometry(0.12 + Math.random() * 0.08, 0.3 + Math.random() * 0.25, 0.16), new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(Math.random(), 0.55, 0.55) }));
        book.position.set(-0.45 + b * 0.17, -0.45 + i * 0.62 + book.geometry.parameters.height / 2, (Math.random() - 0.5) * 0.03);
        g.add(book);
      }
    }
    return g;
  }
  function createDesk() {
    const g = new THREE.Group();
    const wood = new THREE.MeshStandardMaterial({ color: 0x6f4a2f, roughness: 0.9 });
    [
      [-0.8, 0.5, -0.3],
      [0.8, 0.5, -0.3],
      [-0.8, 0.5, 0.3],
      [0.8, 0.5, 0.3]
    ].forEach(p => { const l = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1, 0.1), wood); l.position.set(...p); g.add(l); });
    const top = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.12, 0.8), wood);
    top.position.y = 1.0;
    g.add(top);
    const mon = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.55, 0.08), new THREE.MeshStandardMaterial({ color: 0x111318, emissive: 0x55ccff, emissiveIntensity: 1.6 }));
    mon.position.set(0, 1.38, -0.14);
    g.add(mon);
    const chair = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.32, 0.08, 16), new THREE.MeshStandardMaterial({ color: 0x34404f }));
    chair.position.set(0, -0.02, 0.65);
    g.add(chair);
    return g;
  }
  function createEasel() {
    const g = new THREE.Group();
    const wood = new THREE.MeshStandardMaterial({ color: 0xa07143 });
    [
      [-0.28, 0.9, 0],
      [0.28, 0.9, 0],
      [0, 0.45, 0.12]
    ].forEach(p => { const l = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.8, 8), wood); l.position.set(...p); if (p[0] !== 0) l.rotation.z = p[0] < 0 ? 0.18 : -0.18; if (p[2] !== 0) l.rotation.x = -0.2; g.add(l); });
    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 1.1), new THREE.MeshStandardMaterial({ color: 0xf8f1df, emissive: 0xffffff, emissiveIntensity: 0.05 }));
    canvas.position.set(0, 1.22, 0.09);
    g.add(canvas);
    return g;
  }
  function createMat() {
    const g = new THREE.Group();
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 1.5, 18, 1, true), new THREE.MeshStandardMaterial({ color: 0x3db36a })).rotation.z = Math.PI / 2);
    return g;
  }
  function createFridge() {
    return new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.75), new THREE.MeshStandardMaterial({ color: 0xe9edf2, metalness: 0.1, roughness: 0.5 }));
  }
  function createBed() {
    const g = new THREE.Group();
    g.add(new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.35, 1.0), new THREE.MeshStandardMaterial({ color: 0x8b5d37 })).position.y = 0.18);
    g.add(new THREE.Mesh(new THREE.BoxGeometry(1.72, 0.28, 0.92), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.95 })).position.y = 0.37);
    const blanket = new THREE.Mesh(new THREE.BoxGeometry(1.68, 0.16, 0.84), new THREE.MeshStandardMaterial({ color: 0xb2c8ff }));
    blanket.position.set(0, 0.53, 0.05);
    g.add(blanket);
    return g;
  }
  function createRadio() {
    const g = new THREE.Group();
    g.add(new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.35, 0.28), new THREE.MeshStandardMaterial({ color: 0x7d4a2c })));
    const dial = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.03, 18), new THREE.MeshStandardMaterial({ color: 0xffd65c }));
    dial.rotation.x = Math.PI / 2;
    dial.position.set(0.18, 0.08, -0.12);
    g.add(dial);
    return g;
  }

  const modelCreators = {
    bookshelf: createBookshelf,
    desk: createDesk,
    easel: createEasel,
    mat: createMat,
    fridge: createFridge,
    bed: createBed,
    radio: createRadio,
  };

  // --- Place Furniture ---
  furnitureDefs.forEach(def => {
    const model = modelCreators[def.key]();
    model.position.set(...def.pos);
    model.rotation.y = def.rot;
    model.userData = def;
    room.add(model);
    interactive.push(model);
    furnitureItems[def.key] = model;
    furnitureDataMap[def.key] = def;
  });

  // --- Interaction ---  function onPointerDown(e) {
    initAudio();
    if (currentAction) return;
    dragging = true;
    dragStartX = e.clientX;
    pointer.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(interactive, true);
    if (hits.length > 0) {
      const root = interactive.find(r => r === hits[0].object || r.children.includes(hits[0].object));
      if (root && root.userData) {
        playClickSound();
        startAction(root);
      }
    }
  }

  function onPointerMove(e) {
    if (!dragging) return;
    const dx = e.clientX - dragStartX;
    targetYaw = THREE.MathUtils.clamp(roomYaw + dx * 0.005, -Math.PI / 6, Math.PI / 6);
  }

  function onPointerUp() {
    dragging = false;
  }

  window.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);

  // --- Character Movement ---
  function moveCharacterTo(targetPos) {
    characterTarget = new THREE.Vector3(...targetPos);
    characterMoving = true;
  }

  function updateCharacterMovement() {
    if (!characterMoving || !characterTarget) return;
    
    const dx = characterTarget.x - character.position.x;
    const dz = characterTarget.z - character.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    
    if (dist < 0.15) {
      character.position.x = characterTarget.x;
      character.position.z = characterTarget.z;
      characterMoving = false;
      characterTarget = null;
      walkCycle = 0;
    } else {
      character.position.x += (dx / dist) * MOVE_SPEED;
      character.position.z += (dz / dist) * MOVE_SPEED;
      
      // Rotate character to face direction
      const angle = Math.atan2(dx, dz);
      character.rotation.y = angle;
      
      // Walk animation
      walkCycle += 0.2;
      if (walkCycle % 10 === 0) playFootstepSound();
      
      // Swing arms and legs
      const swing = Math.sin(walkCycle) * 0.3;
      character.children.forEach(child => {
        if (child.userData?.name === 'leftArm') child.rotation.z = 0.3 + swing;
        if (child.userData?.name === 'rightArm') child.rotation.z = -0.3 - swing;
        if (child.userData?.name === 'leftLeg') child.rotation.z = swing;
        if (child.userData?.name === 'rightLeg') child.rotation.z = -swing;
      });
    }
  }

  // --- Gameplay ---
  function startAction(furnitureMesh) {
    const def = furnitureMesh.userData;
    
    // Move character to furniture
    moveCharacterTo(def.standPos);
    
    // Wait for character to arrive, then start action
    const checkArrival = setInterval(() => {
      if (!characterMoving) {
        clearInterval(checkArrival);
        currentAction = { obj: furnitureMesh, def, timer: ACTION_DURATION, duration: ACTION_DURATION };
        hintEl.textContent = `⏳ ${def.icon} Using ${def.name}...`;
        progressIndicator.style.opacity = '1';
        playActionSound();
        
        // Visual feedback
        gsap.fromTo(furnitureMesh.scale, { x: 1, y: 1, z: 1 }, { x: 1.15, y: 1.15, z: 1.15, duration: 0.2, yoyo: true, repeat: 1 });
        ceilingLight.intensity = 2.0;
        setTimeout(() => { ceilingLight.intensity = 1.5; }, 400);
      }
    }, 100);
  }

  function completeAction() {
    if (!currentAction) return;
    const def = currentAction.def;

    // Apply effects
    if (def.skill && skills[def.skill] !== undefined) {
      skills[def.skill] = Math.min(skills[def.skill] + def.skillGain, 100);
    }
    for (let n in def.needEffect) {
      needs[n] = Math.max(0, Math.min(100, needs[n] + def.needEffect[n]));
    }
    money += def.moneyGain;
    if (money < 0) money = 0;

    dayTimer += 30;
    if (dayTimer >= DAY_LENGTH) {
      dayTimer = 0;
      day++;
      statusEl.textContent = `☀️ Day ${day} – Your future grows brighter!`;
    } else {
      statusEl.textContent = `${def.icon} ${def.action} complete! Keep designing your future.`;
    }

    if (def.key === 'bed') {
      playSleepSound();
    } else {
      playCompleteSound();
    }

    checkUpgrade();
    updateUI();
    currentAction = null;
    progressIndicator.style.opacity = '0';
    hintEl.textContent = '🖱️ Click furniture to interact • Drag to rotate room';
  }

  function checkUpgrade() {
    const total = skills.education + skills.tech + skills.creativity + skills.wellness;
    let newLevel = 0;
    for (let i = upgradeThresholds.length - 1; i >= 0; i--) {
      if (total >= upgradeThresholds[i]) { newLevel = i + 1; break; }
    }
    if (newLevel > roomLevel) {
      roomLevel = newLevel;
      scene.fog = new THREE.Fog(0xdfe8f2, 20 - roomLevel, 45 + roomLevel * 2);
      statusEl.textContent = `✨ Room upgraded to Level ${roomLevel}!`;
      ceilingLight.intensity = 1.5 + roomLevel * 0.2;
      gsap.fromTo(ceilingLight, { intensity: ceilingLight.intensity + 0.8 }, { intensity: ceilingLight.intensity, duration: 0.6 });
      playUpgradeSound();
    }
  }

  function updateNeeds() {
    needs.hunger = Math.max(0, needs.hunger - NEED_DECAY);
    needs.energy = Math.max(0, needs.energy - NEED_DECAY * 1.2);
    needs.fun = Math.max(0, needs.fun - NEED_DECAY * 0.8);
  }

  function updateUI() {
    document.getElementById('hunger-fill').style.width = needs.hunger + '%';
    document.getElementById('energy-fill').style.width = needs.energy + '%';
    document.getElementById('fun-fill').style.width = needs.fun + '%';
    document.getElementById('edu-fill').style.width = skills.education + '%';
    document.getElementById('tech-fill').style.width = skills.tech + '%';
    document.getElementById('crea-fill').style.width = skills.creativity + '%';
    document.getElementById('well-fill').style.width = skills.wellness + '%';
    document.getElementById('edu-val').textContent = skills.education;
    document.getElementById('tech-val').textContent = skills.tech;
    document.getElementById('crea-val').textContent = skills.creativity;
    document.getElementById('well-val').textContent = skills.wellness;
    document.getElementById('money-val').textContent = money;
    document.getElementById('day-val').textContent = day;
    
    if (currentAction) {
      const progress = 1 - (currentAction.timer / currentAction.duration);
      progressCircle.textContent = ['⏳', '⌛', '🔄', '⏰'][Math.floor(progress * 4)] || '⏳';
    }
  }

  function resetGame() {
    skills = { education: 0, tech: 0, creativity: 0, wellness: 0 };
    needs = { hunger: 100, energy: 100, fun: 100 };
    money = 50;
    day = 1;
    dayTimer = 0;
    roomLevel = 0;
    currentAction = null;
    characterMoving = false;
    characterTarget = null;
    room.rotation.y = 0;
    roomYaw = 0;
    targetYaw = 0;
    scene.fog = new THREE.Fog(0xdfe8f2, 20, 45);
    ceilingLight.intensity = 1.5;
    character.position.set(4, 0, 4);
    character.rotation.y = 0;
    progressIndicator.style.opacity = '0';
    statusEl.textContent = '🏠 New life! Click furniture to design your future.';
    hintEl.textContent = '🖱️ Click furniture to interact • Drag to rotate room';
    updateUI();
  }

  document.getElementById('resetBtn').addEventListener('click', resetGame);

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  });

  // --- Game Loop ---
  function animate() {
    requestAnimationFrame(animate);

    // Update character movement
    updateCharacterMovement();

    // Update action timer
    if (currentAction) {
      currentAction.timer--;
      if (currentAction.timer <= 0) {
        completeAction();
      }
    }

    // Needs decay (only when not sleeping)
    if (!currentAction || currentAction.def.key !== 'bed') {
      updateNeeds();
    }

    // Room rotation
    roomYaw += (targetYaw - roomYaw) * 0.08;
    room.rotation.y = roomYaw;

    // Animate character idle if not moving
    if (!characterMoving && !currentAction) {
      const idleSway = Math.sin(Date.now() * 0.003) * 0.05;
      character.children.forEach(child => {
        if (child.userData?.name === 'leftArm') child.rotation.z = 0.3 + idleSway;
        if (child.userData?.name === 'rightArm') child.rotation.z = -0.3 - idleSway;
      });
    }

    renderer.render(scene, camera);
    updateUI();
  }

  updateUI();
  animate();
</script>
</body>
</html>
