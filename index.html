<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Future Room • Design Your Future</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden}
    .game-container{position:relative;width:100vw;height:100vh;max-width:1000px;max-height:650px;border-radius:30px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 0 3px rgba(255,215,0,0.3)}
    canvas{display:block}
  </style>
</head>
<body>
<div class="game-container" id="game-container"></div>
<script>
// ==================== AUDIO SYSTEM ====================
const AudioSystem = {
  ctx:null, enabled:true,
  init(){ if(!this.ctx){ this.ctx = new (window.AudioContext||window.webkitAudioContext)(); } if(this.ctx.state==='suspended') this.ctx.resume(); },
  play(f,type='sine',dur=0.15,vol=0.3,delay=0){
    if(!this.enabled||!this.ctx) return;
    try{const o=this.ctx.createOscillator(),g=this.ctx.createGain(); o.connect(g); g.connect(this.ctx.destination); o.frequency.value=f; o.type=type; const t=this.ctx.currentTime+delay; g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.01,t+dur); o.start(t); o.stop(t+dur);}catch(e){}
  },
  click(){ this.play(800,'sine',0.1,0.2); },
  footstep(){ this.play(60+Math.random()*40,'sine',0.05,0.08); },
  actionStart(){ this.play(440,'triangle',0.2,0.3); this.play(660,'triangle',0.2,0.3); },
  actionComplete(){ this.play(523,'sine',0.15,0.3); this.play(659,'sine',0.15,0.3,0.1); this.play(784,'sine',0.2,0.4,0.2); },
  upgrade(){ this.play(330,'sawtooth',0.3,0.2); this.play(440,'sawtooth',0.3,0.2,0.15); this.play(660,'sawtooth',0.4,0.3,0.3); },
  sleep(){ this.play(200,'sine',0.8,0.15); },
  achievement(){ this.play(523,'sine',0.1,0.3); this.play(659,'sine',0.1,0.3,0.1); this.play(784,'sine',0.1,0.3,0.2); this.play(1047,'sine',0.2,0.4,0.3); },
  eventGood(){ this.play(440,'sine',0.1,0.3); this.play(554,'sine',0.1,0.3,0.1); this.play(659,'sine',0.15,0.3,0.2); },
  eventBad(){ this.play(200,'sawtooth',0.3,0.15); this.play(150,'sawtooth',0.3,0.15,0.15); },
  toggle(){ this.enabled=!this.enabled; return this.enabled; }
};

// ==================== PARTICLE & FLOATING TEXT (canvas) ====================
const ParticleSystem = {
  particles:[],
  emit(x,y,count,color,speed=2,life=30){
    for(let i=0;i<count;i++) this.particles.push({x,y,vx:(Math.random()-0.5)*speed*2,vy:(Math.random()-1)*speed*2,life:life+Math.random()*20,maxLife:life+20,color,size:2+Math.random()*3});
  },
  emitSparkles(x,y,count=8){ this.emit(x,y,count,[255,215,0],1.5,25); },
  emitConfetti(x,y,count=20){ const cols=[[255,100,100],[100,255,100],[100,100,255],[255,255,100],[255,100,255]]; for(let i=0;i<count;i++) this.emit(x,y-50,1,cols[Math.floor(Math.random()*cols.length)],3,40); },
  update(){ for(let i=this.particles.length-1;i>=0;i--){ let p=this.particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.life--; if(p.life<=0) this.particles.splice(i,1); } },
  draw(){ noStroke(); for(let p of this.particles){ let alpha=map(p.life,0,p.maxLife,0,255); fill(p.color[0],p.color[1],p.color[2],alpha); ellipse(p.x,p.y,p.size); } }
};

const FloatingTextSystem = {
  texts:[],
  add(x,y,text,color=[255,255,200],size=14){ this.texts.push({x,y,text,color,size,life:80,maxLife:80,vy:-1.5}); },
  addSkillGain(x,y,skill,amount){
    const cols={education:[100,180,255],tech:[100,200,200],creativity:[255,150,200],wellness:[100,220,150]};
    this.add(x,y-30,`+${amount} ${skill.charAt(0).toUpperCase()+skill.slice(1)}`,cols[skill]||[255,215,0],13);
  },
  addMoneyGain(x,y,amount){ this.add(x,y-20,`+$${amount}`,[255,215,0],12); },
  update(){ for(let i=this.texts.length-1;i>=0;i--){ this.texts[i].y+=this.texts[i].vy; this.texts[i].life--; if(this.texts[i].life<=0) this.texts.splice(i,1); } },
  draw(){ for(let t of this.texts){ let alpha=map(t.life,0,t.maxLife,0,255); fill(t.color[0],t.color[1],t.color[2],alpha); textSize(t.size); textAlign(CENTER); text(t.text,t.x,t.y); } }
};

// ==================== ACHIEVEMENT, EVENT, GOAL, JOURNAL ====================
const AchievementSystem = {
  achievements:[
    { id:'bookworm', name:'📚 Bookworm', desc:'Education level 10', check:s=>s.education>=10, unlocked:false },
    { id:'techie', name:'💻 Techie', desc:'Earn $200 total', check:(s,m)=>m>=200, unlocked:false, trackMoney:true },
    { id:'artist', name:'🎨 Artist', desc:'Creativity level 10', check:s=>s.creativity>=10, unlocked:false },
    { id:'yogi', name:'🧘 Yogi', desc:'Wellness level 10', check:s=>s.wellness>=10, unlocked:false },
    { id:'balanced', name:'⚖️ Balanced Life', desc:'All skills above 5', check:s=>s.education>=5&&s.tech>=5&&s.creativity>=5&&s.wellness>=5, unlocked:false },
    { id:'rich', name:'💰 Wealth Builder', desc:'Save $500', check:(s,m)=>m>=500, unlocked:false, trackMoney:true },
    { id:'survivor', name:'🏆 Survivor', desc:'Reach Day 20', check:(s,m,d)=>d>=20, unlocked:false, trackDay:true },
    { id:'designer', name:'✨ Future Designer', desc:'Room Level 4', check:(s,m,d,r)=>r>=4, unlocked:false, trackRoom:true },
  ],
  recentlyUnlocked:null, recentTimer:0, totalMoneyEarned:0,
  check(skills,money,day,roomLevel){
    for(let ach of this.achievements){
      if(!ach.unlocked){
        let r=false;
        if(ach.trackMoney) r=ach.check(skills,this.totalMoneyEarned);
        else if(ach.trackDay) r=ach.check(skills,money,day);
        else if(ach.trackRoom) r=ach.check(skills,money,day,roomLevel);
        else r=ach.check(skills);
        if(r){ ach.unlocked=true; this.recentlyUnlocked=ach; this.recentTimer=200; AudioSystem.achievement(); ParticleSystem.emitConfetti(500,300); return ach; }
      }
    }
    return null;
  },
  addMoney(amount){ this.totalMoneyEarned+=amount; },
  getUnlockedCount(){ return this.achievements.filter(a=>a.unlocked).length; },
  getTotalCount(){ return this.achievements.length; }
};

const EventSystem = {
  events:[
    { type:'good', text:'🌟 A mentor visited! +8 Education', effect:{education:8}, weight:3 },
    { type:'good', text:'💡 Brilliant idea! +6 Tech', effect:{tech:6}, weight:3 },
    { type:'good', text:'🎨 Creative surge! +8 Creativity', effect:{creativity:8}, weight:3 },
    { type:'good', text:'🧘 Peaceful morning! +8 Wellness', effect:{wellness:8}, weight:3 },
    { type:'good', text:'💰 Found money! +$30', effect:{money:30}, weight:4 },
    { type:'good', text:'🍕 Friend brought pizza! +25 Hunger', effect:{hunger:25}, weight:3 },
    { type:'good', text:'🎉 Surprise party! +20 Fun', effect:{fun:20}, weight:3 },
    { type:'bad', text:'😴 Exhaustion hits! -15 Energy', effect:{energy:-15}, weight:3 },
    { type:'bad', text:'🔧 Computer crashed! -5 Tech', effect:{tech:-5}, weight:2 },
    { type:'bad', text:'💸 Unexpected bill! -$20', effect:{money:-20}, weight:3 },
    { type:'bad', text:'🤧 Got a cold! -10 Wellness', effect:{wellness:-10}, weight:2 },
    { type:'neutral', text:'📖 A quiet day for reflection...', effect:{}, weight:5 },
    { type:'neutral', text:'🌤️ The weather is beautiful today.', effect:{}, weight:5 },
  ],
  cooldown:0, currentEvent:null, eventTimer:0,
  tryTrigger(){
    if(this.cooldown>0){ this.cooldown--; return null; }
    if(Math.random()<0.003){
      const total=this.events.reduce((s,e)=>s+e.weight,0);
      let roll=Math.random()*total;
      for(let e of this.events){ roll-=e.weight; if(roll<=0){ this.currentEvent=e; this.eventTimer=180; this.cooldown=300; if(e.type==='good') AudioSystem.eventGood(); else if(e.type==='bad') AudioSystem.eventBad(); return e; } }
    }
    return null;
  },
  applyEffect(skills,needs,money){
    if(!this.currentEvent) return;
    const e=this.currentEvent.effect;
    if(e.education) skills.education=constrain(skills.education+e.education,0,100);
    if(e.tech) skills.tech=constrain(skills.tech+e.tech,0,100);
    if(e.creativity) skills.creativity=constrain(skills.creativity+e.creativity,0,100);
    if(e.wellness) skills.wellness=constrain(skills.wellness+e.wellness,0,100);
    if(e.hunger) needs.hunger=constrain(needs.hunger+e.hunger,0,100);
    if(e.energy) needs.energy=constrain(needs.energy+e.energy,0,100);
    if(e.fun) needs.fun=constrain(needs.fun+e.fun,0,100);
    if(e.money) money+=e.money;
  }
};

const GoalSystem = {
  goals:[
    { text:'📚 Study 3 times', type:'action', target:'Study', count:3, reward:30, progress:0 },
    { text:'💻 Work 2 times', type:'action', target:'Work / Code', count:2, reward:25, progress:0 },
    { text:'🎨 Paint 2 times', type:'action', target:'Paint', count:2, reward:25, progress:0 },
    { text:'🧘 Exercise 2 times', type:'action', target:'Exercise', count:2, reward:25, progress:0 },
    { text:'💰 Earn $50', type:'money', target:50, count:1, reward:20, progress:0 },
    { text:'📈 Reach Education 5', type:'skill', skill:'education', target:5, count:1, reward:40, progress:0 },
    { text:'📈 Reach Tech 5', type:'skill', skill:'tech', target:5, count:1, reward:40, progress:0 },
  ],
  activeGoal:null, completed:false,
  pickNewGoal(){ this.activeGoal={...this.goals[Math.floor(Math.random()*this.goals.length)],progress:0}; this.completed=false; },
  checkProgress(actionName, skills, moneyEarned){
    if(!this.activeGoal||this.completed) return false;
    if(this.activeGoal.type==='action' && actionName===this.activeGoal.target) this.activeGoal.progress++;
    else if(this.activeGoal.type==='money') this.activeGoal.progress+=moneyEarned;
    else if(this.activeGoal.type==='skill') this.activeGoal.progress=skills[this.activeGoal.skill];
    if(this.activeGoal.progress>=this.activeGoal.count){ this.completed=true; return true; }
    return false;
  },
  getReward(){ return this.activeGoal?this.activeGoal.reward:0; }
};

const JournalSystem = {
  entries:[], showJournal:false,
  addEntry(text){ this.entries.unshift({day,text}); if(this.entries.length>20) this.entries.pop(); },
  generateDailySummary(){
    const h=Object.keys(skills).reduce((a,b)=>skills[a]>skills[b]?a:b);
    const s={education:'I spent time learning today. Knowledge is power!',tech:'Technology filled my day.',creativity:'Art and creativity flowed.',wellness:'I took care of my body and mind.'};
    return s[h]||'Another day of growth.';
  },
  toggle(){ this.showJournal=!this.showJournal; AudioSystem.click(); }
};

// ==================== GAME STATE ====================
let skills={education:0,tech:0,creativity:0,wellness:0};
let needs={hunger:100,energy:100,fun:100};
let money=50, day=1, dayTimer=0, roomLevel=0;
const NEED_DECAY=0.03, DAY_LENGTH=600;
let message="Click an object to start designing your future!", messageTimer=0, messageAlpha=1;
let cutscene=null, cutsceneTimer=0;
let timeOfDay=0.15, isNighttime=false;
let showProgress=false, actionProgress=0;

// GSAP animated objects for message fade
let messageTween;

// ==================== ISOMETRIC ENGINE ====================
const TILE_W=64, TILE_H=32;
const GRID_W=10, GRID_H=8;
let originX, originY;

function isoToScreen(tx,ty){
  return {
    x: originX + (tx - ty) * (TILE_W/2),
    y: originY + (tx + ty) * (TILE_H/2)
  };
}
function screenToIso(sx,sy){
  let dx = sx - originX;
  let dy = sy - originY;
  let tx = (dx/(TILE_W/2) + dy/(TILE_H/2))/2;
  let ty = (dy/(TILE_H/2) - dx/(TILE_W/2))/2;
  return {tx, ty};
}

let objects=[];
let character={
  tileX:4, tileY:3,
  targetTileX:4, targetTileY:3,
  moving:false,
  moveTween:null,
  action:null,
  actionObj:null,
  actionTimer:0,
  actionDuration:2.0,
  facingRight:true,
  walkCycle:0,
  idleTimer:0,
  blinkTimer:0,
  isBlinking:false,
  sleeping:false,
};

function initObjects(){
  objects=[
    { name:'Bookshelf', tileX:1, tileY:1, w:1, h:1, action:'Study', skill:'education', skillGain:2, needEffect:{fun:-5,energy:-8}, moneyGain:0, icon:'📚', color:[139,90,43] },
    { name:'Computer Desk', tileX:3, tileY:1, w:1.2, h:1, action:'Work / Code', skill:'tech', skillGain:2, needEffect:{fun:-3,energy:-10}, moneyGain:15, icon:'💻', color:[80,80,100] },
    { name:'Easel', tileX:5, tileY:1, w:0.8, h:1.2, action:'Paint', skill:'creativity', skillGain:2, needEffect:{fun:10,energy:-5}, moneyGain:0, icon:'🎨', color:[200,150,100] },
    { name:'Yoga Mat', tileX:7, tileY:1, w:1.2, h:0.8, action:'Exercise', skill:'wellness', skillGain:2, needEffect:{energy:-12,fun:2}, moneyGain:0, icon:'🧘', color:[100,180,120] },
    { name:'Fridge', tileX:1, tileY:5, w:0.8, h:1, action:'Eat', skill:null, skillGain:0, needEffect:{hunger:35,energy:5}, moneyGain:0, icon:'🍎', color:[220,220,220] },
    { name:'Bed', tileX:4, tileY:5, w:2, h:1.2, action:'Sleep', skill:null, skillGain:0, needEffect:{energy:40,hunger:-5}, moneyGain:0, icon:'🛏️', color:[180,140,200] },
    { name:'Radio', tileX:7, tileY:5, w:0.8, h:0.8, action:'Listen Music', skill:null, skillGain:0, needEffect:{fun:25,energy:-3}, moneyGain:0, icon:'🎵', color:[200,100,100] },
  ];
}

// ==================== SETUP ====================
function setup(){
  createCanvas(1000,600).parent('game-container');
  originX = width/2 - (GRID_W * TILE_W)/4;
  originY = 130;
  initObjects();
  GoalSystem.pickNewGoal();
  JournalSystem.addEntry('🏠 Day 1: A new beginning.');
}

// ==================== MOUSE ====================
function mousePressed(){
  AudioSystem.init();
  if(mouseX>width-60 && mouseY<60){ JournalSystem.toggle(); return; }
  if(mouseX>width-110 && mouseY<60 && mouseX<width-65){
    AudioSystem.toggle(); message = AudioSystem.enabled ? '🔊 Sound ON' : '🔇 Sound OFF';
    showMessage(120);
    return;
  }
  if(JournalSystem.showJournal){ JournalSystem.showJournal=false; return; }
  if(character.moving || character.action || cutscene) return;

  let iso = screenToIso(mouseX, mouseY);
  let clickedObj = null;
  for(let obj of objects){
    if(iso.tx >= obj.tileX && iso.tx < obj.tileX+obj.w &&
       iso.ty >= obj.tileY && iso.ty < obj.tileY+obj.h){
      clickedObj = obj; break;
    }
  }
  if(clickedObj){
    AudioSystem.click();
    // target tile to stand near the object
    let centerTX = clickedObj.tileX + clickedObj.w/2;
    let centerTY = clickedObj.tileY + clickedObj.h/2;
    let targetTX = centerTX + (centerTX > 5 ? -1 : 1);
    let targetTY = centerTY + (centerTY > 4 ? -1 : 1);
    // clamp to room
    targetTX = constrain(targetTX, 0, GRID_W-1);
    targetTY = constrain(targetTY, 0, GRID_H-1);

    // kill existing movement tween
    if(character.moveTween) character.moveTween.kill();
    character.targetTileX = targetTX;
    character.targetTileY = targetTY;
    character.moving = true;
    character.actionObj = clickedObj;

    // GSAP movement
    let startTX = character.tileX, startTY = character.tileY;
    let objDist = { val: 0 };
    character.moveTween = gsap.to(objDist, {
      val: 1,
      duration: 0.6,
      ease: "power2.inOut",
      onUpdate: () => {
        character.tileX = lerp(startTX, targetTX, objDist.val);
        character.tileY = lerp(startTY, targetTY, objDist.val);
      },
      onComplete: () => {
        character.tileX = targetTX;
        character.tileY = targetTY;
        character.moving = false;
        startCharacterAction(clickedObj);
      }
    });
    // footstep sound during walk
    let stepInterval = setInterval(() => {
      if (!character.moving) { clearInterval(stepInterval); return; }
      AudioSystem.footstep();
    }, 300);
    // clean up interval on complete
    let origComplete = character.moveTween.eventCallback("onComplete");
    character.moveTween.eventCallback("onComplete", () => {
      clearInterval(stepInterval);
      if (origComplete) origComplete();
    });
  }
}

function startCharacterAction(obj){
  character.action = obj;
  character.actionObj = obj;
  character.actionTimer = character.actionDuration;
  showProgress = true;
  actionProgress = 0;
  AudioSystem.actionStart();
  // animate progress bar via GSAP
  gsap.to(character, {
    actionTimer: 0,
    duration: character.actionDuration,
    ease: "none",
    onUpdate: () => {
      actionProgress = 1 - (character.actionTimer / character.actionDuration);
    },
    onComplete: () => {
      performAction();
      character.action = null;
      character.actionObj = null;
      showProgress = false;
      actionProgress = 0;
    }
  });
}

function performAction(){
  let obj = character.actionObj;
  if(!obj) return;
  if(obj.skill && skills[obj.skill]!==undefined){
    let old = skills[obj.skill];
    skills[obj.skill] = min(skills[obj.skill] + obj.skillGain, 100);
    if(skills[obj.skill] > old){
      let p = isoToScreen(character.tileX, character.tileY);
      FloatingTextSystem.addSkillGain(p.x, p.y, obj.skill, obj.skillGain);
      ParticleSystem.emitSparkles(p.x, p.y-20);
    }
  }
  for(let need in obj.needEffect) needs[need] = constrain(needs[need] + obj.needEffect[need], 0, 100);
  if(obj.moneyGain>0){
    money += obj.moneyGain; AchievementSystem.addMoney(obj.moneyGain);
    let p = isoToScreen(character.tileX, character.tileY);
    FloatingTextSystem.addMoneyGain(p.x, p.y, obj.moneyGain);
  }
  if(money<0) money=0;
  let goalDone = GoalSystem.checkProgress(obj.action, skills, obj.moneyGain);
  if(goalDone){
    money += GoalSystem.getReward();
    showMessage(`✅ Goal complete! +$${GoalSystem.getReward()}`, 240);
    ParticleSystem.emitConfetti(width/2, 300);
    AudioSystem.achievement();
    GoalSystem.pickNewGoal();
  }
  let ach = AchievementSystem.check(skills, money, day, roomLevel);
  if(ach) showMessage(`🏆 Achievement: ${ach.name}!`, 300);
  showMessage(`${obj.icon} ${obj.action} complete!`, 180);
  checkRoomUpgrade();
  if(obj.action === 'Sleep'){
    character.sleeping = true;
    AudioSystem.sleep();
    cutscene = 'sleeping';
    cutsceneTimer = 180;
    JournalSystem.addEntry(`😴 Day ${day}: ${JournalSystem.generateDailySummary()}`);
  }
  dayTimer += 30;
  if(dayTimer >= DAY_LENGTH){
    dayTimer = 0; day++;
    showMessage(`☀️ Day ${day} - Your future grows brighter!`, 240);
    JournalSystem.addEntry(`☀️ Day ${day}: ${JournalSystem.generateDailySummary()}`);
  }
  timeOfDay = (timeOfDay + 0.08) % 1;
  isNighttime = timeOfDay > 0.6;
  AudioSystem.actionComplete();
}

function checkRoomUpgrade(){
  let total = skills.education+skills.tech+skills.creativity+skills.wellness;
  let newLevel = 0;
  for(let i=4; i>=0; i--){ if(total >= i*20){ newLevel = i; break; } }
  if(newLevel > roomLevel){
    roomLevel = newLevel;
    showMessage(`✨ Room upgraded to Level ${roomLevel}!`, 300);
    ParticleSystem.emitConfetti(width/2, 200);
    AudioSystem.upgrade();
    cutscene = 'upgrade';
    cutsceneTimer = 120;
    JournalSystem.addEntry(`✨ Room upgraded to Level ${roomLevel}!`);
  }
}

function showMessage(text, duration){
  message = text;
  messageTimer = duration;
  messageAlpha = 1;
  if(messageTween) messageTween.kill();
  messageTween = gsap.to({}, { duration: duration/60, onComplete: () => { messageAlpha = 0; } });
}

// ==================== GAME LOOP ====================
function draw(){
  background(isNighttime ? color(30,40,60) : color(200,220,240));
  // update needs (except sleeping)
  if(!character.sleeping){
    needs.hunger = max(0, needs.hunger - NEED_DECAY);
    needs.energy = max(0, needs.energy - NEED_DECAY*1.2);
    needs.fun = max(0, needs.fun - NEED_DECAY*0.8);
    if(needs.hunger<15 && frameCount%120===0) showMessage('⚠️ You\'re very hungry!', 120);
    if(needs.energy<15 && frameCount%120===0) showMessage('⚠️ You\'re exhausted!', 120);
  }
  // random event
  let event = EventSystem.tryTrigger();
  if(event){ EventSystem.applyEffect(skills, needs, money); showMessage(event.text, 240); }

  // cutscene handling
  if(cutscene){
    drawIsometricRoom();
    drawAllEntities();
    if(cutscene==='sleeping'){
      fill(0,0,30,200); rect(0,0,width,height);
      fill(255); textSize(24); textAlign(CENTER); text('😴 Sleeping...', width/2, height/2);
      if(--cutsceneTimer<=0){
        cutscene=null; character.sleeping=false; day++; dayTimer=0; timeOfDay=0.15; isNighttime=false; needs.energy=100; showMessage(`☀️ Day ${day} - A new day begins!`, 240);
      }
    } else if(cutscene==='upgrade'){
      fill(0,0,0,150); rect(0,0,width,height);
      fill(255,215,0); textSize(28); textAlign(CENTER); text('✨ Room Upgraded! ✨', width/2, height/2);
      if(--cutsceneTimer<=0) cutscene=null;
    }
    drawUI();
    return;
  }

  // draw isometric room & entities
  drawIsometricRoom();
  drawAllEntities();

  // particles & floating text (screen space)
  ParticleSystem.update();
  FloatingTextSystem.update();
  ParticleSystem.draw();
  FloatingTextSystem.draw();

  // UI
  drawUI();

  // message timer
  if(messageTimer>0){
    messageTimer--;
    if(messageTimer<=0) messageAlpha = 0;
  }
}

function drawIsometricRoom(){
  // floor tiles
  for(let ty=0; ty<GRID_H; ty++){
    for(let tx=0; tx<GRID_W; tx++){
      let p = isoToScreen(tx, ty);
      fill(roomLevel>=2 ? 220 : 180, roomLevel>=3 ? 200 : 160, 140);
      noStroke();
      beginShape();
      vertex(p.x, p.y);
      vertex(p.x+TILE_W/2, p.y+TILE_H/2);
      vertex(p.x, p.y+TILE_H);
      vertex(p.x-TILE_W/2, p.y+TILE_H/2);
      endShape(CLOSE);
      // tile grid lines
      stroke(0,30); strokeWeight(0.5);
      line(p.x, p.y, p.x+TILE_W/2, p.y+TILE_H/2);
      line(p.x+TILE_W/2, p.y+TILE_H/2, p.x, p.y+TILE_H);
      line(p.x, p.y+TILE_H, p.x-TILE_W/2, p.y+TILE_H/2);
      line(p.x-TILE_W/2, p.y+TILE_H/2, p.x, p.y);
      noStroke();
    }
  }
  // walls (back two walls in isometric)
  drawWall(0,0, GRID_W, 0); // top wall
  drawWall(0,0, 0, GRID_H); // left wall
  // window on back wall
  let winP = isoToScreen(GRID_W/2-1, 0);
  fill(isNighttime? color(30,40,80) : color(150,200,240));
  beginShape();
  vertex(winP.x-30, winP.y-40);
  vertex(winP.x+30, winP.y-40);
  vertex(winP.x+30, winP.y+10);
  vertex(winP.x-30, winP.y+10);
  endShape(CLOSE);
  // window frame
  stroke(80); strokeWeight(2); noFill();
  rect(winP.x-30, winP.y-40, 60, 50);
  noStroke();
}

function drawWall(x1,y1, x2,y2){
  let p1 = isoToScreen(x1,y1);
  let p2 = isoToScreen(x2,y2);
  stroke(100); strokeWeight(2);
  line(p1.x, p1.y, p2.x, p2.y);
  noStroke();
}

function drawAllEntities(){
  let entities = [];
  for(let obj of objects) entities.push({ type:'object', obj });
  entities.push({ type:'character' });
  // sort by depth (tileY + tileX)
  entities.sort((a,b)=>{
    let ay = a.type==='character' ? character.tileY : a.obj.tileY;
    let ax = a.type==='character' ? character.tileX : a.obj.tileX;
    let by = b.type==='character' ? character.tileY : b.obj.tileY;
    let bx = b.type==='character' ? character.tileX : b.obj.tileX;
    return (ay+ax) - (by+bx);
  });
  for(let e of entities){
    if(e.type==='object') drawObject(e.obj);
    else drawCharacter();
  }
}

function drawObject(obj){
  let p = isoToScreen(obj.tileX, obj.tileY);
  // object base
  fill(obj.color);
  noStroke();
  // draw isometric box
  let w = obj.w * TILE_W;
  let h = obj.h * TILE_H;
  // front face
  beginShape();
  vertex(p.x - w/2, p.y);
  vertex(p.x, p.y + h/2);
  vertex(p.x, p.y + h);
  vertex(p.x - w/2, p.y + h/2);
  endShape(CLOSE);
  // top face
  fill(obj.color[0]*1.2, obj.color[1]*1.2, obj.color[2]*1.2);
  beginShape();
  vertex(p.x - w/2, p.y);
  vertex(p.x, p.y - h/2);
  vertex(p.x + w/2, p.y);
  vertex(p.x, p.y + h/2);
  endShape(CLOSE);
  // icon on top
  fill(255);
  textSize(18);
  textAlign(CENTER, CENTER);
  text(obj.icon, p.x, p.y - h/4);
  // highlight on hover
  if(!character.moving && !character.action){
    let iso = screenToIso(mouseX, mouseY);
    if(iso.tx >= obj.tileX && iso.tx < obj.tileX+obj.w &&
       iso.ty >= obj.tileY && iso.ty < obj.tileY+obj.h){
      noFill(); stroke(255,255,200,150); strokeWeight(2);
      rect(p.x-w/2, p.y-h/2, w, h);
      noStroke();
    }
  }
  // progress bar if active
  if(showProgress && character.actionObj === obj){
    let barW = 50;
    let barH = 6;
    fill(0,150); rect(p.x-barW/2, p.y-20, barW, barH);
    fill(255,215,0); rect(p.x-barW/2, p.y-20, barW * actionProgress, barH);
  }
}

function drawCharacter(){
  let p = isoToScreen(character.tileX, character.tileY);
  // shadow
  fill(0,50); ellipse(p.x, p.y+10, 20, 8);
  // body
  fill(100,150,220);
  ellipse(p.x, p.y-10, 16, 20);
  // head
  fill(255,210,170); ellipse(p.x, p.y-28, 14, 16);
  // hair
  fill(60,40,20); arc(p.x, p.y-34, 16, 8, PI, TWO_PI);
  // eyes
  fill(30); ellipse(p.x-4, p.y-30, 3,4); ellipse(p.x+4, p.y-30, 3,4);
  // blink occasionally
  if(character.isBlinking){
    stroke(30); strokeWeight(1.5); line(p.x-6, p.y-30, p.x-2, p.y-30); line(p.x+2, p.y-30, p.x+6, p.y-30); noStroke();
  }
  // mouth
  noFill(); stroke(180,100,80); strokeWeight(1); arc(p.x, p.y-24, 6,4, 0, PI); noStroke();
  // idle sway
  if(!character.moving && !character.action){
    translate(0, sin(frameCount*0.05)*2);
  }
  // accessories based on skills
  if(skills.education>=8){ noFill(); stroke(40); strokeWeight(1.5); ellipse(p.x-5, p.y-31, 6,5); ellipse(p.x+5, p.y-31, 6,5); line(p.x-2, p.y-31, p.x+2, p.y-31); noStroke(); }
  if(skills.tech>=8){ fill(40); ellipse(p.x-10, p.y-29, 5,8); ellipse(p.x+10, p.y-29, 5,8); noFill(); stroke(40); strokeWeight(2); arc(p.x, p.y-20, 22,18, PI+0.5, TWO_PI-0.5); noStroke(); }
  if(skills.creativity>=8){ fill(180,50,80); ellipse(p.x, p.y-38, 24,8); ellipse(p.x+4, p.y-42, 6,5); }
}

// ==================== UI (unchanged from original, but message alpha animated) ====================
function drawUI(){
  // journal & sound buttons
  fill(0,0,0,160); noStroke();
  rect(width-60,5,50,30,8); fill(255); textSize(16); textAlign(CENTER); text('📖', width-35,26);
  rect(width-115,5,50,30,8); text(AudioSystem.enabled?'🔊':'🔇', width-90,26);

  if(JournalSystem.showJournal){
    fill(0,0,0,220); rect(50,50, width-100, height-100,20);
    fill(255); textSize(20); textAlign(CENTER); text('📖 Life Journal', width/2,80);
    textSize(11); text('(Click anywhere to close)', width/2,100);
    textAlign(LEFT);
    for(let i=0; i<Math.min(JournalSystem.entries.length,8); i++){
      let e=JournalSystem.entries[i];
      fill(200); textSize(11); text(e.text, 80,125+i*40);
      textSize(9); fill(150); text(`Day ${e.day}`, 80,140+i*40);
    }
    return;
  }

  // needs panel
  fill(0,0,0,160); rect(10,10,220,280,15);
  fill(255); textSize(14); textAlign(LEFT); text("❤️ NEEDS",20,35);
  drawNeedBar("Hunger", needs.hunger, 20,50, [76,175,80], [244,67,54]);
  drawNeedBar("Energy", needs.energy, 20,75, [255,152,0], [255,152,0]);
  drawNeedBar("Fun", needs.fun, 20,100, [33,150,243], [33,150,243]);

  fill(255); text("📈 SKILLS",20,135);
  drawSkillBar("Education", skills.education, 20,150);
  drawSkillBar("Tech", skills.tech, 20,170);
  drawSkillBar("Creativity", skills.creativity, 20,190);
  drawSkillBar("Wellness", skills.wellness, 20,210);

  fill(255,215,0); textSize(13); text(`💰 $${money}`,20,240);
  fill(200); text(`📅 Day ${day}`,120,240);
  fill(200,180,255); textSize(11); text(`🏠 Room Lv.${roomLevel}`,20,260);
  fill(255,215,0); text(`🏆 ${AchievementSystem.getUnlockedCount()}/${AchievementSystem.getTotalCount()}`,130,260);

  // goal display
  if(GoalSystem.activeGoal && !GoalSystem.completed){
    fill(0,0,0,180); rect(width-250,5,240,40,10);
    fill(255); textSize(11); textAlign(RIGHT); text(`🎯 Goal: ${GoalSystem.activeGoal.text}`, width-20,25);
    text(`Progress: ${GoalSystem.activeGoal.progress}/${GoalSystem.activeGoal.count}`, width-20,40);
  }

  // message
  if(message && messageAlpha>0){
    fill(0,0,0,200*messageAlpha); rect(width/2-200, height-60, 400,40,20);
    fill(255,255,200,255*messageAlpha); textSize(14); textAlign(CENTER); text(message, width/2, height-35);
  }

  // achievement popup
  if(AchievementSystem.recentTimer>0){
    AchievementSystem.recentTimer--;
    let ach = AchievementSystem.recentlyUnlocked;
    let alpha = AchievementSystem.recentTimer>150 ? 255 : map(AchievementSystem.recentTimer,150,0,255,0);
    fill(0,0,0,alpha); rect(width/2-150, height/2-50, 300,60,15);
    fill(255,215,0,alpha); textSize(16); textAlign(CENTER); text('🏆 Achievement Unlocked!', width/2, height/2-25);
    textSize(13); fill(255,alpha); text(ach.name+' - '+ach.desc, width/2, height/2+5);
  }

  // event notification
  if(EventSystem.currentEvent && EventSystem.eventTimer>0){
    let alpha = map(EventSystem.eventTimer,180,0,255,0);
    EventSystem.eventTimer--;
    let evt = EventSystem.currentEvent;
    let col = evt.type==='good'?[100,255,100]:evt.type==='bad'?[255,100,100]:[200,200,200];
    fill(0,0,0,alpha*0.8); rect(width/2-180, 60, 360,45,12);
    fill(col[0],col[1],col[2],alpha); textSize(13); textAlign(CENTER); text(evt.text, width/2, 88);
  }

  // title
  fill(255,255,200,200); textSize(18); textAlign(RIGHT); text("✨ My Future Room", width-20, height-85);
  textSize(11); text("Design Your Future", width-20, height-68);
}

function drawNeedBar(label, value, x, y, colG, colB){
  fill(200); textSize(11); textAlign(LEFT); text(label, x, y);
  fill(100); rect(x+50, y-8, 80,10,4);
  let col = value>50 ? colG : colB;
  if(value<20){ let pulse = sin(frameCount*0.1)*0.3+0.7; fill(col[0]*pulse, col[1]*pulse, col[2]*pulse); }
  else fill(col[0],col[1],col[2]);
  rect(x+50, y-8, 80*(value/100),10,4);
  if(value<15){ fill(255,100,100,50+sin(frameCount*0.2)*30); rect(x+50, y-8,80,10,4); }
}

function drawSkillBar(label, value, x, y){
  fill(200); textSize(11); textAlign(LEFT); text(label, x, y);
  fill(100); rect(x+70, y-8, 80,10,4);
  let col;
  if(label==='Education') col=[100,180,255];
  else if(label==='Tech') col=[100,200,200];
  else if(label==='Creativity') col=[255,150,200];
  else col=[100,220,150];
  fill(col[0],col[1],col[2]); rect(x+70, y-8, 80*(value/100),10,4);
}

document.addEventListener('contextmenu', e => e.preventDefault());
