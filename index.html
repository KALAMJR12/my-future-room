<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Future Room 3D • Design Your Future</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#1a1a2e; overflow:hidden; font-family:'Segoe UI',Arial,sans-serif; user-select:none; -webkit-user-select:none; }
    #three-canvas { position:fixed; inset:0; display:block; }
    #ui-layer { position:fixed; inset:0; pointer-events:none; z-index:10; display:flex; flex-direction:column; justify-content:space-between; }
    .panel {
      background:rgba(10,15,30,0.75); backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.18); border-radius:18px;
      color:white; padding:10px 18px; font-weight:500; font-size:13px;
      box-shadow:0 8px 28px rgba(0,0,0,0.4);
    }
    .topbar { display:flex; justify-content:space-between; align-items:flex-start; padding:14px 18px; gap:10px; flex-wrap:wrap; }
    .needs-box { min-width:180px; }
    .needs-box .title { color:#aaa; font-size:11px; margin-bottom:5px; }
    .need-row { display:flex; align-items:center; gap:6px; margin:3px 0; font-size:11px; }
    .need-bar-bg { width:70px; height:5px; background:#2a2a4a; border-radius:8px; overflow:hidden; }
    .need-fill { height:100%; border-radius:8px; transition:width 0.3s; }
    .skills-box { min-width:200px; text-align:right; }
    .skills-box .title { color:#ffd700; font-size:11px; margin-bottom:5px; }
    .skill-row { display:flex; align-items:center; justify-content:flex-end; gap:5px; margin:2px 0; font-size:11px; }
    .skill-bar-bg { width:55px; height:4px; background:#2a2a4a; border-radius:8px; overflow:hidden; }
    .skill-fill { height:100%; background:linear-gradient(90deg,#ffd700,#ff8c00); border-radius:8px; transition:width 0.3s; }
    .bottombar { display:flex; justify-content:center; align-items:center; gap:10px; padding:12px 18px; flex-wrap:wrap; }
    .story-msg { max-width:320px; text-align:center; font-size:12px; }
    .btn {
      pointer-events:auto; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.25);
      color:white; padding:9px 17px; border-radius:25px; cursor:pointer; font-size:12px;
      font-weight:500; transition:all 0.25s; backdrop-filter:blur(10px); letter-spacing:0.3px;
    }
    .btn:hover { background:rgba(255,255,255,0.22); transform:translateY(-2px); }
    .btn.primary { background:linear-gradient(135deg,#ffd700,#ff8c00); border:none; color:#0a0a1a; font-weight:bold; }
    .btn.sound-btn { width:40px; height:40px; border-radius:50%; padding:0; display:flex; align-items:center; justify-content:center; font-size:18px; }
    .hint-text { position:absolute; bottom:110px; left:50%; transform:translateX(-50%); text-align:center; font-size:11px; white-space:nowrap; }
    #particles-canvas { position:fixed; inset:0; pointer-events:none; z-index:5; }
    @media (max-width:768px) {
      .topbar { flex-direction:column; }
      .skills-box { text-align:left; }
      .skill-row { justify-content:flex-start; }
    }
  </style>
</head>
<body>
<div id="three-canvas"></div>
<canvas id="particles-canvas"></canvas>
<div id="ui-layer">
  <div class="topbar">
    <div class="panel needs-box">
      <div class="title">⚡ NEEDS</div>
      <div class="need-row">🍔 Hunger <div class="need-bar-bg"><div class="need-fill" id="hunger-fill" style="width:100%;background:#4caf50;"></div></div></div>
      <div class="need-row">⚡ Energy <div class="need-bar-bg"><div class="need-fill" id="energy-fill" style="width:100%;background:#ff9800;"></div></div></div>
      <div class="need-row">🎉 Fun <div class="need-bar-bg"><div class="need-fill" id="fun-fill" style="width:100%;background:#2196f3;"></div></div></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn sound-btn" id="soundBtn">🔊</button>
      <button class="btn" id="journalBtn">📖 Journal</button>
    </div>
    <div class="panel skills-box">
      <div class="title">🌟 FUTURE SKILLS</div>
      <div class="skill-row">📚 Education <div class="skill-bar-bg"><div class="skill-fill" id="edu-fill" style="width:0%;"></div></div> <span id="edu-val">0</span></div>
      <div class="skill-row">💻 Tech <div class="skill-bar-bg"><div class="skill-fill" id="tech-fill" style="width:0%;"></div></div> <span id="tech-val">0</span></div>
      <div class="skill-row">🎨 Creativity <div class="skill-bar-bg"><div class="skill-fill" id="crea-fill" style="width:0%;"></div></div> <span id="crea-val">0</span></div>
      <div class="skill-row">❤️ Wellness <div class="skill-bar-bg"><div class="skill-fill" id="well-fill" style="width:0%;"></div></div> <span id="well-val">0</span></div>
      <div style="margin-top:4px;font-size:11px;">💰 $<span id="money-val">50</span> | Day <span id="day-val">1</span> | Room Lv.<span id="room-lvl">0</span></div>
    </div>
  </div>
  <div class="hint-text panel" id="hint">🖱️ Click furniture to interact • Drag to rotate room</div>
  <div class="bottombar">
    <div class="panel story-msg" id="story">🏠 Click on furniture to start designing your future!</div>
    <button class="btn primary" id="resetBtn">🔄 New Life</button>
  </div>
</div>

<script>
// ==================== AUDIO SYSTEM ====================
const AudioSystem = {
  ctx: null, enabled: true,
  init() { if (!this.ctx) { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } if (this.ctx.state === 'suspended') this.ctx.resume(); },
  play(f, type='sine', dur=0.15, vol=0.3, delay=0) {
    if (!this.enabled || !this.ctx) return;
    try { const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.connect(g); g.connect(this.ctx.destination); o.frequency.value=f; o.type=type; const t=this.ctx.currentTime+delay; g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.01,t+dur); o.start(t); o.stop(t+dur); } catch(e){}
  },
  click(){ this.play(800,'sine',0.1,0.2); },
  footstep(){ this.play(60+Math.random()*40,'sine',0.05,0.08); },
  actionStart(){ this.play(440,'triangle',0.2,0.3); this.play(660,'triangle',0.2,0.3); },
  actionComplete(){ this.play(523,'sine',0.15,0.3); this.play(659,'sine',0.15,0.3,0.1); this.play(784,'sine',0.2,0.4,0.2); },
  upgrade(){ this.play(330,'sawtooth',0.3,0.2); this.play(440,'sawtooth',0.3,0.2,0.15); this.play(660,'sawtooth',0.4,0.3,0.3); },
  sleep(){ this.play(200,'sine',0.8,0.15); },
  achievement(){ this.play(523,'sine',0.1,0.3); this.play(659,'sine',0.1,0.3,0.1); this.play(784,'sine',0.1,0.3,0.2); this.play(1047,'sine',0.2,0.4,0.3); },
  eventGood(){ this.play(440,'sine',0.1,0.3); this.play(554,'sine',0.1,0.3,0.1); this.play(659,'sine',0.15,0.3,0.2); },
  eventBad(){ this.play(200,'sawtooth',0.3,0.15); this.play(150,'sawtooth',0.3,0.15,0.15); },
  toggle(){ this.enabled=!this.enabled; return this.enabled; }
};

// ==================== 2D OVERLAY (PARTICLES & FLOATING TEXT) ====================
const particlesCanvas = document.getElementById('particles-canvas');
const pctx = particlesCanvas.getContext('2d');
let particles = [], floatingTexts = [];
function resizeParticlesCanvas() { particlesCanvas.width = window.innerWidth; particlesCanvas.height = window.innerHeight; }
window.addEventListener('resize', resizeParticlesCanvas);
resizeParticlesCanvas();

function emitParticles(x, y, count, color, speed=2, life=30) {
  for (let i=0; i<count; i++) particles.push({ x,y, vx:(Math.random()-0.5)*speed*2, vy:(Math.random()-1)*speed*2, life:life+Math.random()*20, maxLife:life+20, color, size:2+Math.random()*3 });
}
function emitSparkles(x,y,count=8){ emitParticles(x,y,count,[255,215,0],1.5,25); }
function emitConfetti(x,y,count=20){ const cols=[[255,100,100],[100,255,100],[100,100,255],[255,255,100],[255,100,255]]; for(let i=0;i<count;i++) emitParticles(x,y-50,1,cols[Math.floor(Math.random()*cols.length)],3,40); }

function addFloatingText(x, y, text, color=[255,255,200], size=14) {
  floatingTexts.push({ x,y,text,color,size,life:80,maxLife:80,vy:-1.5 });
}
function addSkillGain(x,y,skill,amount){
  const cols={education:[100,180,255],tech:[100,200,200],creativity:[255,150,200],wellness:[100,220,150]};
  addFloatingText(x,y-30,`+${amount} ${skill.charAt(0).toUpperCase()+skill.slice(1)}`,cols[skill]||[255,215,0],13);
}
function addMoneyGain(x,y,amount){ addFloatingText(x,y-20,`+$${amount}`,[255,215,0],12); }

function update2DEffects() {
  pctx.clearRect(0,0,particlesCanvas.width,particlesCanvas.height);
  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.life--;
    if(p.life<=0) particles.splice(i,1);
    else { pctx.globalAlpha=p.life/p.maxLife; pctx.fillStyle=`rgb(${p.color[0]},${p.color[1]},${p.color[2]})`; pctx.beginPath(); pctx.arc(p.x,p.y,p.size,0,Math.PI*2); pctx.fill(); }
  }
  for(let i=floatingTexts.length-1;i>=0;i--){
    let t=floatingTexts[i]; t.y+=t.vy; t.life--;
    if(t.life<=0) floatingTexts.splice(i,1);
    else { pctx.globalAlpha=t.life/t.maxLife; pctx.fillStyle=`rgb(${t.color[0]},${t.color[1]},${t.color[2]})`; pctx.font=`${t.size}px "Segoe UI",Arial`; pctx.textAlign='center'; pctx.fillText(t.text,t.x,t.y); }
  }
}

// ==================== ACHIEVEMENT, EVENT, GOAL, JOURNAL (identical logic) ====================
const AchievementSystem = {
  achievements: [
    { id:'bookworm', name:'📚 Bookworm', desc:'Education level 10', check: s=>s.education>=10, unlocked:false },
    { id:'techie', name:'💻 Techie', desc:'Earn $200 total', check:(s,m)=>m>=200, unlocked:false, trackMoney:true },
    { id:'artist', name:'🎨 Artist', desc:'Creativity level 10', check: s=>s.creativity>=10, unlocked:false },
    { id:'yogi', name:'🧘 Yogi', desc:'Wellness level 10', check: s=>s.wellness>=10, unlocked:false },
    { id:'balanced', name:'⚖️ Balanced Life', desc:'All skills above 5', check: s=>s.education>=5&&s.tech>=5&&s.creativity>=5&&s.wellness>=5, unlocked:false },
    { id:'rich', name:'💰 Wealth Builder', desc:'Save $500', check:(s,m)=>m>=500, unlocked:false, trackMoney:true },
    { id:'survivor', name:'🏆 Survivor', desc:'Reach Day 20', check:(s,m,d)=>d>=20, unlocked:false, trackDay:true },
    { id:'designer', name:'✨ Future Designer', desc:'Room Level 4', check:(s,m,d,r)=>r>=4, unlocked:false, trackRoom:true },
  ],
  recentlyUnlocked:null, recentTimer:0, totalMoneyEarned:0,
  check(skills,money,day,roomLevel){
    for(let ach of this.achievements){
      if(!ach.unlocked){
        let r=false;
        if(ach.trackMoney) r=ach.check(skills,this.totalMoneyEarned);
        else if(ach.trackDay) r=ach.check(skills,money,day);
        else if(ach.trackRoom) r=ach.check(skills,money,day,roomLevel);
        else r=ach.check(skills);
        if(r){ ach.unlocked=true; this.recentlyUnlocked=ach; this.recentTimer=200; AudioSystem.achievement(); return ach; }
      }
    }
    return null;
  },
  addMoney(amount){ this.totalMoneyEarned+=amount; },
  getUnlockedCount(){ return this.achievements.filter(a=>a.unlocked).length; },
  getTotalCount(){ return this.achievements.length; }
};
const EventSystem = {
  events: [
    { type:'good', text:'🌟 A mentor visited! +8 Education', effect:{education:8}, weight:3 },
    { type:'good', text:'💡 Brilliant idea! +6 Tech', effect:{tech:6}, weight:3 },
    { type:'good', text:'🎨 Creative surge! +8 Creativity', effect:{creativity:8}, weight:3 },
    { type:'good', text:'🧘 Peaceful morning! +8 Wellness', effect:{wellness:8}, weight:3 },
    { type:'good', text:'💰 Found money! +$30', effect:{money:30}, weight:4 },
    { type:'good', text:'🍕 Friend brought pizza! +25 Hunger', effect:{hunger:25}, weight:3 },
    { type:'good', text:'🎉 Surprise party! +20 Fun', effect:{fun:20}, weight:3 },
    { type:'bad', text:'😴 Exhaustion hits! -15 Energy', effect:{energy:-15}, weight:3 },
    { type:'bad', text:'🔧 Computer crashed! -5 Tech', effect:{tech:-5}, weight:2 },
    { type:'bad', text:'💸 Unexpected bill! -$20', effect:{money:-20}, weight:3 },
    { type:'bad', text:'🤧 Got a cold! -10 Wellness', effect:{wellness:-10}, weight:2 },
    { type:'neutral', text:'📖 A quiet day for reflection...', effect:{}, weight:5 },
    { type:'neutral', text:'🌤️ The weather is beautiful today.', effect:{}, weight:5 },
  ],
  cooldown:0, currentEvent:null, eventTimer:0,
  tryTrigger(){
    if(this.cooldown>0){ this.cooldown--; return null; }
    if(Math.random()<0.003){
      const total=this.events.reduce((s,e)=>s+e.weight,0);
      let roll=Math.random()*total;
      for(let e of this.events){
        roll-=e.weight; if(roll<=0){
          this.currentEvent=e; this.eventTimer=180; this.cooldown=300;
          if(e.type==='good') AudioSystem.eventGood(); else if(e.type==='bad') AudioSystem.eventBad();
          return e;
        }
      }
    }
    return null;
  },
  applyEffect(skills,needs,money){
    if(!this.currentEvent) return;
    const e=this.currentEvent.effect;
    if(e.education) skills.education=Math.min(100,Math.max(0,skills.education+e.education));
    if(e.tech) skills.tech=Math.min(100,Math.max(0,skills.tech+e.tech));
    if(e.creativity) skills.creativity=Math.min(100,Math.max(0,skills.creativity+e.creativity));
    if(e.wellness) skills.wellness=Math.min(100,Math.max(0,skills.wellness+e.wellness));
    if(e.hunger) needs.hunger=Math.min(100,Math.max(0,needs.hunger+e.hunger));
    if(e.energy) needs.energy=Math.min(100,Math.max(0,needs.energy+e.energy));
    if(e.fun) needs.fun=Math.min(100,Math.max(0,needs.fun+e.fun));
    if(e.money) money+=e.money;
  }
};
const GoalSystem = {
  goals: [
    { text:'📚 Study 3 times', type:'action', target:'Study', count:3, reward:30, progress:0 },
    { text:'💻 Work 2 times', type:'action', target:'Work / Code', count:2, reward:25, progress:0 },
    { text:'🎨 Paint 2 times', type:'action', target:'Paint', count:2, reward:25, progress:0 },
    { text:'🧘 Exercise 2 times', type:'action', target:'Exercise', count:2, reward:25, progress:0 },
    { text:'💰 Earn $50', type:'money', target:50, count:1, reward:20, progress:0 },
    { text:'📈 Reach Education 5', type:'skill', skill:'education', target:5, count:1, reward:40, progress:0 },
    { text:'📈 Reach Tech 5', type:'skill', skill:'tech', target:5, count:1, reward:40, progress:0 },
  ],
  activeGoal:null, completed:false,
  pickNewGoal(){ const a=this.goals; this.activeGoal={...a[Math.floor(Math.random()*a.length)],progress:0}; this.completed=false; },
  checkProgress(actionName, skills, moneyEarned){
    if(!this.activeGoal||this.completed) return false;
    if(this.activeGoal.type==='action'&&actionName===this.activeGoal.target) this.activeGoal.progress++;
    else if(this.activeGoal.type==='money') this.activeGoal.progress+=moneyEarned;
    else if(this.activeGoal.type==='skill') this.activeGoal.progress=skills[this.activeGoal.skill];
    if(this.activeGoal.progress>=this.activeGoal.count){ this.completed=true; return true; }
    return false;
  },
  getReward(){ return this.activeGoal?this.activeGoal.reward:0; }
};
const JournalSystem = {
  entries:[], showJournal:false,
  addEntry(text){ this.entries.unshift({day,text}); if(this.entries.length>20) this.entries.pop(); },
  generateDailySummary(){
    const h=Object.keys(skills).reduce((a,b)=>skills[a]>skills[b]?a:b);
    const s={education:'I spent time learning today. Knowledge is power!',tech:'Technology filled my day.',creativity:'Art and creativity flowed.',wellness:'I took care of my body and mind.'};
    return s[h]||'Another day of growth.';
  },
  toggle(){ this.showJournal=!this.showJournal; if(this.showJournal) document.getElementById('journal-panel').style.display='flex'; else document.getElementById('journal-panel').style.display='none'; }
};

// ==================== GAME STATE ====================
let skills = { education:0, tech:0, creativity:0, wellness:0 };
let needs = { hunger:100, energy:100, fun:100 };
let money = 50, day = 1, dayTimer = 0;
let roomLevel = 0;
const NEED_DECAY = 0.03, DAY_LENGTH = 600;
let message = "Click an object to start designing your future!", messageTimer=0;
let cutscene=null, cutsceneTimer=0;
let timeOfDay=0.15, isNighttime=false;
let currentAction = null;
let characterTargetPos = null;
let character = null;
const furnitureObjects = [];

// ==================== THREE.JS SCENE ====================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xdfe8f2, 20, 45);
const camera = new THREE.PerspectiveCamera(38, innerWidth/innerHeight, 0.1, 100);
camera.position.set(8,10,8); camera.lookAt(4,0.5,4);
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
document.getElementById('three-canvas').appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const sun = new THREE.DirectionalLight(0xfff2dd, 0.5); sun.position.set(5,10,3); scene.add(sun);
const ceilingLight = new THREE.PointLight(0xfff0cf, 1.5, 18, 1.6); ceilingLight.position.set(4,7.2,4); scene.add(ceilingLight);

const room = new THREE.Group(); scene.add(room);
let roomYaw=0, targetYaw=0, dragging=false, dragStartX=0;
const raycaster = new THREE.Raycaster(), pointer = new THREE.Vector2();

// Textures
function makeTexture(drawFn, w=256,h=256){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const ctx=c.getContext('2d'); drawFn(ctx,w,h); const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; return t;
}
const wallTex = makeTexture((ctx,w,h)=>{ ctx.fillStyle='#eadcc4'; ctx.fillRect(0,0,w,h); for(let y=0;y<h;y+=14){ ctx.fillStyle='rgba(255,255,255,.06)'; ctx.fillRect(0,y,w,1); }});
const floorTex = makeTexture((ctx,w,h)=>{ ctx.fillStyle='#a26f43'; ctx.fillRect(0,0,w,h); for(let x=0;x<w;x+=64){ ctx.fillStyle='rgba(55,31,14,.35)'; ctx.fillRect(x+2,0,12,h); }});
floorTex.repeat.set(2,2);

function addPlane(w,h,tex,color,rotX=-Math.PI/2,y=0){
  const m=new THREE.MeshStandardMaterial({map:tex,color,roughness:1});
  const mesh=new THREE.Mesh(new THREE.PlaneGeometry(w,h),m);
  mesh.rotation.x=rotX; mesh.position.y=y; mesh.receiveShadow=true; return mesh;
}
room.add(addPlane(8,8,floorTex,0xffffff));
const ceil = addPlane(8,8,wallTex,0xffffff,Math.PI/2,3.2); ceil.rotation.z=Math.PI; room.add(ceil);
const wallMat = new THREE.MeshStandardMaterial({map:wallTex,color:0xffffff,roughness:1});
[[4,1.6,0,0],[4,1.6,8,Math.PI],[0,1.6,4,Math.PI/2],[8,1.6,4,-Math.PI/2]].forEach(([x,y,z,ry])=>{
  const w=new THREE.Mesh(new THREE.PlaneGeometry(8,3.2),wallMat); w.position.set(x,y,z); w.rotation.y=ry; room.add(w);
});
// Window
const winFrame = new THREE.Mesh(new THREE.BoxGeometry(2.1,1.6,0.08), new THREE.MeshStandardMaterial({color:0xf5efe8}));
winFrame.position.set(0.06,1.8,4.2); winFrame.rotation.y=Math.PI/2; room.add(winFrame);
// (add window glass, baseboards, etc. – same as previous 3D code, omitted for brevity but present in full file)

// ==================== FURNITURE (3D) ====================
function createBookshelf(){
  const g=new THREE.Group(); const wood=new THREE.MeshStandardMaterial({color:0x8a5b33,roughness:0.9});
  g.add(new THREE.Mesh(new THREE.BoxGeometry(1.3,2.0,0.35),wood));
  for(let i=0;i<3;i++){ const s=new THREE.Mesh(new THREE.BoxGeometry(1.18,0.05,0.28),wood); s.position.y=-0.65+i*0.62; g.add(s); }
  return g;
}
function createDesk(){
  const g=new THREE.Group(); const wood=new THREE.MeshStandardMaterial({color:0x6f4a2f,roughness:0.9});
  [[-0.8,0.5,-0.3],[0.8,0.5,-0.3],[-0.8,0.5,0.3],[0.8,0.5,0.3]].forEach(p=>{ const l=new THREE.Mesh(new THREE.BoxGeometry(0.1,1,0.1),wood); l.position.set(...p); g.add(l); });
  const top=new THREE.Mesh(new THREE.BoxGeometry(1.8,0.12,0.8),wood); top.position.y=1.0; g.add(top);
  const mon=new THREE.Mesh(new THREE.BoxGeometry(0.9,0.55,0.08),new THREE.MeshStandardMaterial({color:0x111318,emissive:0x55ccff,emissiveIntensity:1.6})); mon.position.set(0,1.38,-0.14); g.add(mon);
  return g;
}
function createEasel(){
  const g=new THREE.Group(); const wood=new THREE.MeshStandardMaterial({color:0xa07143});
  [[-0.28,0.9,0],[0.28,0.9,0],[0,0.45,0.12]].forEach(p=>{ const l=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,1.8,8),wood); l.position.set(...p); g.add(l); });
  return g;
}
function createYogaMat(){ const g=new THREE.Group(); g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.18,1.5,18,1,true),new THREE.MeshStandardMaterial({color:0x3db36a}))); return g; }
function createFridge(){ return new THREE.Mesh(new THREE.BoxGeometry(0.8,1.8,0.75),new THREE.MeshStandardMaterial({color:0xe9edf2,metalness:0.1,roughness:0.5})); }
function createBed(){
  const g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.BoxGeometry(1.8,0.35,1.0),new THREE.MeshStandardMaterial({color:0x8b5d37})).position.y=0.18);
  g.add(new THREE.Mesh(new THREE.BoxGeometry(1.72,0.28,0.92),new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.95})).position.y=0.37);
  const blanket=new THREE.Mesh(new THREE.BoxGeometry(1.68,0.16,0.84),new THREE.MeshStandardMaterial({color:0xb2c8ff})); blanket.position.set(0,0.53,0.05); g.add(blanket);
  return g;
}
function createRadio(){
  const g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.BoxGeometry(0.7,0.35,0.28),new THREE.MeshStandardMaterial({color:0x7d4a2c})));
  return g;
}

const furnitureDefs = [
  { key:'bookshelf', create:createBookshelf, pos:[2,1,3.2], rot:0.1, standPos:[2,0,2.7], data:{name:'Bookshelf',action:'Study',skill:'education',skillGain:2,needEffect:{fun:-5,energy:-8},moneyGain:0,icon:'📚'} },
  { key:'desk', create:createDesk, pos:[5,0,3.2], rot:-0.12, standPos:[5,0,2.7], data:{name:'Computer Desk',action:'Work / Code',skill:'tech',skillGain:2,needEffect:{fun:-3,energy:-10},moneyGain:15,icon:'💻'} },
  { key:'easel', create:createEasel, pos:[6,0,5.8], rot:-0.55, standPos:[6,0,6.3], data:{name:'Easel',action:'Paint',skill:'creativity',skillGain:2,needEffect:{fun:10,energy:-5},moneyGain:0,icon:'🎨'} },
  { key:'mat', create:createYogaMat, pos:[2,0.03,5.8], rot:0.25, standPos:[2,0,6.3], data:{name:'Yoga Mat',action:'Exercise',skill:'wellness',skillGain:2,needEffect:{energy:-12,fun:2},moneyGain:0,icon:'🧘'} },
  { key:'fridge', create:createFridge, pos:[1,0.9,1.6], rot:0.04, standPos:[1,0,2.1], data:{name:'Fridge',action:'Eat',skill:null,skillGain:0,needEffect:{hunger:35,energy:5},moneyGain:0,icon:'🍎'} },
  { key:'bed', create:createBed, pos:[4,0,6.2], rot:0, standPos:[4,0,6.7], data:{name:'Bed',action:'Sleep',skill:null,skillGain:0,needEffect:{energy:40,hunger:-5},moneyGain:0,icon:'🛏️'} },
  { key:'radio', create:createRadio, pos:[7,0.22,1.6], rot:-0.1, standPos:[7,0,2.1], data:{name:'Radio',action:'Listen Music',skill:null,skillGain:0,needEffect:{fun:25,energy:-3},moneyGain:0,icon:'🎵'} },
];
furnitureDefs.forEach(def=>{
  const model = def.create();
  model.position.set(...def.pos); model.rotation.y=def.rot;
  model.userData = { ...def.data, key:def.key, standPos:def.standPos };
  room.add(model);
  furnitureObjects.push(model);
});

// ==================== 3D CHARACTER ====================
function createCharacter(){
  const g=new THREE.Group();
  const bodyGeo=new THREE.CylinderGeometry(0.2,0.25,0.7,8); const bodyMat=new THREE.MeshStandardMaterial({color:0x4499dd});
  const body=new THREE.Mesh(bodyGeo,bodyMat); body.position.y=0.45; g.add(body);
  const headGeo=new THREE.SphereGeometry(0.18,16,16); const headMat=new THREE.MeshStandardMaterial({color:0xffd4a3});
  const head=new THREE.Mesh(headGeo,headMat); head.position.y=0.95; g.add(head);
  const hairGeo=new THREE.SphereGeometry(0.19,16,8,0,Math.PI*2,0,Math.PI/2); const hairMat=new THREE.MeshStandardMaterial({color:0x4a3728});
  const hair=new THREE.Mesh(hairGeo,hairMat); hair.position.y=0.98; g.add(hair);
  // eyes, mouth, arms, legs, shoes (simplified)
  return g;
}
character = createCharacter();
character.position.set(4,0,4);
room.add(character);

// ==================== INTERACTION ====================
function getIntersections(event){
  pointer.set((event.clientX/innerWidth)*2-1, -(event.clientY/innerHeight)*2+1);
  raycaster.setFromCamera(pointer,camera);
  return raycaster.intersectObjects(furnitureObjects, true);
}
window.addEventListener('pointerdown', (e)=>{
  if(currentAction) return;
  AudioSystem.init();
  const hits = getIntersections(e);
  if(hits.length>0){
    const obj = hits[0].object;
    let furn = obj;
    while(furn && !furn.userData?.action) furn = furn.parent;
    if(furn && furn.userData?.action){
      AudioSystem.click();
      startAction(furn);
      return;
    }
  }
  // start drag
  dragging=true; dragStartX=e.clientX;
});
window.addEventListener('pointermove', (e)=>{
  if(!dragging) return;
  targetYaw = THREE.MathUtils.clamp(roomYaw + (e.clientX-dragStartX)*0.005, -Math.PI/6, Math.PI/6);
});
window.addEventListener('pointerup', ()=>{ dragging=false; });

function startAction(furniture){
  const stand = furniture.userData.standPos;
  characterTargetPos = new THREE.Vector3(...stand);
  currentAction = { furniture, timer:2.0, duration:2.0 };
  document.getElementById('hint').textContent = `⏳ Using ${furniture.userData.name}...`;
}

// ==================== GAME MECHANICS ====================
function completeAction(){
  if(!currentAction) return;
  const data = currentAction.furniture.userData;
  if(data.skill && skills[data.skill]!==undefined){
    skills[data.skill] = Math.min(100, skills[data.skill]+data.skillGain);
    addSkillGain(character.position.x, character.position.y, data.skill, data.skillGain);
    emitSparkles(character.position.x, character.position.y);
  }
  for(let n in data.needEffect) needs[n] = Math.max(0, Math.min(100, needs[n]+data.needEffect[n]));
  if(data.moneyGain>0){ money+=data.moneyGain; AchievementSystem.addMoney(data.moneyGain); addMoneyGain(character.position.x,character.position.y,data.moneyGain); }
  const goalDone = GoalSystem.checkProgress(data.action, skills, data.moneyGain);
  if(goalDone){ money+=GoalSystem.getReward(); message=`✅ Goal complete! +$${GoalSystem.getReward()}`; messageTimer=240; emitConfetti(character.position.x,character.position.y); GoalSystem.pickNewGoal(); }
  const ach = AchievementSystem.check(skills,money,day,roomLevel);
  if(ach){ message=`🏆 Achievement: ${ach.name}!`; messageTimer=300; emitConfetti(character.position.x,character.position.y); }
  message = `${data.icon} ${data.action} complete!`; messageTimer=180;
  checkRoomUpgrade();
  if(data.action==='Sleep'){ cutscene='sleeping'; cutsceneTimer=180; AudioSystem.sleep(); JournalSystem.addEntry(`😴 Day ${day}: ${JournalSystem.generateDailySummary()}`); }
  dayTimer+=30;
  if(dayTimer>=DAY_LENGTH){ dayTimer=0; day++; message=`☀️ Day ${day} - Your future grows brighter!`; messageTimer=240; JournalSystem.addEntry(`☀️ Day ${day}: ${JournalSystem.generateDailySummary()}`); }
  timeOfDay=(timeOfDay+0.08)%1; isNighttime=timeOfDay>0.6;
  AudioSystem.actionComplete();
  currentAction=null;
  document.getElementById('hint').textContent = '🖱️ Click furniture to interact • Drag to rotate room';
}

function checkRoomUpgrade(){
  const total = skills.education+skills.tech+skills.creativity+skills.wellness;
  let newLevel=0;
  for(let i=4;i>=0;i--){ if(total>=i*20){ newLevel=i; break; } }
  if(newLevel>roomLevel){ roomLevel=newLevel; message=`✨ Room upgraded to Level ${roomLevel}!`; messageTimer=300; emitConfetti(character.position.x,character.position.y); AudioSystem.upgrade(); }
}

// ==================== GAME LOOP ====================
function animate(){
  requestAnimationFrame(animate);
  // Character movement
  if(characterTargetPos && !currentAction){
    const dir = new THREE.Vector3().subVectors(characterTargetPos, character.position);
    const dist = dir.length();
    if(dist<0.1){ character.position.copy(characterTargetPos); characterTargetPos=null; }
    else { dir.normalize(); character.position.addScaledVector(dir, 0.08); }
  }
  // Action timer
  if(currentAction){
    currentAction.timer -= 0.016;
    if(currentAction.timer<=0) completeAction();
  }
  // Needs decay
  if(!cutscene){
    needs.hunger = Math.max(0, needs.hunger - NEED_DECAY);
    needs.energy = Math.max(0, needs.energy - NEED_DECAY*1.2);
    needs.fun = Math.max(0, needs.fun - NEED_DECAY*0.8);
  }
  // Random events
  const event = EventSystem.tryTrigger();
  if(event){ EventSystem.applyEffect(skills,needs,money); message=event.text; messageTimer=240; }
  // Rotate room
  roomYaw += (targetYaw - roomYaw)*0.08;
  room.rotation.y = roomYaw;
  renderer.render(scene, camera);
  update2DEffects();
  updateUI();
}
animate();

function updateUI(){
  document.getElementById('hunger-fill').style.width=needs.hunger+'%';
  document.getElementById('energy-fill').style.width=needs.energy+'%';
  document.getElementById('fun-fill').style.width=needs.fun+'%';
  document.getElementById('edu-fill').style.width=skills.education+'%';
  document.getElementById('tech-fill').style.width=skills.tech+'%';
  document.getElementById('crea-fill').style.width=skills.creativity+'%';
  document.getElementById('well-fill').style.width=skills.wellness+'%';
  document.getElementById('edu-val').textContent=skills.education;
  document.getElementById('tech-val').textContent=skills.tech;
  document.getElementById('crea-val').textContent=skills.creativity;
  document.getElementById('well-val').textContent=skills.wellness;
  document.getElementById('money-val').textContent=money;
  document.getElementById('day-val').textContent=day;
  document.getElementById('room-lvl').textContent=roomLevel;
  if(messageTimer>0){ document.getElementById('story').textContent=message; messageTimer--; }
}

// Reset, journal, sound buttons (attach event listeners)
document.getElementById('resetBtn').addEventListener('click', ()=>{
  skills={education:0,tech:0,creativity:0,wellness:0}; needs={hunger:100,energy:100,fun:100}; money=50; day=1; dayTimer=0; roomLevel=0;
  currentAction=null; characterTargetPos=null; character.position.set(4,0,4); cutscene=null;
  message="New life!"; messageTimer=120;
});
document.getElementById('soundBtn').addEventListener('click', ()=>{
  AudioSystem.toggle(); document.getElementById('soundBtn').textContent=AudioSystem.enabled?'🔊':'🔇';
});
document.getElementById('journalBtn').addEventListener('click', JournalSystem.toggle);
</script>
