<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Future Room • Design Your Future</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      overflow: hidden;
    }
    .game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 3px rgba(255,215,0,0.3);
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
<div class="game-container" id="game-container"></div>

<script>
// =============================================
// MY FUTURE ROOM - Design Your Future (Mobile Optimized)
// =============================================

// ----- GLOBAL STATE & MOBILE HELPERS -----
let lastTime = 0;
let deltaTime = 0;

function gameMouseX() {
  let scaleX = width / 1000;
  let scaleY = height / 600;
  let scale = min(scaleX, scaleY);
  return (mouseX - (width - 1000 * scale) / 2) / scale;
}

function gameMouseY() {
  let scaleX = width / 1000;
  let scaleY = height / 600;
  let scale = min(scaleX, scaleY);
  return (mouseY - (height - 600 * scale) / 2) / scale;
}

let room = {
  bgColor: [220, 230, 240],
  wallColor: [245, 240, 230],
  floorColor: [180, 160, 140],
  upgradeLevel: 0,
};

let character = {
  x: 400, y: 380,
  targetX: 400, targetY: 380,
  moving: false,
  action: null,
  actionObj: null,
  actionTimer: 0,
  actionDuration: 2.0, // seconds
  facingRight: true,
  walkCycle: 0,
  idleTimer: 0,
  blinkTimer: 0,
  isBlinking: false,
  sleeping: false,
};

let skills = {
  education: 0,
  tech: 0,
  creativity: 0,
  wellness: 0,
};
let money = 50;
let day = 1;
let dayTimer = 0;
const DAY_LENGTH = 600; // frames (approx 10 sec at 60fps)

let needs = {
  hunger: 100,
  energy: 100,
  fun: 100,
};
const NEED_DECAY = 0.03;

let objects = [];
let message = "Click an object to start designing your future!";
let messageTimer = 0;
let actionProgress = 0;
let showProgress = false;
const upgradeThresholds = [20, 50, 100, 160];

let timeOfDay = 0;
let isNighttime = false;
let cutscene = null;
let cutsceneTimer = 0;

// ----- AUDIO SYSTEM -----
const AudioSystem = {
  ctx: null,
  enabled: true,
  init() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.ctx.state === 'suspended') this.ctx.resume();
  },
  play(f, type = 'sine', dur = 0.15, vol = 0.3, delay = 0) {
    if (!this.enabled || !this.ctx) return;
    try {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.frequency.value = f; osc.type = type;
      const t = this.ctx.currentTime + delay;
      gain.gain.setValueAtTime(vol, t);
      gain.gain.exponentialRampToValueAtTime(0.01, t + dur);
      osc.start(t); osc.stop(t + dur);
    } catch (e) {}
  },
  click() { this.play(800, 'sine', 0.1, 0.2); },
  footstep() { this.play(60 + Math.random() * 40, 'sine', 0.05, 0.08); },
  actionStart() { this.play(440, 'triangle', 0.2, 0.3); this.play(660, 'triangle', 0.2, 0.3); },
  actionComplete() { this.play(523, 'sine', 0.15, 0.3); this.play(659, 'sine', 0.15, 0.3, 0.1); this.play(784, 'sine', 0.2, 0.4, 0.2); },
  upgrade() { this.play(330, 'sawtooth', 0.3, 0.2); this.play(440, 'sawtooth', 0.3, 0.2, 0.15); this.play(660, 'sawtooth', 0.4, 0.3, 0.3); },
  sleep() { this.play(200, 'sine', 0.8, 0.15); },
  achievement() { this.play(523, 'sine', 0.1, 0.3); this.play(659, 'sine', 0.1, 0.3, 0.1); this.play(784, 'sine', 0.1, 0.3, 0.2); this.play(1047, 'sine', 0.2, 0.4, 0.3); },
  eventGood() { this.play(440, 'sine', 0.1, 0.3); this.play(554, 'sine', 0.1, 0.3, 0.1); this.play(659, 'sine', 0.15, 0.3, 0.2); },
  eventBad() { this.play(200, 'sawtooth', 0.3, 0.15); this.play(150, 'sawtooth', 0.3, 0.15, 0.15); },
  toggle() { this.enabled = !this.enabled; return this.enabled; }
};

// ----- PARTICLE SYSTEM (Mobile optimized) -----
const ParticleSystem = {
  particles: [],
  emit(x, y, count, color, speed = 2, life = 30) {
    let maxCount = (windowWidth < 600) ? Math.floor(count / 2) : count;
    for (let i = 0; i < maxCount; i++) {
      this.particles.push({
        x, y,
        vx: (Math.random() - 0.5) * speed * 2,
        vy: (Math.random() - 1) * speed * 2,
        life: life + Math.random() * 20,
        maxLife: life + 20,
        color, size: 2 + Math.random() * 3
      });
    }
  },
  emitSparkles(x, y, count = 8) { this.emit(x, y, count, [255, 215, 0], 1.5, 25); },
  emitConfetti(x, y, count = 20) {
    const colors = [[255,100,100],[100,255,100],[100,100,255],[255,255,100],[255,100,255]];
    for (let i = 0; i < count; i++) {
      let col = colors[Math.floor(Math.random() * colors.length)];
      this.emit(x, y-50, 1, col, 3, 40);
    }
  },
  update() {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      let p = this.particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) this.particles.splice(i, 1);
    }
    let limit = (windowWidth < 600) ? 30 : 50;
    if (this.particles.length > limit) this.particles.splice(0, this.particles.length - limit);
  },
  draw() {
    noStroke();
    for (let p of this.particles) {
      let alpha = map(p.life, 0, p.maxLife, 0, 255);
      fill(p.color[0], p.color[1], p.color[2], alpha);
      ellipse(p.x, p.y, p.size);
    }
  }
};

// ----- FLOATING TEXT SYSTEM -----
const FloatingTextSystem = {
  texts: [],
  add(x, y, text, color = [255,255,200], size = 14) {
    this.texts.push({ x, y, text, color, size, life: 80, maxLife: 80, vy: -1.5 });
  },
  addSkillGain(x, y, skill, amount) {
    const cols = { education:[100,180,255], tech:[100,200,200], creativity:[255,150,200], wellness:[100,220,150] };
    this.add(x, y-30, `+${amount} ${skill.charAt(0).toUpperCase()+skill.slice(1)}`, cols[skill]||[255,215,0], 13);
  },
  addMoneyGain(x, y, amount) {
    this.add(x, y-20, `+$${amount}`, [255,215,0], 12);
  },
  update() {
    for (let i = this.texts.length-1; i >= 0; i--) {
      this.texts[i].y += this.texts[i].vy;
      this.texts[i].life--;
      if (this.texts[i].life <= 0) this.texts.splice(i,1);
    }
  },
  draw() {
    for (let t of this.texts) {
      let alpha = map(t.life, 0, t.maxLife, 0, 255);
      fill(t.color[0], t.color[1], t.color[2], alpha);
      textSize(t.size); textAlign(CENTER); text(t.text, t.x, t.y);
    }
  }
};

// ----- ACHIEVEMENT SYSTEM -----
const AchievementSystem = {
  achievements: [
    { id:'bookworm', name:'📚 Bookworm', desc:'Education level 10', check: s=>s.education>=10, unlocked:false },
    { id:'techie', name:'💻 Techie', desc:'Earn $200 total', check:(s,m)=>m>=200, unlocked:false, trackMoney:true },
    { id:'artist', name:'🎨 Artist', desc:'Creativity level 10', check: s=>s.creativity>=10, unlocked:false },
    { id:'yogi', name:'🧘 Yogi', desc:'Wellness level 10', check: s=>s.wellness>=10, unlocked:false },
    { id:'balanced', name:'⚖️ Balanced Life', desc:'All skills above 5', check: s=>s.education>=5&&s.tech>=5&&s.creativity>=5&&s.wellness>=5, unlocked:false },
    { id:'rich', name:'💰 Wealth Builder', desc:'Save $500', check:(s,m)=>m>=500, unlocked:false, trackMoney:true },
    { id:'survivor', name:'🏆 Survivor', desc:'Reach Day 20', check:(s,m,d)=>d>=20, unlocked:false, trackDay:true },
    { id:'designer', name:'✨ Future Designer', desc:'Room Level 4', check:(s,m,d,r)=>r>=4, unlocked:false, trackRoom:true },
  ],
  recentlyUnlocked: null, recentTimer: 0, totalMoneyEarned: 0,
  check(skills, money, day, roomLevel) {
    for (let ach of this.achievements) {
      if (!ach.unlocked) {
        let result = false;
        if (ach.trackMoney) result = ach.check(skills, this.totalMoneyEarned);
        else if (ach.trackDay) result = ach.check(skills, money, day);
        else if (ach.trackRoom) result = ach.check(skills, money, day, roomLevel);
        else result = ach.check(skills);
        if (result) {
          ach.unlocked = true;
          this.recentlyUnlocked = ach; this.recentTimer = 200;
          AudioSystem.achievement(); ParticleSystem.emitConfetti(500,300);
          return ach;
        }
      }
    }
    return null;
  },
  addMoney(amount) { this.totalMoneyEarned += amount; },
  getUnlockedCount() { return this.achievements.filter(a=>a.unlocked).length; },
  getTotalCount() { return this.achievements.length; }
};

// ----- RANDOM EVENTS -----
const EventSystem = {
  events: [
    { type:'good', text:'🌟 A mentor visited! +8 Education', effect:{education:8}, weight:3 },
    { type:'good', text:'💡 Brilliant idea! +6 Tech', effect:{tech:6}, weight:3 },
    { type:'good', text:'🎨 Creative surge! +8 Creativity', effect:{creativity:8}, weight:3 },
    { type:'good', text:'🧘 Peaceful morning! +8 Wellness', effect:{wellness:8}, weight:3 },
    { type:'good', text:'💰 Found money! +$30', effect:{money:30}, weight:4 },
    { type:'good', text:'🍕 Friend brought pizza! +25 Hunger', effect:{hunger:25}, weight:3 },
    { type:'good', text:'🎉 Surprise party! +20 Fun', effect:{fun:20}, weight:3 },
    { type:'bad', text:'😴 Exhaustion hits! -15 Energy', effect:{energy:-15}, weight:3 },
    { type:'bad', text:'🔧 Computer crashed! -5 Tech', effect:{tech:-5}, weight:2 },
    { type:'bad', text:'💸 Unexpected bill! -$20', effect:{money:-20}, weight:3 },
    { type:'bad', text:'🤧 Got a cold! -10 Wellness', effect:{wellness:-10}, weight:2 },
    { type:'neutral', text:'📖 A quiet day for reflection...', effect:{}, weight:5 },
    { type:'neutral', text:'🌤️ The weather is beautiful today.', effect:{}, weight:5 },
  ],
  cooldown: 0, currentEvent: null, eventTimer: 0,
  tryTrigger() {
    if (this.cooldown > 0) { this.cooldown--; return null; }
    if (random() < 0.003) {
      let total = this.events.reduce((s,e)=>s+e.weight,0);
      let roll = random(total);
      for (let e of this.events) { roll -= e.weight; if (roll <= 0) {
        this.currentEvent = e; this.eventTimer = 180; this.cooldown = 300;
        if (e.type==='good') AudioSystem.eventGood(); else if (e.type==='bad') AudioSystem.eventBad();
        return e;
      }}
    }
    return null;
  },
  applyEffect(skills, needs, money) {
    if (!this.currentEvent) return;
    let e = this.currentEvent.effect;
    if (e.education) skills.education = constrain(skills.education+e.education,0,100);
    if (e.tech) skills.tech = constrain(skills.tech+e.tech,0,100);
    if (e.creativity) skills.creativity = constrain(skills.creativity+e.creativity,0,100);
    if (e.wellness) skills.wellness = constrain(skills.wellness+e.wellness,0,100);
    if (e.hunger) needs.hunger = constrain(needs.hunger+e.hunger,0,100);
    if (e.energy) needs.energy = constrain(needs.energy+e.energy,0,100);
    if (e.fun) needs.fun = constrain(needs.fun+e.fun,0,100);
    if (e.money) money += e.money;
  }
};

// ----- GOAL SYSTEM -----
const GoalSystem = {
  goals: [
    { text:'📚 Study 3 times', type:'action', target:'Study', count:3, reward:30, progress:0 },
    { text:'💻 Work 2 times', type:'action', target:'Work / Code', count:2, reward:25, progress:0 },
    { text:'🎨 Paint 2 times', type:'action', target:'Paint', count:2, reward:25, progress:0 },
    { text:'🧘 Exercise 2 times', type:'action', target:'Exercise', count:2, reward:25, progress:0 },
    { text:'💰 Earn $50', type:'money', target:50, count:1, reward:20, progress:0 },
    { text:'📈 Reach Education 5', type:'skill', skill:'education', target:5, count:1, reward:40, progress:0 },
    { text:'📈 Reach Tech 5', type:'skill', skill:'tech', target:5, count:1, reward:40, progress:0 },
  ],
  activeGoal: null, completed: false,
  pickNewGoal() {
    let available = this.goals.filter(g=>true);
    this.activeGoal = { ...available[floor(random(available.length))], progress:0 };
    this.completed = false;
  },
  checkProgress(actionName, skills, moneyEarned) {
    if (!this.activeGoal || this.completed) return false;
    if (this.activeGoal.type==='action' && actionName===this.activeGoal.target) this.activeGoal.progress++;
    else if (this.activeGoal.type==='money') this.activeGoal.progress += moneyEarned;
    else if (this.activeGoal.type==='skill') this.activeGoal.progress = skills[this.activeGoal.skill];
    if (this.activeGoal.progress >= this.activeGoal.count) { this.completed=true; return true; }
    return false;
  },
  getReward() { return this.activeGoal? this.activeGoal.reward : 0; }
};

// ----- JOURNAL SYSTEM -----
const JournalSystem = {
  entries: [], showJournal: false,
  addEntry(text) { this.entries.unshift({ day, text }); if (this.entries.length>20) this.entries.pop(); },
  generateDailySummary() {
    let highest = Object.keys(skills).reduce((a,b)=>skills[a]>skills[b]?a:b);
    let summaries = {
      education: 'I spent time learning today. Knowledge is power!',
      tech: 'Technology filled my day. The future is digital!',
      creativity: 'Art and creativity flowed through me today.',
      wellness: 'I took care of my body and mind today.',
    };
    return summaries[highest] || 'Another day of growth and progress.';
  },
  toggle() { this.showJournal = !this.showJournal; AudioSystem.click(); }
};

// ----- SETUP & OBJECTS -----
function setup() {
  let canvas = createCanvas(windowWidth, windowHeight);
  canvas.parent('game-container');
  pixelDensity(1);
  initObjects();
  updateRoomAppearance();
  GoalSystem.pickNewGoal();
  JournalSystem.addEntry('🏠 Day 1: A new beginning. I moved into my future room.');
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function initObjects() {
  objects = [
    { name:'Bookshelf', x:150,y:310,w:60,h:90, action:'Study', skill:'education', skillGain:2, needEffect:{fun:-5,energy:-8}, moneyGain:0, description:'📚 Study to gain Education', color:[139,90,43], icon:'📚' },
    { name:'Computer Desk', x:380,y:340,w:70,h:50, action:'Work / Code', skill:'tech', skillGain:2, needEffect:{fun:-3,energy:-10}, moneyGain:15, description:'💻 Work to earn money & Tech', color:[80,80,100], icon:'💻' },
    { name:'Easel', x:620,y:320,w:50,h:80, action:'Paint', skill:'creativity', skillGain:2, needEffect:{fun:10,energy:-5}, moneyGain:0, description:'🎨 Paint to boost Creativity', color:[200,150,100], icon:'🎨' },
    { name:'Yoga Mat', x:800,y:390,w:70,h:20, action:'Exercise', skill:'wellness', skillGain:2, needEffect:{energy:-12,fun:2}, moneyGain:0, description:'🧘 Exercise for Wellness', color:[100,180,120], icon:'🧘' },
    { name:'Fridge', x:80,y:360,w:50,h:60, action:'Eat', skill:null, skillGain:0, needEffect:{hunger:35,energy:5}, moneyGain:0, description:'🍎 Eat to restore Hunger', color:[220,220,220], icon:'🍎' },
    { name:'Bed', x:520,y:350,w:100,h:40, action:'Sleep', skill:null, skillGain:0, needEffect:{energy:40,hunger:-5}, moneyGain:0, description:'🛏️ Sleep to restore Energy & advance day', color:[180,140,200], icon:'🛏️' },
    { name:'Radio', x:280,y:400,w:40,h:30, action:'Listen Music', skill:null, skillGain:0, needEffect:{fun:25,energy:-3}, moneyGain:0, description:'🎵 Relax to gain Fun', color:[200,100,100], icon:'🎵' },
  ];
}

// ----- MOUSE / TOUCH -----
function mousePressed() {
  AudioSystem.init();
  let mx = gameMouseX(), my = gameMouseY();
  // UI buttons (top-right)
  if (mx > 940 && my < 60) { JournalSystem.toggle(); return; }
  if (mx > 880 && mx < 935 && my < 60) { AudioSystem.toggle(); message = AudioSystem.enabled?'🔊 Sound ON':'🔇 Sound OFF'; messageTimer=120; return; }
  if (JournalSystem.showJournal) { JournalSystem.showJournal = false; return; }
  if (character.moving || character.action || cutscene) return;
  for (let obj of objects) {
    if (mx > obj.x && mx < obj.x+obj.w && my > obj.y && my < obj.y+obj.h) {
      AudioSystem.click();
      startCharacterAction(obj, obj.x+obj.w/2, obj.y-30);
      return;
    }
  }
}

function startCharacterAction(obj, tx, ty) {
  character.targetX = tx; character.targetY = ty;
  character.moving = true; character.actionObj = obj;
}

function performAction() {
  let obj = character.actionObj;
  if (!obj) return;
  if (obj.skill && skills[obj.skill] !== undefined) {
    let old = skills[obj.skill];
    skills[obj.skill] = min(skills[obj.skill]+obj.skillGain, 100);
    if (skills[obj.skill] > old) {
      FloatingTextSystem.addSkillGain(character.x, character.y, obj.skill, obj.skillGain);
      ParticleSystem.emitSparkles(character.x, character.y-30);
    }
  }
  for (let need in obj.needEffect) needs[need] = constrain(needs[need]+obj.needEffect[need], 0, 100);
  if (obj.moneyGain > 0) { money += obj.moneyGain; AchievementSystem.addMoney(obj.moneyGain); FloatingTextSystem.addMoneyGain(character.x, character.y, obj.moneyGain); }
  if (money < 0) money = 0;
  let goalDone = GoalSystem.checkProgress(obj.action, skills, obj.moneyGain);
  if (goalDone) { money += GoalSystem.getReward(); message = `✅ Goal complete! +$${GoalSystem.getReward()} reward!`; messageTimer=240; ParticleSystem.emitConfetti(500,300); AudioSystem.achievement(); GoalSystem.pickNewGoal(); }
  let ach = AchievementSystem.check(skills, money, day, room.upgradeLevel);
  if (ach) { message = `🏆 Achievement: ${ach.name}!`; messageTimer=300; }
  message = obj.description; messageTimer=180;
  checkRoomUpgrade();
  if (obj.action==='Sleep') { character.sleeping=true; AudioSystem.sleep(); cutscene='sleeping'; cutsceneTimer=180; JournalSystem.addEntry(`😴 Day ${day}: ${JournalSystem.generateDailySummary()}`); }
  dayTimer += 30;
  if (dayTimer >= DAY_LENGTH) { dayTimer=0; day++; message=`☀️ Day ${day} - Your future grows brighter!`; messageTimer=240; timeOfDay=0; JournalSystem.addEntry(`☀️ Day ${day}: ${JournalSystem.generateDailySummary()}`); }
  timeOfDay = (timeOfDay+0.08)%1; isNighttime = timeOfDay>0.6;
  AudioSystem.actionComplete();
}

function checkRoomUpgrade() {
  let total = skills.education+skills.tech+skills.creativity+skills.wellness;
  let newLevel = 0;
  for (let i=upgradeThresholds.length-1; i>=0; i--) { if (total>=upgradeThresholds[i]) { newLevel=i+1; break; } }
  if (newLevel>room.upgradeLevel) {
    room.upgradeLevel = newLevel; updateRoomAppearance();
    message = `✨ Room upgraded to Level ${newLevel}!`; messageTimer=300;
    ParticleSystem.emitConfetti(500,200); AudioSystem.upgrade();
    cutscene='upgrade'; cutsceneTimer=120;
    JournalSystem.addEntry(`✨ Room upgraded to Level ${newLevel}!`);
  }
}

function updateRoomAppearance() {
  let lvl = room.upgradeLevel;
  room.wallColor = [lerp(245,255,lvl/4), lerp(240,248,lvl/4), lerp(230,240,lvl/4)];
  room.floorColor = [lerp(180,210,lvl/4), lerp(160,190,lvl/4), lerp(140,170,lvl/4)];
  room.bgColor = [lerp(220,190,lvl/4), lerp(230,210,lvl/4), lerp(240,230,lvl/4)];
}

// ----- GAME LOOP -----
function draw() {
  // Delta time & scaling
  deltaTime = (millis() - lastTime) / 1000;
  lastTime = millis();
  if (deltaTime > 0.1) deltaTime = 0.1;
  let scaleX = width / 1000;
  let scaleY = height / 600;
  let scale = min(scaleX, scaleY);
  
  push();
  translate((width - 1000 * scale) / 2, (height - 600 * scale) / 2);
  scale(scale);
  
  if (isNighttime) background(lerpColor(color(room.bgColor), color(30,40,60), 0.5));
  else background(room.bgColor);
  
  if (cutscene) { handleCutscene(); drawUI(); pop(); return; }
  
  updateNeeds();
  updateCharacter();
  ParticleSystem.update();
  FloatingTextSystem.update();
  
  let event = EventSystem.tryTrigger();
  if (event) { EventSystem.applyEffect(skills, needs, money); message = event.text; messageTimer = 240; }
  
  drawRoom();
  for (let obj of objects) { drawObject(obj); drawObjectTooltip(obj); }
  drawCharacter();
  ParticleSystem.draw();
  FloatingTextSystem.draw();
  if (showProgress && character.action) drawProgressBar();
  drawCharacterAccessories();
  drawUI();
  
  if (messageTimer > 0) { messageTimer--; if (messageTimer<=0) message=""; }
  if (EventSystem.eventTimer > 0) { EventSystem.eventTimer--; if (EventSystem.eventTimer<=0) EventSystem.currentEvent=null; }
  
  pop();
}

function handleCutscene() {
  cutsceneTimer--;
  if (cutscene === 'sleeping') {
    fill(0,0,30,200); rect(0,0,1000,600);
    fill(255); textSize(24); textAlign(CENTER); text('😴 Sleeping...',500,300);
    textSize(14); text('Z'.repeat(floor((180-cutsceneTimer)/20)),500,340);
    if (cutsceneTimer<=0) {
      cutscene=null; character.sleeping=false; day++; dayTimer=0; timeOfDay=0.15; isNighttime=false;
      needs.energy=100; message=`☀️ Day ${day} - A new day begins!`; messageTimer=240;
    }
  } else if (cutscene === 'upgrade') {
    fill(0,0,0,150); rect(0,0,1000,600);
    fill(255,215,0); textSize(28); textAlign(CENTER); text('✨ Room Upgraded! ✨',500,300);
    textSize(16); text(`Level ${room.upgradeLevel}`,500,340);
    if (cutsceneTimer<=0) cutscene=null;
  }
}

function updateNeeds() {
  if (character.sleeping) return;
  needs.hunger = max(0, needs.hunger - NEED_DECAY);
  needs.energy = max(0, needs.energy - NEED_DECAY*1.2);
  needs.fun = max(0, needs.fun - NEED_DECAY*0.8);
  if (needs.hunger<15 && frameCount%120===0) { message='⚠️ You\'re very hungry! Eat something.'; messageTimer=120; }
  if (needs.energy<15 && frameCount%120===0) { message='⚠️ You\'re exhausted! Get some sleep.'; messageTimer=120; }
}

function updateCharacter() {
  if (character.moving) {
    let dx = character.targetX - character.x;
    let dy = character.targetY - character.y;
    let dist = sqrt(dx*dx+dy*dy);
    if (dist < 3) {
      character.x = character.targetX; character.y = character.targetY;
      character.moving = false;
      character.action = character.actionObj;
      character.actionTimer = character.actionDuration;
      showProgress = true; actionProgress = 0;
      if (character.actionObj.x > character.x) character.facingRight = true; else character.facingRight = false;
      AudioSystem.actionStart();
    } else {
      let speed = 180 * deltaTime; // pixels per second
      character.x += (dx/dist) * speed;
      character.y += (dy/dist) * speed;
      character.facingRight = dx > 0;
      character.walkCycle += 10 * deltaTime;
      if (Math.floor(character.walkCycle) % 8 === 0) AudioSystem.footstep();
    }
  }
  if (character.action) {
    character.actionTimer -= deltaTime;
    actionProgress = 1 - (character.actionTimer / character.actionDuration);
    if (character.actionTimer <= 0) {
      performAction();
      character.action = null; character.actionObj = null;
      showProgress = false; actionProgress = 0; character.walkCycle = 0;
    }
  }
  // idle animations
  if (!character.moving && !character.action) {
    character.idleTimer++;
    if (character.idleTimer > 120) character.idleTimer = 0;
    character.blinkTimer++;
    if (character.blinkTimer > 40) { character.isBlinking = true; if (character.blinkTimer > 45) { character.isBlinking = false; character.blinkTimer = 0; } }
  }
}

function drawWindow(x,y) {
  fill(180,210,240); rect(x,y,120,150,10);
  if (isNighttime) { fill(20,30,60); rect(x+5,y+5,110,140); fill(255,255,200); for (let i=0;i<8;i++) ellipse(x+20+i*12,y+20+(i%3)*30,2,2); fill(255,255,200,150); ellipse(x+70,y+40,25,25); }
  else { fill(150,200,240); rect(x+5,y+5,110,140); fill(255,240,150); ellipse(x+80,y+40,30,30); fill(255,255,255,180); ellipse(x+30,y+60,40,15); ellipse(x+70,y+80,50,18); }
  fill(200,150,120); rect(x-10,y-10,20,160,5); rect(x+110,y-10,20,160,5); fill(150,100,70); rect(x-15,y-5,150,6,3);
}

function drawClock(x,y) {
  fill(255); ellipse(x,y,45,45); fill(240); ellipse(x,y,38,38);
  stroke(50); strokeWeight(2);
  let ha = map(timeOfDay*24%12,0,12,0,TWO_PI)-HALF_PI;
  let ma = map((timeOfDay*24*60)%60,0,60,0,TWO_PI)-HALF_PI;
  line(x,y,x+cos(ha)*10,y+sin(ha)*10); strokeWeight(1); line(x,y,x+cos(ma)*15,y+sin(ma)*15);
  noStroke(); fill(0); ellipse(x,y,3,3);
}

function drawCalendar(x,y) {
  fill(255); rect(x,y,50,45,3); fill(200,50,50); rect(x,y,50,12,3); fill(255); textSize(8); textAlign(CENTER); text('DAY',x+25,y+9); fill(0); textSize(18); text(day,x+25,y+35);
}

function drawObject(obj) {
  push(); translate(obj.x, obj.y);
  let mx = gameMouseX(), my = gameMouseY();
  if (mx > obj.x && mx < obj.x+obj.w && my > obj.y && my < obj.y+obj.h) { fill(255,255,200,60); rect(-2,-2,obj.w+4,obj.h+4,7); fill(255,255,200,30); rect(-5,-5,obj.w+10,obj.h+10,10); }

}

  else if (obj.name === 'Easel') { fill(200,150,100); triangle(0,80,25,0,50,80); rect(20,80,10,5); fill(240); rect(15,15,20,25); if(character.action&&character.actionObj===obj) fill(255,100,100); else fill(200,180,160); ellipse(25,25,10,10); fill(100,180,100); rect(17,18,6,15); }
  else if (obj.name === 'Yoga Mat') { fill(100,180,120); rect(0,10,obj.w,10,5); fill(80,140,100); rect(5,0,obj.w-10,10,3); }
  else if (obj.name === 'Fridge') { fill(220); rect(0,0,obj.w,obj.h,5); fill(180); rect(5,5,40,20); rect(5,30,40,20); fill(150); rect(42,20,5,15,2); }
  else if (obj.name === 'Bed') { fill(180,140,200); rect(0,10,obj.w,30,8); fill(220,200,230); rect(10,15,40,15); rect(60,15,30,15); fill(240); rect(5,12,20,10,3); fill(200,180,210); for(let i=0;i<4;i++) rect(15+i*20,20,15,3); }
  else if (obj.name === 'Radio') { fill(200,100,100); rect(0,5,obj.w,25,5); fill(40); rect(5,10,30,15); fill(30); for(let i=0;i<3;i++) line(8+i*10,12,8+i*10,23); if(character.action&&character.actionObj===obj){ stroke(255,200,100,150); noFill(); for(let i=0;i<3;i++) arc(35,17,10+i*8,10+i*8,-PI/2,PI/2); noStroke(); } }
}

function drawObjectTooltip(obj) {
  let mx = gameMouseX(), my = gameMouseY();
  if (mx > obj.x && mx < obj.x+obj.w && my > obj.y && my < obj.y+obj.h) {

}

function drawCharacter() {
  push(); translate(character.x, character.y);
  fill(0,30); ellipse(0,40,35,10);
  if (character.sleeping) {
    fill(100,150,220); ellipse(0,35,40,18); fill(255,210,170); ellipse(20,30,20,22); fill(60,40,20); arc(20,24,22,12,PI,TWO_PI);
    fill(255,200); textSize(12); text('Z',30,15); textSize(16); text('Z',40,0); textSize(20); text('Z',50,-18);
    pop(); return;
  }
  let bodyColor = color(100,150,220);
  if (character.action && character.actionObj) {
    if (character.actionObj.skill==='education') bodyColor = color(120,140,200);
    else if (character.actionObj.skill==='tech') bodyColor = color(100,180,200);
    else if (character.actionObj.skill==='creativity') bodyColor = color(220,130,160);
    else if (character.actionObj.skill==='wellness') bodyColor = color(100,200,150);
  }
  let bounceY = 0;
  if (character.moving) bounceY = sin(character.walkCycle*1.5)*3;
  else if (!character.action) bounceY = sin(character.idleTimer*0.05)*1;
  translate(0, bounceY);
  
  stroke(180,150,120); strokeWeight(5);
  if (character.moving) { let s = sin(character.walkCycle*1.5)*12; line(-8,30,-12+s,10); line(8,30,12-s,10); }
  else if (character.action) { line(-8,30,-9,10); line(8,30,9,10); }
  else { line(-8,30,-10,10); line(8,30,10,10); }
  noStroke(); fill(bodyColor); ellipse(0,0,24,30);
  stroke(180,150,120); strokeWeight(4);
  if (character.moving) { let s = sin(character.walkCycle*1.5)*8; line(-10,-5,-18+s,10); line(10,-5,18-s,10); }
  else if (character.action) { line(-10,-5,-22,-12); line(10,-5,22,-12); }
  else { line(-10,-5,-18,10); line(10,-5,18,10); }
  noStroke();
  fill(255,210,170); ellipse(0,-28,24,26);
  fill(60,40,20); arc(0,-35,26,14,PI,TWO_PI);
  if (character.isBlinking) { stroke(30); strokeWeight(1.5); line(-9,-30,-3,-30); line(3,-30,9,-30); noStroke(); }
  else { fill(30); ellipse(-6,-30,4,5); ellipse(6,-30,4,5); fill(255); ellipse(-5,-31,2,2); ellipse(7,-31,2,2); }
  noFill(); stroke(180,100,80); strokeWeight(1.5); arc(0,-22,8,4,0,PI); noStroke();
  pop();
}

function drawCharacterAccessories() {

  if (skills.education>=8) { noFill(); stroke(40); strokeWeight(1.5); ellipse(-7,-30,8,7); ellipse(7,-30,8,7); line(-3,-30,3,-30); noStroke(); }
  if (skills.tech>=8) { fill(40); ellipse(-14,-28,6,10); ellipse(14,-28,6,10); noFill(); stroke(40); strokeWeight(2); arc(0,-18,28,22,PI+0.5,TWO_PI-0.5); noStroke(); }
  if (skills.creativity>=8) { fill(180,50,80); ellipse(0,-38,30,10); ellipse(5,-42,8,6); }
  pop();
}

function drawProgressBar() {
  if (!character.actionObj) return;

  let px = obj.x+obj.w/2-40, py = obj.y-25;

  }

  if (AchievementSystem.recentTimer>0) {

  if (EventSystem.currentEvent && EventSystem.eventTimer>0) {

  }
  
  fill(255,255,200,200); textSize(18); textAlign(RIGHT); text("✨ My Future Room",980,515);
  textSize(11); text("Design Your Future",980,532);
}

function drawNeedBar(label, value, x, y, colG, colB) {
  fill(200); textSize(11); textAlign(LEFT); text(label,x,y);
  fill(100); rect(x+50,y-8,80,10,4);
  let col = value>50?colG:colB;
  if (value<20) { let p=sin(frameCount*0.1)*0.3+0.7; fill(col[0]*p,col[1]*p,col[2]*p); }
  else fill(col[0],col[1],col[2]);
  rect(x+50,y-8,80*(value/100),10,4);
  if (value<15) { fill(255,100,100,50+sin(frameCount*0.2)*30); rect(x+50,y-8,80,10,4); }
}

function drawSkillBar(label, value, x, y) {
  fill(200); textSize(11); textAlign(LEFT); text(label,x,y);
  fill(100); rect(x+70,y-8,80,10,4);
  let col = label==='Education'?[100,180,255]:label==='Tech'?[100,200,200]:label==='Creativity'?[255,150,200]:[100,220,150];
  fill(col[0],col[1],col[2]); rect(x+70,y-8,80*(value/100),10,4);
}
