<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Future Room • Design Your Future</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      overflow: hidden;
    }
    .game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: 1000px;
      max-height: 650px;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 3px rgba(255,215,0,0.3);
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
<div class="game-container" id="game-container"></div>

<script>
// =============================================
// MY FUTURE ROOM - Design Your Future (Mini Sims)
// =============================================

// ----- GLOBAL STATE -----
let room = {
  bgColor: [220, 230, 240],  // evolves with upgrades
  wallColor: [245, 240, 230],
  floorColor: [180, 160, 140],
  upgradeLevel: 0,           // 0-4, changes visuals
};

let character = {
  x: 400, y: 380,
  targetX: 400, targetY: 380,
  moving: false,
  action: null,             // current object using
  actionTimer: 0,
  actionDuration: 120,      // frames
  facingRight: true,
};

let skills = {
  education: 0,
  tech: 0,
  creativity: 0,
  wellness: 0,
};
let money = 50;
let day = 1;
let dayTimer = 0;
const DAY_LENGTH = 600;     // frames per day

let needs = {
  hunger: 100,
  energy: 100,
  fun: 100,
};
const NEED_DECAY = 0.03;    // per frame

// Objects in room
let objects = [];

// UI elements
let message = "Click an object to start designing your future!";
let messageTimer = 0;

// Progress bar for actions
let actionProgress = 0;
let showProgress = false;

// Upgrade definitions
const upgradeThresholds = [20, 50, 100, 160]; // total skill points

// ----- P5.JS SETUP -----
function setup() {
  let canvas = createCanvas(1000, 600);
  canvas.parent('game-container');
  
  initObjects();
  updateRoomAppearance();
}

function initObjects() {
  // Each object: name, x, y, w, h, action, skill gain, need effect, money gain, description
  objects = [
    {
      name: 'Bookshelf',
      x: 150, y: 310, w: 60, h: 90,
      action: 'Study',
      skill: 'education',
      skillGain: 2,
      needEffect: { fun: -5, energy: -8 },
      moneyGain: 0,
      description: '📚 Study to gain Education',
      color: [139, 90, 43],
    },
    {
      name: 'Computer Desk',
      x: 380, y: 340, w: 70, h: 50,
      action: 'Work / Code',
      skill: 'tech',
      skillGain: 2,
      needEffect: { fun: -3, energy: -10 },
      moneyGain: 15,
      description: '💻 Work to earn money & Tech',
      color: [80, 80, 100],
    },
    {
      name: 'Easel',
      x: 620, y: 320, w: 50, h: 80,
      action: 'Paint',
      skill: 'creativity',
      skillGain: 2,
      needEffect: { fun: 10, energy: -5 },
      moneyGain: 0,
      description: '🎨 Paint to boost Creativity',
      color: [200, 150, 100],
    },
    {
      name: 'Yoga Mat',
      x: 800, y: 390, w: 70, h: 20,
      action: 'Exercise',
      skill: 'wellness',
      skillGain: 2,
      needEffect: { energy: -12, fun: 2 },
      moneyGain: 0,
      description: '🧘 Exercise for Wellness',
      color: [100, 180, 120],
    },
    {
      name: 'Fridge',
      x: 80, y: 360, w: 50, h: 60,
      action: 'Eat',
      skill: null,
      skillGain: 0,
      needEffect: { hunger: 35, energy: 5 },
      moneyGain: 0,
      description: '🍎 Eat to restore Hunger',
      color: [220, 220, 220],
    },
    {
      name: 'Bed',
      x: 520, y: 350, w: 100, h: 40,
      action: 'Sleep',
      skill: null,
      skillGain: 0,
      needEffect: { energy: 40, hunger: -5 },
      moneyGain: 0,
      description: '🛏️ Sleep to restore Energy',
      color: [180, 140, 200],
    },
    {
      name: 'Radio',
      x: 280, y: 400, w: 40, h: 30,
      action: 'Listen Music',
      skill: null,
      skillGain: 0,
      needEffect: { fun: 25, energy: -3 },
      moneyGain: 0,
      description: '🎵 Relax to gain Fun',
      color: [200, 100, 100],
    },
  ];
}

// ----- MOUSE INTERACTION -----
function mousePressed() {
  // Check if clicked on any object
  for (let obj of objects) {
    if (mouseX > obj.x && mouseX < obj.x + obj.w &&
        mouseY > obj.y && mouseY < obj.y + obj.h) {
      // Move character near object
      let targetX = obj.x + obj.w/2;
      let targetY = obj.y - 30; // stand in front of it
      startCharacterAction(obj, targetX, targetY);
      return;
    }
  }
}

function startCharacterAction(obj, tx, ty) {
  if (character.moving || character.action) return; // already busy
  
  character.targetX = tx;
  character.targetY = ty;
  character.moving = true;
  character.actionObj = obj;
}

function performAction() {
  let obj = character.actionObj;
  if (!obj) return;
  
  // Apply skill gain
  if (obj.skill && skills[obj.skill] !== undefined) {
    skills[obj.skill] = min(skills[obj.skill] + obj.skillGain, 100);
  }
  
  // Apply need effects
  for (let need in obj.needEffect) {
    needs[need] = constrain(needs[need] + obj.needEffect[need], 0, 100);
  }
  
  // Money
  money += obj.moneyGain;
  if (money < 0) money = 0;
  
  // Message
  message = obj.description;
  messageTimer = 180;
  
  // Check upgrades
  checkRoomUpgrade();
  
  // Advance day timer slightly
  dayTimer += 30;
  if (dayTimer >= DAY_LENGTH) {
    dayTimer = 0;
    day++;
    message = `☀️ Day ${day} - Your future grows brighter!`;
    messageTimer = 240;
  }
}

function checkRoomUpgrade() {
  let total = skills.education + skills.tech + skills.creativity + skills.wellness;
  let newLevel = 0;
  for (let i = upgradeThresholds.length - 1; i >= 0; i--) {
    if (total >= upgradeThresholds[i]) {
      newLevel = i + 1;
      break;
    }
  }
  if (newLevel > room.upgradeLevel) {
    room.upgradeLevel = newLevel;
    updateRoomAppearance();
    message = `✨ Room upgraded! Your future is taking shape.`;
    messageTimer = 300;
  }
}

function updateRoomAppearance() {
  let lvl = room.upgradeLevel;
  // Wall & floor colors become warmer/brighter
  room.wallColor = [
    lerp(245, 255, lvl/4),
    lerp(240, 245, lvl/4),
    lerp(230, 235, lvl/4)
  ];
  room.floorColor = [
    lerp(180, 200, lvl/4),
    lerp(160, 180, lvl/4),
    lerp(140, 160, lvl/4)
  ];
  // Background becomes more vibrant
  room.bgColor = [
    lerp(220, 200, lvl/4),
    lerp(230, 220, lvl/4),
    lerp(240, 240, lvl/4)
  ];
}

// ----- GAME LOOP -----
function draw() {
  background(room.bgColor);
  
  // Update needs decay
  updateNeeds();
  
  // Update character movement & action
  updateCharacter();
  
  // Draw room
  drawRoom();
  
  // Draw objects
  for (let obj of objects) {
    drawObject(obj);
  }
  
  // Draw character
  drawCharacter();
  
  // Draw progress bar if action ongoing
  if (showProgress && character.action) {
    drawProgressBar();
  }
  
  // Draw UI overlay
  drawUI();
  
  // Message timer
  if (messageTimer > 0) {
    messageTimer--;
    if (messageTimer <= 0) message = "";
  }
}

function updateNeeds() {
  // Decay all needs slowly
  needs.hunger = max(0, needs.hunger - NEED_DECAY);
  needs.energy = max(0, needs.energy - NEED_DECAY * 1.2);
  needs.fun = max(0, needs.fun - NEED_DECAY * 0.8);
  
  // Very low needs reduce action effectiveness? (future feature)
}

function updateCharacter() {
  // Movement
  if (character.moving) {
    let dx = character.targetX - character.x;
    let dy = character.targetY - character.y;
    let dist = sqrt(dx*dx + dy*dy);
    
    if (dist < 3) {
      // Arrived
      character.x = character.targetX;
      character.y = character.targetY;
      character.moving = false;
      // Start action
      character.action = character.actionObj;
      character.actionTimer = character.actionDuration;
      showProgress = true;
      actionProgress = 0;
      
      // Face the object
      if (character.actionObj.x > character.x) character.facingRight = true;
      else character.facingRight = false;
    } else {
      // Move towards target
      let speed = 3;
      character.x += (dx / dist) * speed;
      character.y += (dy / dist) * speed;
      character.facingRight = dx > 0;
    }
  }
  
  // Action timer
  if (character.action) {
    character.actionTimer--;
    actionProgress = 1 - (character.actionTimer / character.actionDuration);
    
    if (character.actionTimer <= 0) {
      // Action complete
      performAction();
      character.action = null;
      character.actionObj = null;
      showProgress = false;
      actionProgress = 0;
    }
  }
}

// ----- DRAWING FUNCTIONS -----
function drawRoom() {
  // Floor
  fill(room.floorColor);
  noStroke();
  rect(0, 420, width, height - 420);
  
  // Wall
  fill(room.wallColor);
  rect(0, 0, width, 420);
  
  // Baseboard
  fill(200, 180, 160);
  rect(0, 410, width, 15);
  
  // Window (gets nicer with upgrades)
  let windowX = 700, windowY = 80;
  fill(180, 210, 240);
  rect(windowX, windowY, 120, 150, 10);
  fill(150, 180, 210);
  rect(windowX+5, windowY+5, 110, 140);
  // Curtains
  fill(200, 150, 120);
  rect(windowX-10, windowY-10, 20, 160, 5);
  rect(windowX+110, windowY-10, 20, 160, 5);
  
  // Plant / decoration based on upgrade
  if (room.upgradeLevel >= 1) {
    fill(80, 150, 80);
    ellipse(900, 380, 40, 50);
    fill(100, 70, 50);
    rect(895, 400, 10, 30);
  }
  if (room.upgradeLevel >= 2) {
    // Picture frame
    fill(120, 80, 60);
    rect(450, 100, 80, 60, 5);
    fill(200, 180, 140);
    rect(455, 105, 70, 50);
    // Draw a simple landscape inside
    fill(100, 180, 100);
    rect(455, 130, 70, 25);
    fill(220, 200, 100);
    ellipse(490, 120, 20, 20);
  }
  if (room.upgradeLevel >= 3) {
    // Bookshelf on wall
    fill(120, 90, 60);
    rect(50, 100, 80, 15);
    rect(50, 130, 80, 15);
    rect(50, 160, 80, 15);
    fill(180, 150, 120);
    for (let i=0; i<5; i++) {
      rect(55 + i*15, 90, 8, 12);
    }
  }
  
  // Rug
  fill(180, 150, 130, 150);
  ellipse(500, 430, 200, 40);
}

function drawObject(obj) {
  push();
  translate(obj.x, obj.y);
  
  // Highlight on hover
  if (mouseX > obj.x && mouseX < obj.x + obj.w &&
      mouseY > obj.y && mouseY < obj.y + obj.h) {
    fill(255, 255, 200, 50);
    rect(0, 0, obj.w, obj.h, 5);
  }
  
  // Object-specific drawing
  if (obj.name === 'Bookshelf') {
    fill(139, 90, 43);
    rect(0, 0, obj.w, obj.h, 4);
    fill(160, 120, 80);
    rect(5, 10, 50, 15);
    rect(5, 35, 50, 15);
    rect(5, 60, 50, 15);
    // Books
    fill(200, 50, 50); rect(10, 12, 5, 12);
    fill(50, 50, 200); rect(20, 12, 5, 12);
    fill(50, 150, 50); rect(30, 37, 5, 12);
  } else if (obj.name === 'Computer Desk') {
    fill(80, 80, 100);
    rect(0, 20, obj.w, 30, 4);
    fill(60, 60, 80);
    rect(5, 0, 10, 20);
    rect(55, 0, 10, 20);
    // Monitor
    fill(40, 40, 50);
    rect(15, -10, 35, 25, 3);
    fill(100, 200, 255, 180);
    rect(18, -7, 29, 19);
    // Keyboard
    fill(30);
    rect(25, 25, 20, 8);
  } else if (obj.name === 'Easel') {
    fill(200, 150, 100);
    triangle(0, 80, 25, 0, 50, 80);
    rect(20, 80, 10, 5);
    // Canvas
    fill(240);
    rect(15, 15, 20, 25);
    fill(255, 100, 100);
    ellipse(25, 25, 10, 10);
  } else if (obj.name === 'Yoga Mat') {
    fill(100, 180, 120);
    rect(0, 10, obj.w, 10, 5);
    fill(80, 140, 100);
    rect(5, 0, obj.w-10, 10, 3);
  } else if (obj.name === 'Fridge') {
    fill(220);
    rect(0, 0, obj.w, obj.h, 5);
    fill(180);
    rect(5, 5, 40, 20);
    rect(5, 30, 40, 20);
  } else if (obj.name === 'Bed') {
    fill(180, 140, 200);
    rect(0, 10, obj.w, 30, 8);
    fill(220, 200, 230);
    rect(10, 15, 40, 15);
    rect(60, 15, 30, 15);
    // Pillow
    fill(240);
    rect(5, 12, 20, 10, 3);
  } else if (obj.name === 'Radio') {
    fill(200, 100, 100);
    rect(0, 5, obj.w, 25, 5);
    fill(40);
    rect(5, 10, 30, 15);
    ellipse(20, 17, 8, 8);
  }
  
  // Label below
  fill(50);
  textSize(10);
  textAlign(CENTER);
  text(obj.name, obj.w/2, obj.h + 12);
  
  pop();
}

function drawCharacter() {
  push();
  translate(character.x, character.y);
  
  // Shadow
  fill(0, 30);
  ellipse(0, 40, 35, 10);
  
  // Body
  let bodyColor = color(100, 150, 220);
  if (character.action && character.actionObj) {
    // Slightly tint based on action
    if (character.actionObj.skill === 'education') bodyColor = color(120, 140, 200);
    else if (character.actionObj.skill === 'tech') bodyColor = color(100, 180, 200);
    else if (character.actionObj.skill === 'creativity') bodyColor = color(220, 130, 160);
    else if (character.actionObj.skill === 'wellness') bodyColor = color(100, 200, 150);
  }
  
  // Legs
  stroke(180, 150, 120);
  strokeWeight(5);
  if (character.moving) {
    let legSwing = sin(frameCount * 0.3) * 10;
    line(-8, 30, -12 + legSwing, 10);
    line(8, 30, 12 - legSwing, 10);
  } else {
    line(-8, 30, -10, 10);
    line(8, 30, 10, 10);
  }
  
  // Body
  noStroke();
  fill(bodyColor);
  ellipse(0, 0, 24, 30);
  
  // Arms
  stroke(180, 150, 120);
  strokeWeight(4);
  if (character.action) {
    // Reach towards object
    line(-10, -5, -20, -15);
    line(10, -5, 20, -15);
  } else {
    line(-10, -5, -18, 10);
    line(10, -5, 18, 10);
  }
  
  // Head
  noStroke();
  fill(255, 210, 170);
  ellipse(0, -28, 24, 26);
  
  // Hair
  fill(60, 40, 20);
  arc(0, -35, 26, 14, PI, TWO_PI);
  
  // Eyes
  fill(30);
  ellipse(-6, -30, 4, 5);
  ellipse(6, -30, 4, 5);
  fill(255);
  ellipse(-5, -31, 2, 2);
  ellipse(7, -31, 2, 2);
  
  // Mouth
  noFill();
  stroke(180, 100, 80);
  strokeWeight(1.5);
  arc(0, -22, 8, 4, 0, PI);
  
  pop();
}

function drawProgressBar() {
  if (!character.actionObj) return;
  let obj = character.actionObj;
  let px = obj.x + obj.w/2 - 40;
  let py = obj.y - 25;
  
  fill(0, 150);
  rect(px, py, 80, 12, 6);
  fill(255, 215, 0);
  rect(px, py, 80 * actionProgress, 12, 6);
  
  fill(255);
  textSize(10);
  textAlign(CENTER);
  text(obj.action, px + 40, py - 5);
}

function drawUI() {
  // Panel background
  fill(0, 0, 0, 160);
  noStroke();
  rect(10, 10, 220, 250, 15);
  
  // Needs
  fill(255);
  textSize(14);
  textAlign(LEFT);
  text("❤️ NEEDS", 20, 35);
  
  drawNeedBar("Hunger", needs.hunger, 20, 50);
  drawNeedBar("Energy", needs.energy, 20, 75);
  drawNeedBar("Fun", needs.fun, 20, 100);
  
  // Skills
  fill(255);
  text("📈 SKILLS", 20, 135);
  drawSkillBar("Education", skills.education, 20, 150);
  drawSkillBar("Tech", skills.tech, 20, 170);
  drawSkillBar("Creativity", skills.creativity, 20, 190);
  drawSkillBar("Wellness", skills.wellness, 20, 210);
  
  // Money & Day
  fill(255, 215, 0);
  textSize(13);
  text(`💰 $${money}`, 20, 240);
  fill(200);
  text(`📅 Day ${day}`, 120, 240);
  
  // Message at bottom center
  if (messageTimer > 0) {
    fill(0, 0, 0, 180);
    rect(width/2 - 200, height - 60, 400, 40, 20);
    fill(255, 255, 200);
    textSize(14);
    textAlign(CENTER);
    text(message, width/2, height - 35);
  }
  
  // Title
  fill(255, 255, 200, 200);
  textSize(18);
  textAlign(RIGHT);
  text("✨ My Future Room", width - 20, 35);
  textSize(11);
  text("Design Your Future", width - 20, 55);
}

function drawNeedBar(label, value, x, y) {
  fill(200);
  textSize(11);
  text(label, x, y);
  fill(100);
  rect(x+50, y-8, 80, 10, 4);
  let col = value > 50 ? color(100, 200, 100) : color(220, 100, 100);
  fill(col);
  rect(x+50, y-8, 80 * (value/100), 10, 4);
}

function drawSkillBar(label, value, x, y) {
  fill(200);
  textSize(11);
  text(label, x, y);
  fill(100);
  rect(x+70, y-8, 80, 10, 4);
  fill(100, 180, 255);
  rect(x+70, y-8, 80 * (value/100), 10, 4);
}

// Prevent default right-click menu on canvas
document.addEventListener('contextmenu', event => event.preventDefault());
</script>
</body>
</html>
