<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Skate to the Future • Design Your Future</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      overflow: hidden;
    }
    .game-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: 1000px;
      max-height: 600px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0, 150, 255, 0.3), 0 0 120px rgba(255, 200, 0, 0.2);
    }
    canvas {
      display: block;
    }
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .hud-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 20px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .skill-badge {
      background: rgba(10, 20, 40, 0.85);
      backdrop-filter: blur(15px);
      border: 2px solid rgba(255, 215, 0, 0.6);
      border-radius: 20px;
      padding: 12px 18px;
      color: white;
      font-weight: bold;
      font-size: 12px;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .skill-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
    }
    .skill-icon {
      font-size: 16px;
      width: 22px;
    }
    .skill-bar {
      width: 70px;
      height: 5px;
      background: #1e2a4a;
      border-radius: 10px;
      overflow: hidden;
    }
    .skill-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      border-radius: 10px;
      transition: width 0.3s ease;
    }
    .level-indicator {
      background: #ffd700;
      color: #0a0a1a;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      margin-left: 3px;
    }
    .story-box {
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 30px;
      padding: 10px 24px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      max-width: 300px;
      text-align: right;
      line-height: 1.4;
    }
    .speed-indicator {
      background: rgba(255, 100, 50, 0.9);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 13px;
      display: inline-block;
      margin-top: 5px;
    }
    .controls-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: #ccc;
      padding: 8px 20px;
      border-radius: 25px;
      font-size: 12px;
      letter-spacing: 1px;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }
    button {
      pointer-events: auto;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      border: none;
      color: #0a0a1a;
      font-weight: bold;
      padding: 10px 22px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
      box-shadow: 0 4px 15px rgba(255, 200, 0, 0.4);
      margin-top: 8px;
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(255, 200, 0, 0.7);
    }
    @media (max-width: 700px) {
      .hud-top {
        flex-direction: column;
        align-items: flex-start;
      }
      .story-box {
        max-width: 250px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
<div class="game-wrapper" id="game-container"></div>
<div id="ui-layer">
  <div class="hud-top">
    <div class="skill-badge">
      <div style="font-size: 13px; margin-bottom: 6px; color: #ffd700;">🌟 FUTURE SKILLS</div>
      <div class="skill-row">
        <span class="skill-icon">📚</span>
        <span style="width: 60px;">Education</span>
        <div class="skill-bar"><div class="skill-fill" id="edu-fill" style="width: 10%;"></div></div>
        <span class="level-indicator" id="edu-lvl">Lv.1</span>
      </div>
      <div class="skill-row">
        <span class="skill-icon">💻</span>
        <span style="width: 60px;">Tech</span>
        <div class="skill-bar"><div class="skill-fill" id="tech-fill" style="width: 10%;"></div></div>
        <span class="level-indicator" id="tech-lvl">Lv.1</span>
      </div>
      <div class="skill-row">
        <span class="skill-icon">🎨</span>
        <span style="width: 60px;">Creativity</span>
        <div class="skill-bar"><div class="skill-fill" id="crea-fill" style="width: 10%;"></div></div>
        <span class="level-indicator" id="crea-lvl">Lv.1</span>
      </div>
      <div class="skill-row">
        <span class="skill-icon">❤️</span>
        <span style="width: 60px;">Wellness</span>
        <div class="skill-bar"><div class="skill-fill" id="well-fill" style="width: 10%;"></div></div>
        <span class="level-indicator" id="well-lvl">Lv.1</span>
      </div>
      <div style="margin-top: 6px; font-size: 10px; color: #ccc;">
        🍎 <span id="food-count">0</span> | 👕 <span id="clothes-count">0</span>
      </div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 5px;">
      <div class="story-box" id="story-text">🛹 Skate through your future...</div>
      <div class="speed-indicator">⚡ Speed: <span id="speed-display">5.0</span></div>
      <button id="restart-btn">🔄 New Journey</button>
    </div>
  </div>
  <div class="controls-hint">
    ⬅️ ➡️ Steer | ⬆️ Jump | Collect skills for your future
  </div>
</div>

<script>
  // ===== SKATE TO THE FUTURE - EDGE SURF INSPIRED =====
  const { Engine, World, Bodies, Body, Events } = Matter;

  let engine, world;
  let player;
  let ground;
  let collectibles = [];
  let obstacles = [];
  
  // Camera & perspective
  let worldOffset = 0;
  let cameraShake = 0;
  
  // Player state
  let playerX = 400;
  let playerY;
  let playerVY = 0;
  let currentLane = 1; // 0-3 lanes
  let targetLaneX = 400;
  let lanes = [250, 350, 450, 550];
  
  // Skills
  let skills = { education: 1, tech: 1, creativity: 1, wellness: 1 };
  let food = 0, clothes = 0;
  let level = 1;
  const MAX_SKILL = 10;
  
  // Game
  let gameSpeed = 5;
  let baseSpeed = 5;
  let isJumping = false;
  let jumpVelocity = 0;
  const GRAVITY = 0.6;
  const JUMP_FORCE = -12;
  let groundY;
  
  // Controls
  let keys = {};
  
  // Story
  let storyMessages = [
    "🛹 Skate into your future...",
    "📚 Education builds your foundation",
    "💻 Tech skills accelerate growth",
    "🎨 Creativity shapes your path",
    "❤️ Wellness sustains the journey",
    "🌟 Every skill matters!",
    "🚀 Level up your future!"
  ];
  let storyIndex = 0;
  let storyTimer = 0;
  
  // Particles
  let particles = [];

  function setup() {
    let canvas = createCanvas(1000, 600);
    canvas.parent('game-container');
    
    groundY = height - 60;
    playerY = groundY - 80;
    
    // Initialize Matter.js
    engine = Engine.create();
    world = engine.world;
    engine.gravity.y = 0; // We handle gravity manually for player
    
    // Ground
    ground = Bodies.rectangle(500, groundY + 30, 3000, 40, { 
      isStatic: true, 
      label: 'ground',
      friction: 0.5
    });
    World.add(world, ground);
    
    // Create player as a sensor body
    player = Bodies.circle(playerX, playerY, 20, {
      label: 'player',
      friction: 0.1,
      restitution: 0,
      mass: 1
    });
    World.add(world, player);
    Body.setInertia(player, Infinity);
    
    // Initial spawns
    for (let i = 0; i < 10; i++) {
      spawnCollectible(800 + i * 180);
    }
    for (let i = 0; i < 6; i++) {
      spawnObstacle(900 + i * 220);
    }
    
    updateUI();
  }

  function draw() {
    // Update physics (only for collectibles/obstacles)
    Engine.update(engine, 1000 / 60);
    
    // Handle input
    handleInput();
    
    // Update player physics
    updatePlayer();
    
    // Update world scroll
    worldOffset = playerX - 350;
    
    // Clear and draw
    background(15, 25, 45);
    
    push();
    translate(-worldOffset * 0.7, 0);
    
    // Draw 3D perspective environment
    drawSky();
    drawCity();
    drawRoad();
    
    // Draw all game objects
    drawCollectibles();
    drawObstacles();
    drawPlayer();
    
    pop();
    
    // Draw particles (screen space)
    drawParticles();
    
    // Check collisions
    checkCollectibles();
    checkObstacles();
    
    // Cleanup and spawn
    cleanUpObjects();
    
    // Update story
    storyTimer++;
    if (storyTimer > 180) {
      storyTimer = 0;
      storyIndex = (storyIndex + 1) % storyMessages.length;
      document.getElementById('story-text').innerText = storyMessages[storyIndex];
    }
    
    // Update speed display
    document.getElementById('speed-display').innerText = gameSpeed.toFixed(1);
    
    // Camera shake decay
    if (cameraShake > 0) cameraShake *= 0.9;
  }

  function handleInput() {
    // Lane switching
    if (keys[LEFT_ARROW] || keys[65]) {
      if (currentLane > 0) {
        currentLane--;
        keys[LEFT_ARROW] = false;
        keys[65] = false;
      }
    }
    if (keys[RIGHT_ARROW] || keys[68]) {
      if (currentLane < lanes.length - 1) {
        currentLane++;
        keys[RIGHT_ARROW] = false;
        keys[68] = false;
      }
    }
    
    targetLaneX = lanes[currentLane];
    playerX = lerp(playerX, targetLaneX, 0.15);
    
    // Jump
    if ((keys[UP_ARROW] || keys[32] || keys[87]) && !isJumping) {
      isJumping = true;
      jumpVelocity = JUMP_FORCE;
      keys[UP_ARROW] = false;
      keys[32] = false;
      keys[87] = false;
      createJumpParticles();
    }
  }

  function updatePlayer() {
    // Gravity
    if (isJumping) {
      playerY += jumpVelocity;
      jumpVelocity += GRAVITY;
      
      if (playerY >= groundY - 40) {
        playerY = groundY - 40;
        isJumping = false;
        jumpVelocity = 0;
        createLandParticles();
      }
    }
    
    // Update player body position
    Body.setPosition(player, { x: playerX, y: playerY });
    Body.setVelocity(player, { x: gameSpeed, y: 0 });
    
    // Keep collectibles/obstacles moving
    for (let c of collectibles) {
      Body.setVelocity(c, { x: -gameSpeed * 0.3, y: 0 });
    }
    for (let o of obstacles) {
      Body.setVelocity(o, { x: -gameSpeed * 0.3, y: 0 });
    }
  }

  function drawSky() {
    // Gradient sky
    for (let y = 0; y < height; y++) {
      let inter = map(y, 0, height, 0, 1);
      let c = lerpColor(color(20, 30, 50), color(60, 80, 120), inter);
      stroke(c);
      line(-200, y, width * 3, y);
    }
    
    // Stars
    fill(255, 255, 200);
    noStroke();
    for (let i = 0; i < 30; i++) {
      let sx = (i * 137 + worldOffset * 0.1) % (width * 2);
      let sy = (i * 89) % 200;
      ellipse(sx, sy, 2, 2);
    }
  }

  function drawCity() {
    // Far buildings (parallax layer 1)
    fill(25, 35, 60);
    noStroke();
    for (let i = -2; i < 20; i++) {
      let bx = i * 180 + (worldOffset * 0.2) % 180;
      let bh = 150 + (i % 3) * 60;
      rect(bx, groundY - bh, 80, bh);
      
      // Windows
      fill(255, 220, 100, 80);
      for (let wy = groundY - bh + 15; wy < groundY - 10; wy += 25) {
        for (let wx = bx + 10; wx < bx + 70; wx += 18) {
          rect(wx, wy, 6, 10);
        }
      }
    }
    
    // Near buildings (parallax layer 2)
    fill(35, 45, 75);
    for (let i = -1; i < 15; i++) {
      let bx = i * 220 + (worldOffset * 0.5) % 220;
      let bh = 100 + (i % 4) * 40;
      rect(bx, groundY - bh, 60, bh);
      
      fill(255, 200, 100, 100);
      for (let wy = groundY - bh + 15; wy < groundY - 5; wy += 20) {
        for (let wx = bx + 8; wx < bx + 52; wx += 15) {
          rect(wx, wy, 5, 8);
        }
      }
    }
  }

  function drawRoad() {
    // Main road
    fill(50, 55, 70);
    rect(-300, groundY - 10, width * 4, 70);
    
    // Road edge
    fill(70, 75, 90);
    rect(-300, groundY - 15, width * 4, 8);
    
    // Lane markings
    stroke(255, 215, 0, 120);
    strokeWeight(2);
    for (let i = -5; i < 40; i++) {
      let lx = i * 100 + (worldOffset * 0.6) % 100;
      line(lx, groundY + 15, lx + 40, groundY + 15);
    }
    noStroke();
    
    // Sidewalk
    fill(60, 65, 80);
    rect(-300, groundY - 20, width * 4, 10);
  }

  function drawCollectibles() {
    for (let c of collectibles) {
      push();
      translate(c.position.x, c.position.y);
      
      // Float animation
      let floatY = sin(frameCount * 0.08 + c.position.x) * 6;
      
      // Glow effect
      fill(c.col[0], c.col[1], c.col[2], 60);
      ellipse(0, floatY, 36, 36);
      
      // Main circle
      fill(c.col[0], c.col[1], c.col[2]);
      ellipse(0, floatY, 28, 28);
      
      // Icon
      fill(255);
      textSize(16);
      textAlign(CENTER, CENTER);
      text(c.icon, 0, floatY);
      pop();
    }
  }

  function drawObstacles() {
    for (let o of obstacles) {
      push();
      translate(o.position.x, o.position.y);
      
      // Warning sign
      fill(200, 60, 60);
      rectMode(CENTER);
      rect(0, 0, 24, 45, 6);
      
      fill(240, 100, 100);
      rect(0, -12, 18, 8, 3);
      
      fill(255);
      textSize(14);
      textAlign(CENTER, CENTER);
      text('!', 0, 2);
      pop();
    }
  }

  function drawPlayer() {
    push();
    translate(playerX, playerY);
    
    // Shadow
    fill(0, 0, 0, 40);
    ellipse(0, 38, 50, 10);
    
    // Skateboard
    fill(180, 140, 100);
    rectMode(CENTER);
    rect(0, 30, 55, 8, 12);
    
    // Board design
    fill(220, 180, 120);
    rect(0, 30, 48, 5, 10);
    
    // Wheels
    fill(30);
    ellipse(-20, 35, 8, 8);
    ellipse(20, 35, 8, 8);
    fill(60);
    ellipse(-20, 35, 4, 4);
    ellipse(20, 35, 4, 4);
    
    // Legs
    stroke(220, 180, 150);
    strokeWeight(5);
    line(-8, 24, -10, 8);
    line(8, 24, 10, 8);
    noStroke();
    
    // Shoes
    fill(50);
    ellipse(-10, 28, 10, 5);
    ellipse(10, 28, 10, 5);
    
    // Body
    fill(60, 130, 210);
    ellipse(0, -2, 24, 28);
    
    // Jacket detail
    fill(80, 150, 230);
    rect(-8, -10, 16, 20, 4);
    
    // Arms
    stroke(220, 180, 150);
    strokeWeight(4);
    line(-11, -5, -22, 10);
    line(11, -5, 22, 10);
    noStroke();
    
    // Hands
    fill(240, 200, 160);
    ellipse(-22, 10, 6, 6);
    ellipse(22, 10, 6, 6);
    
    // Head
    fill(255, 210, 170);
    ellipse(0, -28, 24, 26);
    
    // Hair
    fill(60, 40, 20);
    arc(0, -35, 26, 14, PI, TWO_PI);
    
    // Eyes
    fill(30);
    ellipse(-6, -30, 4, 5);
    ellipse(6, -30, 4, 5);
    fill(255);
    ellipse(-5, -31, 2, 2);
    ellipse(7, -31, 2, 2);
    
    // Mouth
    noFill();
    stroke(180, 100, 80);
    strokeWeight(1.5);
    arc(0, -22, 8, 5, 0, PI);
    noStroke();
    
    // Helmet
    fill(255, 70, 50);
    arc(0, -36, 28, 14, PI, TWO_PI);
    fill(255, 100, 80);
    rect(-2, -42, 4, 4, 2);
    
    pop();
  }

  function createJumpParticles() {
    for (let i = 0; i < 10; i++) {
      particles.push({
        x: playerX - worldOffset * 0.7,
        y: playerY + 30,
        vx: random(-3, 3),
        vy: random(-5, -2),
        life: 25,
        color: [255, 200, 50]
      });
    }
  }

  function createLandParticles() {
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: playerX - worldOffset * 0.7,
        y: playerY + 35,
        vx: random(-2, 2),
        vy: random(-3, -1),
        life: 15,
        color: [200, 200, 200]
      });
    }
  }

  function drawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      let p = particles[i];
      fill(p.color[0], p.color[1], p.color[2], p.life * 8);
      noStroke();
      ellipse(p.x, p.y, 5, 5);
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function spawnCollectible(xPos) {
    let laneX = random(lanes);
    let types = [
      { type: 'education', icon: '📚', color: [65, 130, 220] },
      { type: 'tech', icon: '💻', color: [0, 190, 240] },
      { type: 'creativity', icon: '🎨', color: [240, 90, 160] },
      { type: 'wellness', icon: '❤️', color: [240, 70, 70] },
      { type: 'food', icon: '🍎', color: [240, 140, 50] },
      { type: 'clothes', icon: '👕', color: [150, 110, 240] }
    ];
    let chosen = random(types);
    
    let c = Bodies.circle(xPos, groundY - 40 + random(-15, 5), 16, {
      isSensor: true,
      label: 'collectible',
      collectType: chosen.type,
      icon: chosen.icon,
      col: chosen.color
    });
    World.add(world, c);
    collectibles.push(c);
  }

  function spawnObstacle(xPos) {
    let laneX = random(lanes);
    let o = Bodies.rectangle(xPos, groundY - 30, 24, 45, {
      label: 'obstacle',
      isSensor: true
    });
    World.add(world, o);
    obstacles.push(o);
  }

  function checkCollectibles() {
    for (let i = collectibles.length - 1; i >= 0; i--) {
      let c = collectibles[i];
      let d = dist(playerX, playerY, c.position.x, c.position.y);
      if (d < 45) {
        collectItem(c);
        World.remove(world, c);
        collectibles.splice(i, 1);
      }
    }
  }

  function collectItem(item) {
    let type = item.collectType;
    if (type === 'education') skills.education = min(skills.education + 1, MAX_SKILL);
    else if (type === 'tech') skills.tech = min(skills.tech + 1, MAX_SKILL);
    else if (type === 'creativity') skills.creativity = min(skills.creativity + 1, MAX_SKILL);
    else if (type === 'wellness') skills.wellness = min(skills.wellness + 1, MAX_SKILL);
    else if (type === 'food') food++;
    else if (type === 'clothes') clothes++;
    
    // Update speed
    let total = skills.education + skills.tech + skills.creativity + skills.wellness;
    gameSpeed = baseSpeed + (total - 4) * 0.5;
    
    // Level up
    let newLevel = floor(total / 5) + 1;
    if (newLevel > level) {
      level = newLevel;
      document.getElementById('story-text').innerText = `🚀 LEVEL ${level}! Your future expands!`;
      storyTimer = 0;
    }
    
    updateUI();
  }

  function checkObstacles() {
    for (let o of obstacles) {
      let d = dist(playerX, playerY, o.position.x, o.position.y);
      if (d < 35) {
        // Penalty
        let skillsArray = ['education', 'tech', 'creativity', 'wellness'];
        for (let s of skillsArray) {
          if (skills[s] > 1) {
            skills[s]--;
            break;
          }
        }
        
        cameraShake = 10;
        document.getElementById('story-text').innerText = "⚠️ Setback! Keep pushing forward!";
        storyTimer = 0;
        updateUI();
        
        // Push obstacle away
        Body.setPosition(o, { x: o.position.x + 100, y: o.position.y });
        break;
      }
    }
  }

  function cleanUpObjects() {
    // Remove off-screen objects
    for (let i = collectibles.length - 1; i >= 0; i--) {
      if (collectibles[i].position.x < playerX - 500) {
        World.remove(world, collectibles[i]);
        collectibles.splice(i, 1);
      }
    }
    for (let i = obstacles.length - 1; i >= 0; i--) {
      if (obstacles[i].position.x < playerX - 500) {
        World.remove(world, obstacles[i]);
        obstacles.splice(i, 1);
      }
    }
    
    // Spawn new objects
    if (collectibles.length < 10) {
      spawnCollectible(playerX + 800 + random(0, 300));
    }
    if (obstacles.length < 6) {
      spawnObstacle(playerX + 900 + random(0, 400));
    }
  }

  function updateUI() {
    document.getElementById('edu-fill').style.width = (skills.education / MAX_SKILL * 100) + '%';
    document.getElementById('tech-fill').style.width = (skills.tech / MAX_SKILL * 100) + '%';
    document.getElementById('crea-fill').style.width = (skills.creativity / MAX_SKILL * 100) + '%';
    document.getElementById('well-fill').style.width = (skills.wellness / MAX_SKILL * 100) + '%';
    
    document.getElementById('edu-lvl').innerText = 'Lv.' + skills.education;
    document.getElementById('tech-lvl').innerText = 'Lv.' + skills.tech;
    document.getElementById('crea-lvl').innerText = 'Lv.' + skills.creativity;
    document.getElementById('well-lvl').innerText = 'Lv.' + skills.wellness;
    
    document.getElementById('food-count').innerText = food;
    document.getElementById('clothes-count').innerText = clothes;
  }

  function keyPressed() {
    keys[keyCode] = true;
    return false;
  }

  function keyReleased() {
    keys[keyCode] = false;
  }

  function mousePressed() {
    if (!isJumping) {
      isJumping = true;
      jumpVelocity = JUMP_FORCE;
      createJumpParticles();
    }
  }

  function restartGame() {
    skills = { education: 1, tech: 1, creativity: 1, wellness: 1 };
    food = 0;
    clothes = 0;
    level = 1;
    gameSpeed = baseSpeed;
    currentLane = 1;
    playerX = lanes[1];
    playerY = groundY - 40;
    isJumping = false;
    jumpVelocity = 0;
    worldOffset = 0;
    
    // Clear objects
    for (let c of collectibles) World.remove(world, c);
    for (let o of obstacles) World.remove(world, o);
    collectibles = [];
    obstacles = [];
    
    // Respawn
    for (let i = 0; i < 10; i++) spawnCollectible(800 + i * 180);
    for (let i = 0; i < 6; i++) spawnObstacle(900 + i * 220);
    
    document.getElementById('story-text').innerText = "🛹 New journey! Design your future.";
    updateUI();
  }

  document.getElementById('restart-btn').addEventListener('click', restartGame);

  // Prevent default scrolling
  window.addEventListener('keydown', function(e) {
    if ([32, 37, 38, 39, 40].includes(e.keyCode)) {
      e.preventDefault();
    }
  }, false);
</script>
</body>
</html>
